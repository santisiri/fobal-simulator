    // (the force timer keeps headless __simulate runs moving no matter what)
    r.wait = { THROWIN: 1.6, GOALKICK: 2.1, CORNER: 3.2, FREEKICK: r.shooting ? 3.4 : 2.2 }[type]
      + (team.tactics.timeWaste || 0) * 1.4; // the dark arts: slow walks to every dead ball
    // players with unreasonably long journeys keep their normal shape instead
    // of sprinting across the whole pitch for one ceremony
    if (r.spTargets){
      for (const [p, sp] of [...r.spTargets]){
        if (dist(p.pos, sp) > 38){
          r.spTargets.delete(p);
          if (r.spTargets2) r.spTargets2.delete(p);
          if (r.wall) r.wall = r.wall.filter(q => q !== p);
          for (const k of ['lying', 'decoy', 'short', 'shortTo'])
            if (r[k] === p) r[k] = null; // a pruned body loses its routine role too
        }
      }
    }
    // the force timer scales with the longest journey — enough time to jog
    // over, but the ceremony stays broadcast-short (≈2-5s per event)
    let far = dist(taker.pos, spot);
    if (r.spTargets) for (const [p, sp] of r.spTargets) far = Math.max(far, dist(p.pos, sp) * 0.8);
    r.force = r.wait + clamp(far / 6.5, 1.6, 3.6);
    if (r.spTargets2) r.swapT = Math.max(0.8, r.wait - 0.8);
    // the taker waits at a run-up mark behind the ball
    const sbDir = type === 'THROWIN'
      ? { x: 0, y: spot.y < 34 ? -1 : 1 }
      : norm(sub(spot, { x: team.oppGoalX(), y: 34 }));
    r.standback = { x: clamp(spot.x + sbDir.x * 2.4, -2, CFG.PITCH_L + 2),
                    y: clamp(spot.y + sbDir.y * 2.4, -2, CFG.PITCH_W + 2) };
    // a human coach takes their own set pieces
    r.humanTaker = this.game.humanMode && team === this.game.teams[0];
    if (r.humanTaker){
      this.game.selected = r.taker;
      r.force = r.wait + 8;
      // a release recorded before the whistle must not auto-fire the restart
      r.startedAt = performance.now();
      g.input.passReleased = null; g.input.shootReleased = null;
      this.game.takeRequested = false; this.game.takeShoot = false;
    }
    this.restart = r;
    g.checkAutoSubs(); // dead ball: a natural moment for AI benches to act
    const label = { THROWIN:'THROW-IN', CORNER:'CORNER KICK', GOALKICK:'GOAL KICK', FREEKICK:'FREE KICK' }[type];
    if (label && g.broadcast){
      const icon = { THROWIN:'throwin', CORNER:'corner', GOALKICK:'goalkick', FREEKICK:'freekick' }[type];
      let sub = team.name;
      if (type === 'CORNER') sub = taker.name + ' · ' + team.code;
      if (type === 'FREEKICK') sub = taker.name + ' · ' + team.code + (r.shooting ? ' · shooting range' : '');
      g.broadcast.event({ icon, title: label, sub, color: team.kit.shirt, dur: 2.8, pri: 1.5 });
    }
    if (type === 'CORNER' || type === 'THROWIN' || type === 'GOALKICK')
      g.commentate(type.toLowerCase().replace('goalkick', 'goalkick'), { team });
    if (type === 'THROWIN') g.counts.throwin++;
    if (type === 'CORNER'){ g.counts.corner++; if (g.stadium) g.stadium.react('corner', team); }
    if (type === 'GOALKICK') g.counts.goalkick++;
    if (type === 'FREEKICK') g.counts.freekick++;
    if (g.recorder) g.recorder.log('restart', { kind: type, team: team.id, position: EventSerializer.pos(spot),
      actor: taker.pid, delivery: r.delivery, shooting: !!r.shooting });
    this.setState(type);
  }
  executeRestart(){
    const g = this.game, r = this.restart, b = g.ball;
    if (g.recorder) g.recorder.log('restart_taken', { kind: r.type, actor: r.taker.pid,
      choice: r.humanChoice || r.delivery || undefined });
    const team = r.team, taker = r.taker;
    b.x = r.spot.x; b.y = r.spot.y;
    if (r.type === 'THROWIN'){
      // ThrowInRoutineSystem: weigh safe, progressive and risky options —
      // lane safety vs field progression, tilted by team risk appetite
      let best = null, bs = -1;
      const maxThrow = Math.min(26, groundedPassLimit() + 6);
      for (const m of team.players){
        if (m === taker || m.isGK) continue;
        const dm = dist(taker.pos, m.pos);
        if (dm < 4 || dm > maxThrow) continue;
        const infield = 1 - Math.abs(m.pos.y - 34) / 40;
        const lane = laneClear(taker.pos, m.pos, g.other(team).players, 0);
        const prog = clamp((m.pos.x - taker.pos.x) * team.attackDir / 22, -1, 1);
        let s = lane * 0.5 + infield * 0.22 + srand() * 0.15;
        s += prog * (0.1 + team.tactics.risk * 0.22);
        if (r.humanChoice === 'attack') s += prog * 0.4;
        if (r.humanChoice === 'safe') s += lane * 0.35 - Math.max(0, prog) * 0.25;
        if (s > bs){ bs = s; best = m; }
      }
      const tgt = best ? best.pos : { x: clamp(taker.pos.x + team.attackDir * 8, 2, 103), y: 34 };
      b.z = 1.9;
      taker.setAction('board', 0.45); // ball overhead for the throw
      const thrEnv = clamp(ENV.groundFr / CFG.BALL_FR_GROUND, 1, 1.35);
      doKick(taker, g, { type:'pass', silent: true, tx: tgt.x, ty: tgt.y, speed: clamp(dist(r.spot, tgt) * 0.8 * thrEnv, 6, 14), vz: 2.0, sigma: 0.07, receiver: best });
    } else if (r.type === 'CORNER'){
      const gx = r.spot.x < 50 ? 0 : CFG.PITCH_L;
      const inward = gx === 0 ? 1 : -1;
      const inCurl = (r.spot.y < 34 ? 1 : -1) * inward * 2.2;
      const nearY = 34 + (r.spot.y < 34 ? -3 : 3), farY = 34 + (r.spot.y < 34 ? 4.5 : -4.5);
      let dl = r.delivery || 'inswing';
      if (r.humanChoice === 'safe' && r.short) dl = 'short';
      else if (r.humanChoice === 'attack' && dl === 'short') dl = 'inswing';
      let tx, ty, spin = inCurl, low = false;
      if (dl === 'short' && r.short){
        doKick(taker, g, { type:'pass', tx: r.short.pos.x, ty: r.short.pos.y,
          speed: groundPassSpeed(dist(r.spot, r.short.pos)), vz: 0, sigma: 0.05, receiver: r.short });
        this.restart = null; return;
      }
      if (dl === 'nearpost'){ tx = gx + inward * 5.5; ty = nearY; }
      else if (dl === 'farpost'){ tx = gx + inward * 8; ty = farY; }
      else if (dl === 'six'){ tx = gx + inward * 4.5; ty = 34; }
      else if (dl === 'cutback'){ tx = gx + inward * 18; ty = 34 + (srand() - 0.5) * 6; low = true; spin = 0; }
      else if (dl === 'outswing'){ tx = gx + inward * 10.5; ty = 34; spin = -inCurl; }
      else { tx = gx + inward * (7 + srand() * 4); ty = 34 + (srand() - 0.5) * 6; }
      const d = dist(r.spot, { x: tx, y: ty });
      const l = loftFor(d);
      doKick(taker, g, { type:'pass', cross: !low, tx, ty,
        speed: low ? 16 : l.vh, vz: low ? 0.8 : l.vz, spin, sigma: 0.09 });
    } else if (r.type === 'GOALKICK'){
      // GoalKickRoutineSystem: play out short when the style suits and the
      // press allows; otherwise launch it long to the second-ball zone
      const gxO = team.ownGoalX();
      const oppNear = g.other(team).players.filter(o => Math.abs(o.pos.x - gxO) < 32).length;
      const gkL = team.tactics.gkLong !== undefined ? team.tactics.gkLong : 0.5;
      const wantShort = r.humanChoice === 'safe' ||
        (r.humanChoice !== 'attack' && r.shortTo && team.players.includes(r.shortTo) && oppNear < 4 &&
         srand() < (team.tactics.style === 'possession' ? 0.75 : 0.35) * (1.4 - gkL));
      if (wantShort && r.shortTo && team.players.includes(r.shortTo)){
        doKick(taker, g, { type:'pass', tx: r.shortTo.pos.x, ty: r.shortTo.pos.y,
          speed: groundPassSpeed(dist(r.spot, r.shortTo.pos)), vz: 0, sigma: 0.05, receiver: r.shortTo });
      } else {
        // launch toward a staged second-ball body when the shape exists
        const staged = r.spTargets
          ? [...r.spTargets].filter(([p]) => p.team === team && p.line === 'ATT').map(([, sp]) => sp) : [];
        const aim = staged.length ? staged[(srand() * staged.length) | 0] : null;
        const tx = aim ? aim.x - team.attackDir * 2 : gxO + team.attackDir * (46 + srand() * 12);
        const ty = aim ? aim.y : (srand() < 0.5 ? 12 : 56);
        const d = dist(r.spot, { x: tx, y: ty });
        const l = loftFor(d);
        doKick(taker, g, { type:'pass', tx, ty, speed: l.vh, vz: l.vz, sigma: 0.13 });
      }
    } else if (r.type === 'FREEKICK'){
      const gx = team.oppGoalX();
      const dGoal = dist(r.spot, { x: gx, y: 34 });
      if (r.shooting){
        // FreeKickSystem: choose the weapon by skill, distance and options
        const t2 = taker;
        const opts2 = [
          { k: 'curl', w: 1.1 + t2.a.shooting },
          { k: 'low', w: 0.45 + t2.a.shooting * 0.5 + (r.lying ? -0.2 : 0) },
          { k: 'chip', w: r.decoy ? 0.5 + t2.a.passing * 0.6 : 0 },
          { k: 'short', w: r.short ? (team.tactics.style === 'possession' ? 0.9 : 0.35) : 0 },
        ];
        if (r.humanChoice === 'attack') for (const o of opts2){ if (o.k === 'chip' || o.k === 'short') o.w = 0; }
        if (r.humanChoice === 'safe') for (const o of opts2){ if (o.k === 'curl' || o.k === 'low') o.w *= 0.12; }
        let tot = opts2.reduce((a, o) => a + o.w, 0), pickR = srand() * tot, choice = 'curl';
        for (const o of opts2){ pickR -= o.w; if (pickR <= 0){ choice = o.k; break; } }
        const curl = (r.spot.y < 34 ? -1 : 1) * (gx === 0 ? -1 : 1) * 2.6;
        const isShot = choice === 'curl' || choice === 'low';
        if (choice === 'curl'){
          doKick(taker, g, { type:'shot', tx: gx, ty: 34 + (r.spot.y > 34 ? -2.8 : 2.8),
            speed: 18 + t2.a.shooting * 6, vz: clamp(dGoal * 0.24, 3.4, 6.6), spin: curl,
            sigma: 0.09 - t2.a.composure * 0.03 });
        } else if (choice === 'low'){
          doKick(taker, g, { type:'shot', tx: gx, ty: 34 + (r.spot.y > 34 ? 2.6 : -2.6),
            speed: 21 + t2.a.shooting * 6, vz: 0.7, spin: curl * 0.4,
            sigma: 0.1 - t2.a.composure * 0.03 });
        } else if (choice === 'chip'){
          const d2 = dist(r.spot, r.decoy.pos);
          const l2 = loftFor(Math.max(8, d2));
          doKick(taker, g, { type:'pass', tx: r.decoy.pos.x, ty: r.decoy.pos.y,
            speed: l2.vh * 0.9, vz: l2.vz, sigma: 0.08, receiver: r.decoy });
        } else {
          doKick(taker, g, { type:'pass', tx: r.short.pos.x, ty: r.short.pos.y,
            speed: groundPassSpeed(dist(r.spot, r.short.pos)), vz: 0, sigma: 0.05, receiver: r.short });
        }
        // the wall reacts: jump for the strike (their bodies block high balls)
        if (isShot && r.wall){
          for (const q of r.wall){
            if (q === r.lying) continue;
            q.setAction('head', 0.55);
            q.wallJumpT = 0.5;
            exert(q, 0.005); // the leap
          }
        }
      } else if (dGoal < 45 && r.humanChoice !== 'safe'){
        const tx = gx + (gx === 0 ? 9 : -9), ty = 34 + (srand() - 0.5) * 10;
        const d = dist(r.spot, { x: tx, y: ty });
        const l = loftFor(d);
        doKick(taker, g, { type:'pass', cross:true, tx, ty, speed: l.vh, vz: l.vz, spin: 0, sigma: 0.11 });
      } else {
        let best = null, bs = -1;
        for (const m of team.players){
          if (m === taker || m.isGK) continue;
          const dm = dist(taker.pos, m.pos);
          if (dm < 5 || dm > 35) continue;
          const prog = clamp((m.pos.x - taker.pos.x) * team.attackDir / 22, -1, 1);
          let s = laneClear(taker.pos, m.pos, g.other(team).players, 0) + srand() * 0.2;
          if (r.humanChoice === 'attack') s += prog * 0.5;
          if (r.humanChoice === 'safe') s -= Math.max(0, prog) * 0.3;
          if (s > bs){ bs = s; best = m; }
        }
        const tgt = best ? best.pos : { x: taker.pos.x + team.attackDir * 12, y: 34 };
        const dm2 = dist(r.spot, tgt);
        if (dm2 > groundedPassLimit()){
          const l2 = loftFor(dm2);
          doKick(taker, g, { type:'pass', tx: tgt.x, ty: tgt.y, speed: l2.vh, vz: l2.vz, sigma: 0.08, receiver: best });
        } else {
          doKick(taker, g, { type:'pass', tx: tgt.x, ty: tgt.y, speed: groundPassSpeed(dm2), vz: 0, sigma: 0.06, receiver: best });
        }
      }
    }
    this.restart = null;
  }
}

/* ----------------------- UI THEME & BROADCAST OVERLAY ---------------------- */
// UITheme: the broadcast interface language in one place — type, glass fills,
// accents, rounded geometry. Every piece of screen-space UI reads from here.
const UITheme = {
  sans: (w, s) => w + ' ' + s + 'px -apple-system, "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif',
  mono: (w, s) => w + ' ' + s + 'px ui-monospace, "SF Mono", Menlo, Consolas, monospace',
  ink: '#f2f6fa', mid: '#c3d0da', dim: '#8fa1af', faint: '#66757f',
  accent: '#ffd257', good: '#46c878', bad: '#e25948', warn: '#e8c23a',
  glassTop: 'rgba(17,22,30,0.86)', glassBot: 'rgba(9,12,17,0.74)',
  edge: 'rgba(255,255,255,0.10)', edgeSoft: 'rgba(255,255,255,0.06)',
  shadow: 'rgba(0,0,0,0.38)',
};
function rrPath(ctx, x, y, w, h, r){
  if (!(w > 0) || !(h > 0)){ ctx.beginPath(); return; } // degenerate viewport: draw nothing
  r = Math.max(0, Math.min(r, w / 2, h / 2));
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
// the standard translucent panel: vertical gradient, hairline edge, soft drop
function glassPanel(ctx, x, y, w, h, r, opts = {}){
  const g = ctx.createLinearGradient(0, y, 0, y + h);
  g.addColorStop(0, opts.top || UITheme.glassTop);
  g.addColorStop(1, opts.bot || UITheme.glassBot);
  rrPath(ctx, x, y, w, h, r);
  if (opts.blur){
    ctx.save();
    ctx.shadowColor = UITheme.shadow; ctx.shadowBlur = opts.blur; ctx.shadowOffsetY = 2;
    ctx.fillStyle = g; ctx.fill();
    ctx.restore();
  } else { ctx.fillStyle = g; ctx.fill(); }
  ctx.strokeStyle = opts.edge || UITheme.edge; ctx.lineWidth = 1;
  rrPath(ctx, x + 0.5, y + 0.5, w - 1, h - 1, r);
  ctx.stroke();
}
function hexA(hex, a){
  const n = parseInt(hex.slice(1), 16);
  return 'rgba(' + (n >> 16) + ',' + ((n >> 8) & 255) + ',' + (n & 255) + ',' + a + ')';
}
const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
const easeOutBack = t => { const c = 1.7; t -= 1; return 1 + t * t * ((c + 1) * t + c); };

// BroadcastOverlay + EventBanner: TV-style event graphics. One banner at a
// time (a small queue behind it), drawn in screen space from drawHUD on the
// render clock — headless __simulate never draws, and nothing gates on it.
class BroadcastOverlay {
  constructor(game){ this.game = game; this.cur = null; this.queue = []; }
  clear(){ this.cur = null; this.queue.length = 0; }
  // spec: { title, sub?, right?, icon?, iconColor?, color?, big?, dur?, pri? }
  event(spec){
    if (this.game.replayMode) return;
    spec.dur = spec.dur || 2.7; spec.pri = spec.pri || 1;
    const t = this.game.animT;
    if (this.cur && t < this.cur.t0 + this.cur.dur){
      if (spec.pri >= this.cur.pri){
        // preempt: rush the current banner out, show this one next
        this.cur.dur = Math.min(this.cur.dur, t - this.cur.t0 + 0.22);
        this.queue.length = 0;
        this.queue.push(spec);
      } else if (this.queue.length < 2) this.queue.push(spec);
    } else this.start(spec);
  }
  start(spec){ spec.t0 = this.game.animT; this.cur = spec; }
  draw(r){
    const t = this.game.animT;
    if (this.cur && t > this.cur.t0 + this.cur.dur) this.cur = null;
    if (!this.cur && this.queue.length) this.start(this.queue.shift());
    if (!this.cur) return;
    if (this.cur.big) this.drawBand(r, this.cur);
    else this.drawPill(r, this.cur);
  }
  drawPill(r, b){
    const ctx = r.ctx, W = r.W, t = this.game.animT;
    const kIn = easeOutCubic(clamp((t - b.t0) / 0.3, 0, 1));
    const kOut = easeOutCubic(clamp((b.t0 + b.dur - t) / 0.26, 0, 1));
    ctx.font = UITheme.sans('700', 13);
    const tw = ctx.measureText(b.title).width;
    ctx.font = UITheme.sans('500', 12);
    const sw = b.sub ? ctx.measureText(b.sub).width + 13 : 0;
    const iw = b.icon ? 24 : 0;
    const h = 32, w = Math.min((b.color ? 18 : 14) + iw + tw + sw + 16, W - 20);
    const x = (W - w) / 2;
    const yBase = W < 720 ? 92 : 46; // clear of the ticker pills on phones
    const y = yBase - (1 - kIn) * 15 - (1 - kOut) * 8;
    ctx.globalAlpha = Math.min(kIn, kOut);
    glassPanel(ctx, x, y, w, h, h / 2, { blur: 12 });
    ctx.save();
    rrPath(ctx, x, y, w, h, h / 2); ctx.clip(); // long text stays inside the pill
    let cx = x + 14;
    if (b.color){
      ctx.fillStyle = b.color;
      rrPath(ctx, x + 8, y + 8, 4, h - 16, 2); ctx.fill();
      cx = x + 18;
    }
    if (b.icon){ this.icon(ctx, b.icon, cx + 8, y + h / 2, b.iconColor || b.color || UITheme.accent); cx += iw; }
    ctx.textBaseline = 'middle';
    ctx.font = UITheme.sans('700', 13); ctx.fillStyle = UITheme.ink;
    ctx.fillText(b.title, cx, y + h / 2 + 0.5); cx += tw + 13;
    if (b.sub){ ctx.font = UITheme.sans('500', 12); ctx.fillStyle = UITheme.dim; ctx.fillText(b.sub, cx, y + h / 2 + 0.5); }
    ctx.restore();
    ctx.textBaseline = 'top';
    ctx.globalAlpha = 1;
  }
  drawBand(r, b){
    const ctx = r.ctx, W = r.W, t = this.game.animT;
    const kIn = easeOutBack(clamp((t - b.t0) / 0.38, 0, 1));
    const kOut = easeOutCubic(clamp((b.t0 + b.dur - t) / 0.3, 0, 1));
    const w = Math.min(W - 16, 600), h = 56;
    const x = (W - w) / 2;
    const yBase = W < 720 ? 92 : 42;
    const y = yBase - (1 - kIn) * 26 - (1 - kOut) * 10;
    ctx.globalAlpha = Math.min(clamp((t - b.t0) / 0.2, 0, 1), kOut);
    glassPanel(ctx, x, y, w, h, 13, { blur: 18 });
    if (b.color){
      const grad = ctx.createLinearGradient(x, 0, x + w, 0);
      grad.addColorStop(0, hexA(b.color, 0.5));
      grad.addColorStop(0.45, hexA(b.color, 0.1));
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      rrPath(ctx, x, y, w, h, 13); ctx.fillStyle = grad; ctx.fill();
    }
    if (b.icon) this.icon(ctx, b.icon, x + 24, y + h / 2, '#ffffff');
    ctx.textBaseline = 'middle';
    ctx.font = UITheme.sans('800', 23); ctx.fillStyle = UITheme.ink;
    ctx.fillText(b.title, x + 44, y + h / 2 - 10);
    if (b.sub){
      ctx.font = UITheme.sans('600', 13); ctx.fillStyle = UITheme.mid;
      ctx.fillText(b.sub, x + 45, y + h / 2 + 13);
    }
    if (b.right){
      ctx.font = UITheme.mono('700', 20); ctx.fillStyle = UITheme.ink;
      ctx.fillText(b.right, x + w - ctx.measureText(b.right).width - 20, y + h / 2 + 0.5);
    }
    ctx.textBaseline = 'top';
    ctx.globalAlpha = 1;
  }
  // tiny vector glyphs, ~16px, centered on (cx, cy)
  icon(ctx, kind, cx, cy, color){
    ctx.save();
    ctx.translate(cx, cy);
    ctx.lineWidth = 1.7; ctx.strokeStyle = color; ctx.fillStyle = color;
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    switch (kind){
      case 'corner':
        ctx.beginPath(); ctx.moveTo(-4, 8); ctx.lineTo(-4, -8); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-4, -8); ctx.lineTo(6, -4.8); ctx.lineTo(-4, -1.6); ctx.closePath(); ctx.fill();
        break;
      case 'freekick':
        ctx.beginPath(); ctx.arc(-6.5, 3.5, 2.6, 0, 7); ctx.fill();
        rrPath(ctx, 0.5, -6.5, 3.6, 11, 1.4); ctx.fill();
        rrPath(ctx, 5.1, -6.5, 3.6, 11, 1.4); ctx.fill();
        break;
      case 'throwin':
        ctx.beginPath(); ctx.arc(0, -4.8, 2.9, 0, 7); ctx.fill();
        ctx.beginPath(); ctx.moveTo(-3.6, 6); ctx.lineTo(-1.6, -1); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(3.6, 6); ctx.lineTo(1.6, -1); ctx.stroke();
        break;
      case 'goalkick':
        ctx.beginPath(); ctx.moveTo(-7, 6); ctx.lineTo(-7, -5); ctx.lineTo(7, -5); ctx.lineTo(7, 6); ctx.stroke();
        ctx.beginPath(); ctx.arc(0, 3, 2.4, 0, 7); ctx.fill();
        break;
      case 'goal':
        ctx.beginPath(); ctx.arc(0, 0, 6, 0, 7); ctx.stroke();
        ctx.beginPath(); ctx.arc(0, 0, 2.1, 0, 7); ctx.fill();
        break;
      case 'card':
        ctx.rotate(-0.16);
        rrPath(ctx, -4.5, -7, 9, 13, 1.6); ctx.fill();
        break;
      case 'sub':
        ctx.fillStyle = UITheme.good;
        ctx.beginPath(); ctx.moveTo(-4.5, -1.5); ctx.lineTo(-8.5, 4.5); ctx.lineTo(-0.5, 4.5); ctx.closePath(); ctx.fill();
        ctx.fillStyle = UITheme.bad;
        ctx.beginPath(); ctx.moveTo(4.5, 1.5); ctx.lineTo(0.5, -4.5); ctx.lineTo(8.5, -4.5); ctx.closePath(); ctx.fill();
        break;
      case 'offside':
        ctx.beginPath(); ctx.moveTo(2.5, 8); ctx.lineTo(2.5, -8); ctx.stroke();
        rrPath(ctx, -6.5, -8, 9, 6, 1); ctx.fill();
        break;
      case 'kickoff':
        ctx.beginPath(); ctx.arc(0, 0, 5.4, 0, 7); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-8.5, 0); ctx.lineTo(-5.4, 0); ctx.moveTo(5.4, 0); ctx.lineTo(8.5, 0); ctx.stroke();
        ctx.beginPath(); ctx.arc(0, 0, 1.5, 0, 7); ctx.fill();
        break;
      case 'whistle':
        ctx.beginPath(); ctx.arc(-1, 2, 4.4, 0, 7); ctx.fill();
        rrPath(ctx, -1, -4.5, 9, 4, 1.6); ctx.fill();
        break;
    }
    ctx.restore();
  }
}

/* ------------------------------- RENDERER ---------------------------------- */
class Renderer {
  constructor(canvas, game){
    this.canvas = canvas;
    this.game = game;
    this.ctx = canvas.getContext('2d');
    this.cam = { x: 0, y: 0 };
    this.drops = []; this.lastAnim = 0; // weather particles
    this.resize();
    addEventListener('resize', () => this.resize());
    this.buildBackground();
  }
  resize(){
    // native-resolution rendering: backing store at devicePixelRatio,
    // all drawing coordinates stay in CSS pixels
    this.dpr = Math.min(devicePixelRatio || 1, 2);
    if (this.dpr !== SPR_DPR){ SPR_DPR = this.dpr; spriteCache.clear(); }
    this.W = innerWidth; this.H = innerHeight;
    this.canvas.width = Math.floor(this.W * this.dpr);
    this.canvas.height = Math.floor(this.H * this.dpr);
    this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
  }
  buildBackground(){
    const M = 32;
    const corners = [
      project(-M, -M, 0), project(CFG.PITCH_L + M, -M, 0),
      project(-M, CFG.PITCH_W + M, 0), project(CFG.PITCH_L + M, CFG.PITCH_W + M, 0),
    ];
    let minX = 1e9, minY = 1e9, maxX = -1e9, maxY = -1e9;
    for (const c of corners){
      minX = Math.min(minX, c.x); maxX = Math.max(maxX, c.x);
      minY = Math.min(minY, c.y); maxY = Math.max(maxY, c.y);
    }
    minY -= (M - 9) * 0.35 * CFG.SCALE * CFG.Z_PX + 10; // headroom for raised terraces at any SCALE
    const bg = document.createElement('canvas');
    bg.width = Math.ceil(maxX - minX) + 8;
    bg.height = Math.ceil(maxY - minY) + 8;
    this.bg = bg;
    this.bgOrigin = { x: -minX + 4, y: -minY + 4 };
    const c = bg.getContext('2d');
    const P = (x, y, z) => { const s = project(x, y, z); return { x: s.x + this.bgOrigin.x, y: s.y + this.bgOrigin.y }; };
    const poly = (pts, fill) => {
      c.beginPath();
      pts.forEach((p, i) => i ? c.lineTo(p.x, p.y) : c.moveTo(p.x, p.y));
      c.closePath(); c.fillStyle = fill; c.fill();
    };
    c.fillStyle = '#23292e'; c.fillRect(0, 0, bg.width, bg.height);
    const rng = mulberry32(1337);
    poly([P(-M,-M),P(CFG.PITCH_L+M,-M),P(CFG.PITCH_L+M,CFG.PITCH_W+M),P(-M,CFG.PITCH_W+M)], '#2e3338');
    const grass = GRASS_TYPES[this.game.grassKey] || GRASS_TYPES.classic;
    const weather = WEATHER_TYPES[this.game.weatherKey] || WEATHER_TYPES.sunny;
    const L = CFG.PITCH_L, Wd = CFG.PITCH_W;
    poly([P(-9,-9),P(L+9,-9),P(L+9,Wd+9),P(-9,Wd+9)], grass.apron);
    // PitchThemeManager: mowing pattern engine, clipped to the pitch
    c.save();
    c.beginPath();
    [P(0,0),P(L,0),P(L,Wd),P(0,Wd)].forEach((p2, i) => i ? c.lineTo(p2.x, p2.y) : c.moveTo(p2.x, p2.y));
    c.closePath(); c.clip();
    poly([P(0,0),P(L,0),P(L,Wd),P(0,Wd)], grass.stripeA);
    c.fillStyle = grass.stripeB;
    switch (grass.pattern){
      case 'h':
        for (let i = 0; i < 20; i += 2)
          poly([P(i*L/20,0),P((i+1)*L/20,0),P((i+1)*L/20,Wd),P(i*L/20,Wd)], grass.stripeB);
        break;
      case 'v':
        for (let j = 0; j < 10; j += 2)
          poly([P(0,j*Wd/10),P(L,j*Wd/10),P(L,(j+1)*Wd/10),P(0,(j+1)*Wd/10)], grass.stripeB);
        break;
      case 'check':
        for (let i = 0; i < 10; i++) for (let j = 0; j < 8; j++)
          if ((i + j) % 2)
            poly([P(i*L/10,j*Wd/8),P((i+1)*L/10,j*Wd/8),P((i+1)*L/10,(j+1)*Wd/8),P(i*L/10,(j+1)*Wd/8)], grass.stripeB);
        break;
      case 'diag': { // diagonal in world = horizontal bands in screen space
        const y0 = P(0,0).y, y1 = P(L,Wd).y;
        for (let sy = y0; sy < y1; sy += 34) c.fillRect(-4000, sy, 8000, 17);
        break;
      }
      case 'rings': { // concentric mowing rings around the centre spot
        const s0 = P(L/2, Wd/2, 0);
        for (let r = 62; r > 5; r -= 7){
          if (((r / 7) | 0) % 2) continue;
          c.beginPath();
          c.ellipse(s0.x, s0.y, r * CFG.SCALE, r * CFG.SCALE * CFG.ISO, 0, 0, 7);
          c.ellipse(s0.x, s0.y, Math.max(1, (r - 7)) * CFG.SCALE, Math.max(1, (r - 7)) * CFG.SCALE * CFG.ISO, 0, 0, 7);
          c.fill('evenodd');
        }
        break;
      }
      // 'none': flat cut, character comes from wear
    }
    c.restore();
    // FieldWearGenerator visuals: irregular layered blobs from the SAME data
    // that drives the physics grid — organic shapes, never neat ovals
    if (this.game.surfaceMap){
      c.save();
      c.beginPath();
      [P(-8,-8),P(L+8,-8),P(L+8,Wd+8),P(-8,Wd+8)].forEach((p2, i) => i ? c.lineTo(p2.x, p2.y) : c.moveTo(p2.x, p2.y));
      c.closePath(); c.clip();
      for (const b of this.game.surfaceMap.blobs){
        const brng = mulberry32(b.seed);
        c.beginPath();
        const n = 8 + (brng() * 5 | 0);
        for (let i = 0; i <= n; i++){
          const a = (i % n) / n * Math.PI * 2;
          const rr = b.r * (0.55 + brng() * 0.75);
          const s = P(b.x + Math.cos(a) * rr * b.sx, b.y + Math.sin(a) * rr * b.sy * 0.9, 0);
          i ? c.lineTo(s.x, s.y) : c.moveTo(s.x, s.y);
        }
        c.closePath();
        c.globalAlpha = b.alpha;
        c.fillStyle = b.col;
        c.fill();
        if (b.kind === 'puddle'){ // wet sheen highlight
          c.globalAlpha = b.alpha * 0.7;
          const hs = P(b.x - b.r * 0.25, b.y - b.r * 0.25, 0);
          c.fillStyle = 'rgba(200,225,245,0.55)';
          c.beginPath(); c.ellipse(hs.x, hs.y, b.r * b.sx * 3.6, b.r * b.sy * 1.6, 0, 0, 7); c.fill();
        }
        c.globalAlpha = 1;
      }
      c.restore();
    }
    for (let i = 0; i < 14000; i++){
      const wx = rng() * L, wy = rng() * Wd;
      const s = P(wx, wy, 0);
      c.fillStyle = rng() < 0.5 ? 'rgba(20,60,25,0.14)' : 'rgba(210,240,200,0.10)';
      c.fillRect(Math.round(s.x), Math.round(s.y), 2, 1);
    }
    if (weather.snowy){ // snow-dusted pitch
      poly([P(-9,-9),P(CFG.PITCH_L+9,-9),P(CFG.PITCH_L+9,CFG.PITCH_W+9),P(-9,CFG.PITCH_W+9)], 'rgba(235,242,250,0.4)');
      c.fillStyle = 'rgba(250,252,255,0.5)';
      for (let i = 0; i < 5000; i++){
        const s = P(rng() * CFG.PITCH_L, rng() * CFG.PITCH_W, 0);
        c.fillRect(Math.round(s.x), Math.round(s.y), 2, 1);
      }
    }
    // stadium structure last so the apron never overpaints stand front walls
    if (this.game.stadium) this.game.stadium.drawStructure(c, P);
    // (pitch lines are drawn per-frame in drawPitchLines for full sharpness)
    for (const [cx, cy] of [[0,0],[CFG.PITCH_L,0],[0,CFG.PITCH_W],[CFG.PITCH_L,CFG.PITCH_W]]){
      const b0 = P(cx, cy, 0), b1 = P(cx, cy, 1.6);
      c.strokeStyle = '#e8e0d0'; c.lineWidth = 1.5;
      c.beginPath(); c.moveTo(b0.x, b0.y); c.lineTo(b1.x, b1.y); c.stroke();
      c.fillStyle = '#e8c23a'; c.fillRect(b1.x, b1.y, 6, 4);
    }
  }
  // pitch markings drawn as vectors every frame: crisp at any resolution/DPR
  drawPitchLines(ctx, ox, oy){
    const S = (x, y) => { const s = project(x, y, 0); return { x: s.x + ox, y: s.y + oy }; };
    ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 2; ctx.lineJoin = 'round';
    const line = pts => {
      ctx.beginPath();
      pts.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
      ctx.stroke();
    };
    const circle = (cx, cy, r, filterFn) => {
      ctx.beginPath();
      let started = false;
      for (let a = 0; a <= Math.PI * 2 + 0.01; a += Math.PI / 40){
        const wx = cx + Math.cos(a) * r, wy = cy + Math.sin(a) * r;
        if (filterFn && !filterFn(wx, wy)){ started = false; continue; }
        const s = S(wx, wy);
        if (!started){ ctx.moveTo(s.x, s.y); started = true; } else ctx.lineTo(s.x, s.y);
      }
      ctx.stroke();
    };
    line([S(0,0),S(CFG.PITCH_L,0),S(CFG.PITCH_L,CFG.PITCH_W),S(0,CFG.PITCH_W),S(0,0)]);
    line([S(CFG.PITCH_L/2,0),S(CFG.PITCH_L/2,CFG.PITCH_W)]);
    circle(CFG.PITCH_L/2, 34, CFG.CIRCLE);
    for (const gx of [0, CFG.PITCH_L]){
      const inw = gx === 0 ? 1 : -1;
      const bx = gx + inw * CFG.BOX_D, sx = gx + inw * CFG.SIX_D;
      line([S(gx, 34-CFG.BOX_W/2), S(bx, 34-CFG.BOX_W/2), S(bx, 34+CFG.BOX_W/2), S(gx, 34+CFG.BOX_W/2)]);
      line([S(gx, 34-CFG.SIX_W/2), S(sx, 34-CFG.SIX_W/2), S(sx, 34+CFG.SIX_W/2), S(gx, 34+CFG.SIX_W/2)]);
      const spot = S(gx + inw * CFG.SPOT, 34);
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.beginPath(); ctx.ellipse(spot.x, spot.y, 2.4, 1.2, 0, 0, 7); ctx.fill();
      circle(gx + inw * CFG.SPOT, 34, CFG.CIRCLE, (wx) => inw === 1 ? wx > bx : wx < bx);
    }
    const spotC = S(CFG.PITCH_L/2, 34);
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath(); ctx.ellipse(spotC.x, spotC.y, 2.4, 1.2, 0, 0, 7); ctx.fill();
    for (const [cx, cy] of [[0,0],[CFG.PITCH_L,0],[0,CFG.PITCH_W],[CFG.PITCH_L,CFG.PITCH_W]])
      circle(cx, cy, 1, (wx,wy) => wx>=0 && wx<=CFG.PITCH_L && wy>=0 && wy<=CFG.PITCH_W);
  }
  // net and frame are separate depth-sorted entities so keepers and the ball
  // occlude correctly around the goalmouth
  drawGoalNet(ctx, ox, oy, gx){
    const inward = gx === 0 ? 1 : -1;
    const backX = gx - inward * 1.9;
    const y0 = 34 - CFG.GOAL_W/2, y1 = 34 + CFG.GOAL_W/2;
    const H = CFG.GOAL_H, BH = 1.7;
    const S0 = (x, y, z) => { const s = project(x, y, z); return { x: s.x + ox, y: s.y + oy }; };
    // GoalNetPhysics: stretch + ripple around the impact, decaying in ~1.4s.
    // Displacement scales with ball speed and falls off from the hit point.
    const fx2 = NET_FX[gx === 0 ? 0 : 1];
    const age = fx2 ? this.game.animT - fx2.at : 99;
    const act = fx2 && age >= 0 && age < 1.4;
    const S = !act ? S0 : (x, y, z) => {
      const d2 = (y - fx2.y) * (y - fx2.y) + (z - fx2.z) * (z - fx2.z) * 1.5;
      const off = fx2.power * 1.15 * Math.exp(-d2 / 2.4) * Math.exp(-age * 2.8)
        * Math.cos(age * 19 - Math.sqrt(d2) * 2.4);
      return S0(x - inward * Math.max(-0.25, off),
        y + (y - fx2.y) * off * 0.14,
        z + Math.max(-0.3, (z - fx2.z) * off * 0.12));
    };
    ctx.fillStyle = 'rgba(240,240,240,0.13)';
    const quad = (a, b, cc, d) => {
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.lineTo(cc.x, cc.y); ctx.lineTo(d.x, d.y); ctx.closePath(); ctx.fill();
    };
    quad(S(backX, y0, 0), S(backX, y1, 0), S(backX, y1, BH), S(backX, y0, BH));
    quad(S(gx, y0, H), S(gx, y1, H), S(backX, y1, BH), S(backX, y0, BH));
    quad(S(gx, y0, 0), S(gx, y0, H), S(backX, y0, BH), S(backX, y0, 0));
    quad(S(gx, y1, 0), S(gx, y1, H), S(backX, y1, BH), S(backX, y1, 0));
    ctx.strokeStyle = 'rgba(240,240,240,0.30)'; ctx.lineWidth = 0.6;
    ctx.beginPath();
    for (let i = 0; i <= 11; i++){
      const yy = y0 + (y1 - y0) * i / 11;
      const a = S(backX, yy, 0), b = S(backX, yy, BH), cc = S(gx, yy, H);
      ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.lineTo(cc.x, cc.y);
    }
    for (let j = 0; j <= 5; j++){
      const zz = BH * j / 5;
      const a = S(backX, y0, zz), b = S(backX, y1, zz);
      ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
    }
    ctx.stroke();
    ctx.lineWidth = 1; ctx.strokeStyle = '#f4f4f0';
    const p0t = S(gx, y0, H), p1t = S(gx, y1, H);
    const b0 = S(backX, y0, 0), b0t = S(backX, y0, BH), b1 = S(backX, y1, 0), b1t = S(backX, y1, BH);
    ctx.beginPath();
    ctx.moveTo(b0.x, b0.y); ctx.lineTo(b0t.x, b0t.y); ctx.lineTo(p0t.x, p0t.y);
    ctx.moveTo(b1.x, b1.y); ctx.lineTo(b1t.x, b1t.y); ctx.lineTo(p1t.x, p1t.y);
    ctx.stroke();
  }
  drawGoalFrame(ctx, ox, oy, gx){
    const y0 = 34 - CFG.GOAL_W/2, y1 = 34 + CFG.GOAL_W/2;
    const H = CFG.GOAL_H;
    const S = (x, y, z) => { const s = project(x, y, z); return { x: s.x + ox, y: s.y + oy }; };
    ctx.strokeStyle = '#f4f4f0'; ctx.lineWidth = 2;
    const p0 = S(gx, y0, 0), p0t = S(gx, y0, H), p1 = S(gx, y1, 0), p1t = S(gx, y1, H);
    ctx.beginPath();
    ctx.moveTo(p0.x, p0.y); ctx.lineTo(p0t.x, p0t.y);
    ctx.moveTo(p1.x, p1.y); ctx.lineTo(p1t.x, p1t.y);
    ctx.moveTo(p0t.x, p0t.y); ctx.lineTo(p1t.x, p1t.y);
    ctx.stroke();
  }
  poseFrame(p, game){
    const def = POSES[p.action] || POSES.idle;
    if (def.cyclic){
      const t = def.clock === 'time' ? game.animT * 2.2 + (p.animPhase || 0) : p.runPhase * 1.1;
      return Math.floor(t) % def.frames;
    }
    const prog = p.actionDur > 0 ? 1 - p.actionT / p.actionDur : 1;
    return Math.min(def.frames - 1, Math.floor(prog * def.frames));
  }
  drawEntity(ctx, ox, oy, p, game){
    const s = project(p.pos.x, p.pos.y, p.zBase || 0);
    const px = Math.round(s.x + ox), py = Math.round(s.y + oy);
    const spr = getSprite(p.app, p.action, this.poseFrame(p, game), screenOct(p.facing));
    const sc = p.sprScale || 1; // ball kids are visibly smaller
    // destination sized from the actual (ceil'd) bitmap so fractional DPRs don't resample
    ctx.drawImage(spr, px - SPR_AX * SPR_UNIT * sc, py - SPR_AY * SPR_UNIT * sc, spr.width / SPR_DPR * sc, spr.height / SPR_DPR * sc);
  }
  frame(game){
    const ctx = this.ctx, W = this.W, H = this.H;
    const b = game.ball;
    // CameraSystem decides the target: replay cinematics > free inspection >
    // follow (ball or followed player); zoom applies about the screen centre
    const cam = game.camera
      ? game.camera.frameTarget()
      : { x: (() => { const s = project(b.x, b.y, 0); return s.x; })(), y: project(b.x, b.y, 0).y, k: 0.06, zoom: 1 };
    this.cam.x = lerp(this.cam.x, cam.x, cam.k);
    this.cam.y = lerp(this.cam.y, cam.y, cam.k);
    const zoom = cam.zoom || 1;
    this.lastZoom = zoom; // for zoom-aware click hit-testing
    const ox = Math.round(W / 2 - this.cam.x);
    const oy = Math.round(H / 2 - this.cam.y + 12);
    this.lastOx = ox; this.lastOy = oy; // for click hit-testing
    ctx.fillStyle = '#23292e'; ctx.fillRect(0, 0, W, H);
    const zoomed = Math.abs(zoom - 1) > 1e-3;
    if (zoomed){
      ctx.save();
      ctx.translate(W / 2, H / 2); ctx.scale(zoom, zoom); ctx.translate(-W / 2, -H / 2);
    }
    ctx.drawImage(this.bg, ox - this.bgOrigin.x, oy - this.bgOrigin.y);
    this.drawPitchLines(ctx, ox, oy);
    if (game.stadium) game.stadium.drawCrowd(ctx, ox, oy); // living crowd, roofs, ad boards
    // shadow pass: length/strength follow the weather's light
    ctx.fillStyle = 'rgba(0,0,0,' + ENV.shadowA + ')';
    const allBodies = [...game.teams[0].players, ...game.teams[1].players, game.ref];
    for (const p of allBodies){
      const s = project(p.pos.x, p.pos.y, 0);
      ctx.beginPath(); ctx.ellipse(Math.round(s.x + ox) + ENV.shadowDx, Math.round(s.y + oy), 6, 3, 0, 0, 7); ctx.fill();
    }
    { const s = project(b.x, b.y, 0);
      const shrink = clamp(1 - b.z * 0.05, 0.4, 1);
      ctx.beginPath(); ctx.ellipse(Math.round(s.x + ox) + 2, Math.round(s.y + oy), 3.8 * shrink, 2 * shrink, 0, 0, 7); ctx.fill();
    }
    if (game.humanMode && game.selected){
      const p = game.selected;
      const s = project(p.pos.x, p.pos.y, 0);
      ctx.strokeStyle = '#ffe24a'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.ellipse(Math.round(s.x + ox), Math.round(s.y + oy), 9, 4.5, 0, 0, 7); ctx.stroke();
    }
    // subtle pulsing ring under the profiled/followed player
    if (game.statsFor && game.statsFor.team){
      const p = game.statsFor;
      const s = project(p.pos.x, p.pos.y, 0);
      const pulse = 1 + Math.sin(game.animT * 5) * 0.12;
      ctx.strokeStyle = game.followPlayer === p ? '#ffe24a' : 'rgba(255,255,255,0.85)';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.ellipse(s.x + ox, s.y + oy, 10 * pulse, 5 * pulse, 0, 0, 7); ctx.stroke();
    }
    // script debug highlight: active actor (accent) and target (white)
    const sr = game.scriptRunner;
    if (sr && sr.active && sr.t() < sr.active.until){
      for (const [pl, col] of [[sr.active.actor, UITheme.accent], [sr.active.target, '#ffffff']]){
        if (!pl) continue;
        const s = project(pl.pos.x, pl.pos.y, 0);
        ctx.strokeStyle = col; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.ellipse(s.x + ox, s.y + oy, 11, 5.5, 0, 0, 7); ctx.stroke();
      }
      if (sr.active.actor && sr.active.target){
        const a = project(sr.active.actor.pos.x, sr.active.actor.pos.y, 0);
        const b2 = project(sr.active.target.pos.x, sr.active.target.pos.y, 0);
        ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(a.x + ox, a.y + oy); ctx.lineTo(b2.x + ox, b2.y + oy); ctx.stroke();
        ctx.setLineDash([]);
      }
    }
    // depth-sorted entities
    const ents = [];
    for (const p of allBodies)
      ents.push({ d: depthOf(p.pos.x, p.pos.y), draw: () => this.drawEntity(ctx, ox, oy, p, game) });
    if (game.stadium)
      for (const a of game.stadium.actors)
        ents.push({ d: depthOf(a.pos.x, a.pos.y), draw: () => this.drawEntity(ctx, ox, oy, a, game) });
    // real substitutes (and subbed/sent-off players) seated in the dugouts
    for (const t of game.teams)
      for (const bp2 of [...t.bench, ...t.offList])
        ents.push({ d: depthOf(bp2.pos.x, bp2.pos.y), draw: () => this.drawEntity(ctx, ox, oy, bp2, game) });
    ents.push({ d: depthOf(b.x, b.y) + clamp(b.z - 0.5, 0, 2.5) * 0.6, draw: () => {
      // trail ghosts when the ball flies
      if (b.speed() > 14 && game.match.state === 'PLAYING'){
        for (let i = 1; i < b.trail.length; i++){
          const t = b.trail[i];
          const ts = project(t.x, t.y, t.z);
          ctx.fillStyle = 'rgba(248,248,244,' + (0.22 - i * 0.06) + ')';
          ctx.beginPath(); ctx.arc(ts.x + ox, ts.y + oy, 2.1, 0, 7); ctx.fill();
        }
      }
      const s = project(b.x, b.y, b.z);
      const r = 2.6 + b.z * 0.09;
      ctx.fillStyle = '#f8f8f4';
      ctx.beginPath(); ctx.arc(s.x + ox, s.y + oy, r, 0, 7); ctx.fill();
      ctx.fillStyle = '#6a6a66';
      const ra = b.roll * 3;
      ctx.fillRect(s.x + ox + Math.cos(ra) * r * 0.45 - 0.8, s.y + oy + Math.sin(ra) * r * 0.45 - 0.8, 1.8, 1.8);
      ctx.fillRect(s.x + ox + Math.cos(ra + 2.4) * r * 0.4 - 0.7, s.y + oy + Math.sin(ra + 2.4) * r * 0.4 - 0.7, 1.5, 1.5);
    }});
    ents.push({ d: depthOf(-1.9, 34 - CFG.GOAL_W/2), draw: () => this.drawGoalNet(ctx, ox, oy, 0) });
    ents.push({ d: depthOf(0, 34 - CFG.GOAL_W/2), draw: () => this.drawGoalFrame(ctx, ox, oy, 0) });
    ents.push({ d: depthOf(CFG.PITCH_L + 1.9, 34 + CFG.GOAL_W/2), draw: () => this.drawGoalNet(ctx, ox, oy, CFG.PITCH_L) });
    ents.push({ d: depthOf(CFG.PITCH_L, 34 + CFG.GOAL_W/2), draw: () => this.drawGoalFrame(ctx, ox, oy, CFG.PITCH_L) });
    ents.sort((a, bb) => a.d - bb.d);
    for (const e of ents) e.draw();
    if (game.stadium) game.stadium.drawFrontFx(ctx, ox, oy);
    if (game.fx) game.fx.draw(ctx, ox, oy); // sub boards, coach bubbles
    // call-for-ball shouts: tiny chips above open players (live play only)
    ctx.font = 'bold 9px monospace';
    for (const t of game.teams){
      if (game.match.state !== 'PLAYING') break;
      for (const p of t.players){
        if (!p.callT || p.callT <= 0) continue;
        const s = project(p.pos.x, p.pos.y, 3);
        const px2 = Math.round(s.x + ox), py2 = Math.round(s.y + oy);
        const w2 = ctx.measureText(p.callText).width + 8;
        ctx.globalAlpha = clamp(p.callT * 3, 0, 1);
        ctx.fillStyle = 'rgba(12,16,20,0.88)'; ctx.fillRect(px2 - w2 / 2, py2 - 12, w2, 12);
        ctx.fillStyle = '#dce8f0'; ctx.fillText(p.callText, px2 - w2 / 2 + 4, py2 - 10);

    const tracked = game.trackPlayer();
    if (tracked){
      const s = project(tracked.pos.x, tracked.pos.y, 3.2);
      ctx.fillStyle = 'rgba(255,226,74,0.95)';
      ctx.beginPath();
      ctx.moveTo(s.x + ox, s.y + oy);
      ctx.lineTo(s.x + ox - 5, s.y + oy - 8);
      ctx.lineTo(s.x + ox + 5, s.y + oy - 8);
      ctx.closePath(); ctx.fill();
    }
    if (game.humanMode && game.selected){
      // EnergyUI: the controlled player's tank floats above his head
      const selP = game.selected;
      const ss = project(selP.pos.x, selP.pos.y, 3.4);
      const st2 = clamp(selP.stamina, 0, 1);
      ctx.fillStyle = 'rgba(10,13,17,0.7)';
      ctx.fillRect(ss.x + ox - 9, ss.y + oy - 4, 18, 4);
      ctx.fillStyle = st2 > 0.55 ? UITheme.good : (st2 > 0.35 ? UITheme.warn : (st2 > 0.22 ? '#e08a3a' : UITheme.bad));
      if (st2 <= 0.22) ctx.globalAlpha = 0.55 + 0.45 * Math.sin(game.animT * 6);
      ctx.fillRect(ss.x + ox - 8, ss.y + oy - 3, Math.max(2, 16 * st2), 2);
      ctx.globalAlpha = 1;
      const pw = Math.max(game.input.chargingPass(), game.input.chargingShot());
      if (pw > 0){
        const p = game.selected;
        const s = project(p.pos.x, p.pos.y, 2.6);
        ctx.fillStyle = '#101418'; ctx.fillRect(s.x + ox - 12, s.y + oy - 6, 24, 5);
        ctx.fillStyle = pw > 0.75 ? '#e84a3a' : '#ffe24a';

    if (zoomed) ctx.restore();

    if (game.replayFadeT !== undefined && game.animT - game.replayFadeT < 0.4){
      ctx.fillStyle = 'rgba(0,0,0,' + (0.8 * (1 - (game.animT - game.replayFadeT) / 0.4)).toFixed(2) + ')';
      ctx.fillRect(0, 0, this.W, this.H);

    this.drawWeather(game);
    this.drawHUD(game);
    if (game.debug){ this.drawDebug(game, ox, oy); this.drawTacticalDebug(game); }
    this.lastAnim = game.animT;
  }
  // WeatherRenderer: varied precipitation, fog depth, storm lightning, veils
  drawWeather(game){
    const ctx = this.ctx, w = ENV.weather;
    if (w.veil){ ctx.fillStyle = w.veil; ctx.fillRect(0, 0, this.W, this.H); }
    if (w.fog){ // distance haze: thicker toward the far stands (screen top)
      const gr = ctx.createLinearGradient(0, 0, 0, this.H * 0.75);
      gr.addColorStop(0, 'rgba(205,215,225,' + (w.fog * 0.75) + ')');
      gr.addColorStop(1, 'rgba(205,215,225,0)');
      ctx.fillStyle = gr; ctx.fillRect(0, 0, this.W, this.H * 0.75);
    }
    const dt = clamp(game.animT - this.lastAnim, 0, 0.1);
    if (w.storm){ // lightning: quick double-flash now and then
      this.lightT = Math.max(0, (this.lightT || 0) - dt);
      if (this.lightT <= 0 && Math.random() < dt * 0.07) this.lightT = 0.14;
      if (this.lightT > 0 && ((this.lightT * 30) | 0) % 2 === 0){
        ctx.fillStyle = 'rgba(235,240,255,0.25)'; ctx.fillRect(0, 0, this.W, this.H);
      }
    }
    if (!w.particles){ this.drops.length = 0; return; }
    const want = w.particles === 'rain' ? (w.rainN || 170) : 130;
    while (this.drops.length < want) this.drops.push({ x: Math.random() * this.W, y: Math.random() * this.H, ph: Math.random() * 6.28 });
    if (this.drops.length > want) this.drops.length = want;
    if (w.particles === 'rain'){
      // wind-driven: drift and streak angle follow the match wind
      const drift = 90 + ENV.wind.x * 26;
      const len = w.rainLen || 11;
      ctx.strokeStyle = 'rgba(190,210,235,' + (len < 9 ? 0.3 : 0.45) + ')';
      ctx.lineWidth = len < 9 ? 0.9 : 1.2;
      ctx.beginPath();
      for (const d of this.drops){
        d.y += (560 + len * 12) * dt; d.x += drift * dt;
        if (d.y > this.H){ d.y = -14; d.x = Math.random() * this.W; }
        ctx.moveTo(d.x, d.y); ctx.lineTo(d.x - drift * 0.02 * len, d.y - len);
      }
      ctx.stroke();
    } else {
      ctx.fillStyle = 'rgba(245,248,252,0.85)';
      for (const d of this.drops){
        d.y += 62 * dt; d.x += (Math.sin(game.animT * 1.4 + d.ph) * 30 + ENV.wind.x * 8) * dt;
        if (d.y > this.H){ d.y = -6; d.x = Math.random() * this.W; }
        if (d.x > this.W + 8) d.x = -8; else if (d.x < -8) d.x = this.W + 8;
        ctx.beginPath(); ctx.arc(d.x, d.y, 1.1 + (d.ph % 1.4), 0, 7); ctx.fill();
      }
    }
  }

  // SubstitutionManager UI: bench list -> pick who comes off -> confirm
  drawSubPanel(game){

    this.panelShell(game, box,

    ctx.fillText('subs used ' + team.subsUsed + '/' + CFG.MAX_SUBS, box.x + 12, y);
    y += 20;
    const rowH = box.mobile ? 42 : 30;
    const row = (p, cb, tint, rx, rw) => {
      rx = rx === undefined ? box.x + 8 : rx;
      rw = rw === undefined ? box.w - 16 : rw;
      const r = matchRating(p);
      ctx.fillStyle = tint || 'rgba(255,255,255,0.06)';
      ctx.fillRect(rx, y, rw, rowH - 4);
      ctx.fillStyle = p.team.kit.shirt; ctx.fillRect(rx + 4, y + rowH/2 - 8, 4, 12);
      ctx.font = 'bold 12px monospace'; ctx.fillStyle = '#e8eef4';
      ctx.fillText('#' + p.num + ' ' + p.name, rx + 14, y + rowH/2 - 13);
      ctx.font = '11px monospace'; ctx.fillStyle = '#8a98a4';
      ctx.fillText(p.role + ' · rat ' + r.toFixed(1) + ' · Ξ' + p.value.toFixed(2) + (p.stats.yellow ? ' · [Y]' : ''), rx + 14, y + rowH/2 + 1);
      if (rw > 200){
        ctx.fillStyle = 'rgba(255,255,255,0.12)'; ctx.fillRect(rx + rw - 68, y + rowH/2 - 4, 58, 7);
        ctx.fillStyle = p.stamina < 0.5 ? '#d86a4a' : '#5ac26a';
        ctx.fillRect(rx + rw - 68, y + rowH/2 - 4, 58 * p.stamina, 7);
      }
      if (cb) this.zone(game, rx, y, rw, rowH - 4, cb);
    };
    if (st.stage === 'bench'){
      for (const b2 of team.bench){
        row(b2, () => { game.panel = { type:'sub', stage:'pickOut', benchPick: b2 }; game.panelT = game.animT; });

      }
      if (!team.bench.length){ ctx.fillStyle = '#8a98a4'; ctx.fillText('no substitutes left', box.x + 12, y + 4); }
    } else if (st.stage === 'pickOut'){
      row(st.benchPick, null, 'rgba(90,194,106,0.16)');
      y += rowH + 4;
      const gkPick = st.benchPick.slot.role === 'GK';
      const outs = team.players.filter(p => p.isGK === gkPick);
      // two columns on mobile so all 10 outfielders fit the sheet
      const cols = box.mobile && outs.length > 6 ? 2 : 1;
      const colW = (box.w - 16 - (cols - 1) * 4) / cols;
      outs.forEach((p, i) => {
        const rx = box.x + 8 + (i % cols) * (colW + 4);
        row(p, () => { game.panel = { type:'sub', stage:'confirm', benchPick: st.benchPick, outPick: p }; game.panelT = game.animT; }, null, rx, colW);
        if (i % cols === cols - 1 || i === outs.length - 1) y += rowH;
      });
    } else {
      row(st.outPick, null, 'rgba(216,106,74,0.2)');
      y += rowH;
      ctx.font = 'bold 12px monospace'; ctx.fillStyle = '#8a98a4';
      ctx.fillText('-> replaced by', box.x + 12, y + 2); y += 20;
      row(st.benchPick, null, 'rgba(90,194,106,0.2)');
      y += rowH + 10;
      const bw2 = (box.w - 36) / 2;
      const can = team.subsUsed < CFG.MAX_SUBS && team.players.includes(st.outPick) && team.bench.includes(st.benchPick)
        && !game.match.pendingFoul && !(st.outPick.isGK && game.ball.holder === st.outPick);
      this.btn(game, box.x + 12, y, bw2, box.bh, 'CONFIRM', { active: can, dim: !can, color: '#5ac26a',
        cb: () => { if (game.performSub(team, st.outPick, st.benchPick)) game.closePanel(); } });
      this.btn(game, box.x + 24 + bw2, y, bw2, box.bh, 'CANCEL', { cb: () => game.closePanel() });
    }

  // TacticalPanel: segmented, game-like, applies instantly
  drawTacticsPanel(game){

    this.panelShell(game, box, 'TACTICS — ' + team.code, team.kit.shirt);

    const near = (v, arr) => { let bi = 0, bd = 9; arr.forEach((a, i) => { const d = Math.abs(a - v); if (d < bd){ bd = d; bi = i; } }); return bi; };

      });
      y += bh + 9;
    };

      i => T.pressing = [0.3, 0.55, 0.85][i]);

      i => T.defLine = [0.3, 0.5, 0.75][i]);

      ctx.beginPath(); ctx.moveTo(a2.x + ox, a2.y + oy); ctx.lineTo(b2.x + ox, b2.y + oy); ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;
      if (t.dlm.trapActive){
        ctx.fillStyle = t.kit.shirt; ctx.font = 'bold 10px monospace';
        ctx.fillText('TRAP!', a2.x + ox + 4, a2.y + oy - 12);
      }
    }
    const W = this.W;
    ctx.fillStyle = 'rgba(8,12,16,0.72)'; ctx.fillRect(W - 246, 30, 240, 116);
    ctx.fillStyle = '#c8d8e0'; ctx.font = '12px monospace';
    const sel = game.statsFor || game.selected || b.controller || b.lastToucher;
    const lines = [
      'ball v=' + b.speed().toFixed(1) + ' z=' + b.z.toFixed(2) + ' spin=' + b.spin.toFixed(1),
      'state=' + game.match.state + ' fps=' + game.fps.toFixed(0) + ' spr=' + spriteCache.size,
      'tactics: ' + ['tempo', 'risk', 'pressing', 'shootTendency', 'crossing', 'timeWaste', 'defAggression']
        .map(k => k.slice(0, 5) + ' ' + (+(game.teams[0].tactics[k] ?? 0)).toFixed(1)).join(' · ')
        + ' · side ' + (game.teams[0].tactics.attackSide || 'both'),
      'env fr=' + ENV.groundFr.toFixed(2) + ' bounce=' + ENV.bounce.toFixed(2) + ' spd=' + ENV.speedMul.toFixed(2),
      'ref: ' + game.ref.action + ' foul=' + (game.match.pendingFoul ? 'pending' : '-'),
      sel ? ('sel: #' + sel.num + ' ' + sel.name + ' (' + sel.role + ')') : 'sel: -',
      sel ? (' duty=' + sel.duty + ' dec=' + (sel.decision ? sel.decision.type : '-') + ' act=' + sel.action) : '',
      'fouls ' + game.teams[0].fouls + '-' + game.teams[1].fouls + ' hdr=' + game.counts.header + ' fk=' + game.counts.freekick,
    ];
    lines.forEach((l, i) => ctx.fillText(l, W - 240, 36 + i * 15));
  }
}

// Short broadcast-flavor scripts that run on the render clock: they never
// touch the simulation loop and expire on their own.
class EventAnimationManager {
  constructor(game){ this.game = game; this.list = []; }
  play(anim){ if (this.game.replayMode) return; anim.t = 0; this.list.push(anim); }
  update(dt){
    for (const a of this.list){ a.t += dt; if (a.update) a.update(dt, this.game); }
    this.list = this.list.filter(a => a.t < a.dur);
  }
  draw(ctx, ox, oy){
    for (const a of this.list) if (a.draw) a.draw(ctx, ox, oy, this.game);
  }
}
// SubstitutionAnimation: the fourth official raises the numbers board.
class SubstitutionAnimation {

    ctx.fillStyle = '#14171c'; ctx.fillRect(px - 15, py - 24, 30, 26);
    ctx.fillStyle = '#8a2626'; ctx.fillRect(px - 13, py - 22, 26, 11);

    ctx.fillText(String(this.out.num), px, py - 21);

// CoachInstructionAnimation: the coach barks, nearby players glance over.
// sim-relevant side effect of a coach shout: nearby players glance at the
// bench (glanceT turns facing, which feeds kick error) — shared so strict
// script replay reproduces it exactly
function coachGlance(team){
  for (const p of team.players)
    if (!p.isGK && p.pos.y < 24 && Math.abs(p.pos.x - 52.5) < 34) p.glanceT = 0.9;

class CoachInstructionAnimation {

// RefereeCardAnimation: protests around the referee while the card is up.
class RefereeCardAnimation {
  constructor(game, offender, card){
    this.dur = 2;
    if (offender && offender.setAction) offender.setAction('shield', 1.4); // arms out in protest
    if (offender){
      let n = 0;
      for (const p of offender.team.players){
        if (p !== offender && !p.isGK && dist(p.pos, offender.pos) < 9 && n < 2){
          p.setAction('point', 1.1); n++;

// GoalCelebrationAnimation: the scorer wheels away, teammates chase him,
// the beaten keeper hits the turf. Runs only during the frozen GOAL state.
class GoalCelebrationAnimation {
  constructor(game, scorer, team){
    this.dur = 2.4;
    this.scorer = scorer && team && scorer.team === team ? scorer : null;
    this.mates = this.scorer
      ? team.players.filter(p => p !== this.scorer && dist(p.pos, this.scorer.pos) < 38).slice(0, 6) : [];
    const other = team ? game.other(team) : null;
    if (other && other.gk && other.gk.setAction) other.gk.setAction('fall', 1.4);
    if (this.scorer)
      this.run = norm({ x: this.scorer.pos.x < 52.5 ? -1 : 1, y: this.scorer.pos.y < 34 ? -0.6 : 0.6 });
  }
  update(dt, game){
    if (game.match.state !== 'GOAL' || !this.scorer) return;
    const s = this.scorer;
    s.pos.x = clamp(s.pos.x + this.run.x * 4 * dt, 2, 103);
    s.pos.y = clamp(s.pos.y + this.run.y * 4 * dt, 2, 66);
    s.runPhase += 4 * dt;
    for (const m2 of this.mates){
      const d = dist(m2.pos, s.pos);
      if (d > 2.2){
        m2.pos.x += (s.pos.x - m2.pos.x) / d * 5 * dt;
        m2.pos.y += (s.pos.y - m2.pos.y) / d * 5 * dt;
        m2.facing = Math.atan2(s.pos.y - m2.pos.y, s.pos.x - m2.pos.x);
        m2.runPhase += 5 * dt;
      }
    }
  }
}

/* --------------------------- COMMENTARY GENERATOR --------------------------- */
// Turns real match events into short, dramatic feed lines. Every entry the
// MatchHistoryLog shows comes through here — nothing is invented.
function commentaryText(type, d){
  const pick = arr => arr[(Math.random() * arr.length) | 0];
  const nm = p => p ? '#' + p.num + ' ' + p.name : 'the player';
  const tn = t => t ? t.name : '';
  switch (type){
    case 'kickoff':
      return d.half === 2 ? pick(['Second half underway!', 'Back out for the second half.'])
        : pick(["We're underway!", 'The referee gets us started.']);
    case 'goal':
      if (d.og) return 'Disaster — ' + nm(d.p) + ' turns it into his own net!';
      return d.a
        ? pick(['GOAL! ' + nm(d.p) + ' finishes, teed up by ' + nm(d.a) + '!',
                nm(d.a) + ' picks the lock, ' + nm(d.p) + ' buries it — GOAL ' + tn(d.team) + '!'])
        : pick(['GOAL! ' + nm(d.p) + ' strikes for ' + tn(d.team) + '!',
                'It\'s in! ' + nm(d.p) + ' with the finish!']);
    case 'shot':
      return d.on ? pick([nm(d.p) + ' lets fly — it\'s on target!', nm(d.p) + ' tests the keeper!'])
        : pick([nm(d.p) + ' has a go from range.', nm(d.p) + ' shoots…']);
    case 'miss':
      return pick([nm(d.p) + ' drags it wide — big chance gone.', 'Over the bar! ' + nm(d.p) + ' can\'t believe it.']);
    case 'save':
      return pick(['Great stop by ' + nm(d.p) + '!', nm(d.p) + ' palms it away!', nm(d.p) + ' smothers the danger.']);
    case 'chance':
      return pick([nm(d.p) + ' slips a ball in behind — danger here!', nm(d.p) + ' threads a killer pass. Big chance developing.']);
    case 'foul':
      return pick([nm(d.p) + ' brings down ' + nm(d.v) + ' — ' + d.desc + '.', 'Whistle: ' + d.desc + ' by ' + nm(d.p) + '.']);
    case 'yellow':
      return pick(['Yellow card for ' + nm(d.p) + ' after a ' + d.desc + '.', 'The referee books ' + nm(d.p) + '.']);
    case 'red':
      return pick(['RED CARD! ' + nm(d.p) + ' is off — ' + tn(d.team) + ' down to ' + d.left + '!',
                   nm(d.p) + ' sees red. ' + tn(d.team) + ' must survive with ' + d.left + '.']);
    case 'sub':
      return pick([tn(d.team) + ' substitution: ' + nm(d.sin) + ' replaces ' + nm(d.sout) + '.',
                   'Fresh legs for ' + tn(d.team) + ': ' + nm(d.sin) + ' on for ' + nm(d.sout) + '.']);
    case 'tactic':
      return pick(['Instructions from the ' + tn(d.team) + ' dugout: ' + d.what + '.',
                   tn(d.team) + ' bench signals a change — ' + d.what + '.']);
    case 'corner': return pick(['Corner for ' + tn(d.team) + ' — bodies in the box.', tn(d.team) + ' win a corner.']);
    case 'throwin': return 'Throw-in ' + tn(d.team) + '.';
    case 'goalkick': return 'Goal kick ' + tn(d.team) + '.';
    case 'offside':
      return pick(['Flag\'s up — ' + nm(d.p) + ' strayed offside.', nm(d.p) + ' timed the run badly: offside.']);
    case 'momentum':
      return pick([tn(d.team) + ' are turning the screw.', 'All ' + tn(d.team) + ' now — the pressure is building.']);
    case 'ht': return 'Half time: ' + d.score;
    case 'ft': return 'Full time: ' + d.score;
    default: return d.text || '';
  }
}

/* --------------------------- COACH COMMAND PARSER --------------------------- */
// Rule-based natural-language parsing: phrases map onto the same tactics
// fields the AI reads every think tick, so orders take effect in real time.
/* ===================== TACTICAL INTELLIGENCE SYSTEM ======================== */
// TacticalScript: the canonical, validated instruction language. Natural
// language (built-in parser or an optional LLM) compiles INTO this; the
// deterministic TacticalEngine is the only thing that applies it to play.
const TacticalScript = {
  RANGES: { pressing:1, defLine:1, mentality:1, risk:1, compactness:0.6, width:1,
    tempo:1, crossing:1, shootTendency:1, overlap:1, counter:1, timeWaste:1,
    pressAfterLoss:1, defAggression:1, gkLong:1, trap:1 },
  ENUMS: { style:['possession','direct','counter'], scheme:['zonal','man','trap'],
    attackSide:['left','right','both'], formation:['442','433','352'] },
  WORDS: { low: 0.2, slow: 0.2, deep: 0.25, normal: 0.5, medium: 0.5, mid: 0.5, high: 0.85, fast: 0.85, quick: 0.85, max: 1 },
  normalize(obj){
    const out = {}, warnings = [];
    if (!obj || typeof obj !== 'object') return { script: out, warnings: ['not an object'] };
    for (const [k, v0] of Object.entries(obj)){
      let v = v0;
      if (k in this.RANGES){
        if (typeof v === 'string') v = this.WORDS[v.toLowerCase()];
        if (typeof v === 'boolean') v = v ? 0.85 : 0.2;
        if (typeof v !== 'number' || !isFinite(v)){ warnings.push(k + ': unusable value'); continue; }
        out[k] = clamp(v, 0, this.RANGES[k]);
      } else if (k in this.ENUMS){
        const val = String(v).toLowerCase();
        if (this.ENUMS[k].includes(val)) out[k] = val;
        else warnings.push(k + ': unknown "' + v + '"');
      } else if (k === 'markTarget'){
        out.markTarget = v === null ? null : String(v);
      } else if (k === 'label' || k === 'reasoning'){ out[k] = String(v).slice(0, 220); }
      else warnings.push('unknown field ' + k);
    }
    return { script: out, warnings };
  },
};
// TacticalEngine: the single funnel — every tactics change (panel, console,
// built-in parser, LLM) passes through here, is applied deterministically
// and recorded, so strict replays reproduce coaching exactly.
const TacticalEngine = {
  apply(game, team, rawScript, sourceLabel){
    const { script, warnings } = TacticalScript.normalize(rawScript);
    const T = team.tactics;
    for (const k of Object.keys(TacticalScript.RANGES)) if (k in script) T[k] = script[k];
    if (script.style) T.style = script.style;
    if (script.scheme){ T.scheme = script.scheme; if (script.scheme !== 'trap' && script.trap === undefined) T.trap = 0; }
    if (script.attackSide) T.attackSide = script.attackSide;
    if ('markTarget' in script){
      let pid = script.markTarget;
      if (pid && String(pid).endsWith('_mark_best')){
        const opp = game.other(team);
        const best = opp.players.filter(q => q.line === 'ATT').sort((a, b) => b.rating() - a.rating())[0];
        pid = best ? best.pid : null;
      }
      const p = pid ? EventSerializer.player(game, pid) : null;
      T.markTarget = p && p.team !== team ? p.pid : null;
    }
    if (script.formation && game.setFormation) game.setFormation(team, script.formation);
    game.notifyTactic(script.label || sourceLabel || 'tactical change');
    return { applied: script, warnings };
  },
};
// LLMSettings: user-supplied credentials, stored locally, never hardcoded.
const LLMSettings = {
  KEY: 'fobal-llm',
  cache: null,
  load(){
    if (!this.cache){
      try { this.cache = JSON.parse(localStorage.getItem(this.KEY) || '{}'); }
      catch (err){ this.cache = {}; }
    }
    return this.cache;
  },
  save(patch){
    this.cache = { ...this.load(), ...patch };
    try { localStorage.setItem(this.KEY, JSON.stringify(this.cache)); } catch (err){}
    return this.cache;
  },
};
// LLMProvider: optional natural-language coach. It ONLY produces
// TacticalScript + reasoning text; the deterministic TacticalEngine applies
// it exactly like any other instruction. No LLM output ever steers gameplay
// directly, and everything works offline through the built-in parser.
const LLMProvider = {
  URLS: {
    openai: 'https://api.openai.com/v1/chat/completions',
    openrouter: 'https://openrouter.ai/api/v1/chat/completions',
    deepseek: 'https://api.deepseek.com/chat/completions',
    anthropic: 'https://api.anthropic.com/v1/messages',
    gemini: '', custom: '',
  },
  PROVIDERS: ['off', 'openai', 'anthropic', 'gemini', 'deepseek', 'openrouter', 'custom'],
  configured(){
    const s = LLMSettings.load();
    return !!(s.provider && s.provider !== 'off' && s.apiKey);
  },
  context(game){
    const m = game.match, t0 = game.teams[0], t1 = game.teams[1];
    return {
      minute: Math.min(90, Math.floor(m.tMatch / 60) + 1),
      score: t0.code + ' ' + m.score[0] + '-' + m.score[1] + ' ' + t1.code,
      coaching: t0.name,
      momentum: game.stadium ? +game.stadium.mrs.momentum.toFixed(2) : 0,
      myTactics: Object.fromEntries(Object.entries(t0.tactics).filter(([k, v]) => typeof v !== 'object')),
      opponent: { formation: t1.assignedFormation, style: t1.tactics.style, pressing: t1.tactics.pressing },
      tired: t0.players.filter(p => p.stamina < 0.45).map(p => '#' + p.num + ' ' + p.role + ' ' + Math.round(p.stamina * 100) + '%'),
    };
  },
  SYSTEM: 'You are a football tactics coach inside a simulation. Reply ONLY with JSON: '
    + '{"script":{...},"reasoning":"one or two sentences"}. The script may include any of: '
    + 'pressing, defLine, mentality, risk, compactness, width, tempo, crossing, shootTendency, overlap, '
    + 'counter, timeWaste, pressAfterLoss, defAggression, gkLong, trap (numbers 0..1); '
    + 'style ("possession"|"direct"|"counter"); scheme ("zonal"|"man"|"trap"); '
    + 'attackSide ("left"|"right"|"both"); formation ("442"|"433"|"352"); label (short summary). '
    + 'Include only the fields the instruction changes. You may also suggest substitutions or analysis in reasoning, '
    + 'but ONLY the script fields affect play.',
  async request(text, game){
    const s = LLMSettings.load();
    let url = s.endpoint || this.URLS[s.provider] || this.URLS.openai;
    const user = 'Match state: ' + JSON.stringify(this.context(game)) + '\nCoach instruction: ' + text;
    let init;
    if (s.provider === 'anthropic'){
      init = { method: 'POST', headers: {
          'content-type': 'application/json', 'x-api-key': s.apiKey,
          'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({ model: s.model || 'claude-haiku-4-5-20251001',
          max_tokens: s.maxTokens || 400, temperature: s.temperature !== undefined ? s.temperature : 0.4,
          system: this.SYSTEM, messages: [{ role: 'user', content: user }] }) };
    } else if (s.provider === 'gemini'){
      url = (s.endpoint || 'https://generativelanguage.googleapis.com/v1beta/models/'
        + (s.model || 'gemini-2.0-flash') + ':generateContent') + '?key=' + encodeURIComponent(s.apiKey);
      init = { method: 'POST', headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ systemInstruction: { parts: [{ text: this.SYSTEM }] },
          contents: [{ parts: [{ text: user }] }],
          generationConfig: { temperature: s.temperature !== undefined ? s.temperature : 0.4, maxOutputTokens: s.maxTokens || 400 } }) };
    } else {
      init = { method: 'POST', headers: { 'content-type': 'application/json', authorization: 'Bearer ' + s.apiKey },
        body: JSON.stringify({ model: s.model || (s.provider === 'deepseek' ? 'deepseek-chat' : 'gpt-4o-mini'),
          temperature: s.temperature !== undefined ? s.temperature : 0.4, max_tokens: s.maxTokens || 400,
          messages: [{ role: 'system', content: this.SYSTEM }, { role: 'user', content: user }] }) };
    }
    const r = await fetch(url, init);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    const out = s.provider === 'anthropic' ? (j.content && j.content[0] && j.content[0].text)
      : s.provider === 'gemini' ? (j.candidates && j.candidates[0] && j.candidates[0].content.parts.map(p2 => p2.text).join(''))
      : (j.choices && j.choices[0] && j.choices[0].message.content);
    const m = String(out || '').match(/\{[\s\S]*\}/);
    if (!m) throw new Error('no JSON in reply');
    const parsed = JSON.parse(m[0]);
    return { script: parsed.script || parsed, reasoning: parsed.reasoning || '' };
  },
  async coachAsync(game, text){
    game.announce('COACH is thinking…', 2.2);
    try {
      const { script, reasoning } = await this.request(text, game);
      TacticalEngine.apply(game, game.teams[0], script, script.label || 'AI coach');
      game.syncFormation(game.teams[0]);
      game.announce('COACH ▸ ' + (script.label || 'tactics updated'), 3.2);
      if (reasoning) game.commentate('raw', { text: 'COACH: ' + String(reasoning).slice(0, 180) });
    } catch (err){
      const { script, msgs } = parseCoach(text, game.teams[0]);
      if (msgs.length) TacticalEngine.apply(game, game.teams[0], script, msgs.join(' · '));
      game.announce('AI coach unavailable (' + String(err.message || err).slice(0, 34) + ') — built-in parser'
        + (msgs.length ? ' ▸ ' + msgs.join(' · ') : ': not understood'), 3.6);
    }
  },
};
// NLInstructionParser: the deterministic offline coach — plain language in,
// TacticalScript out. Never touches the sim directly.
function parseCoach(text, team){
  const t = ' ' + (text || '').toLowerCase().replace(/[^a-z ]/g, ' ') + ' ';
  const S = {}; // TacticalScript under construction
  const cur = team.tactics;
  const T = new Proxy(S, { get: (o, k) => (k in o ? o[k] : cur[k]), set: (o, k, v) => (o[k] = v, true) });
  const msgs = [];
  const has = (...ws) => ws.some(w => t.includes(w));
  if (has('park the bus','defend deep','shut up shop','hold the lead','protect the lead','defensive')){
    T.mentality = 0.25; T.defLine = 0.3; T.risk = 0.3; T.compactness = 0.42; msgs.push('park the bus');
  }
  if (has('all out','go for it','push forward','throw everything','need a goal','go on the attack','more attacking','attacking football')){
    T.mentality = 0.85; T.defLine = 0.68; T.risk = 0.7; msgs.push('all-out attack');
  }
  if (has('press high','high press','press them','full press','gegenpress','press hard')){
    T.pressing = 0.9; msgs.push('high press');
  }
  if (has('stop pressing','drop off','low block','ease off','conserve')){
    T.pressing = 0.3; msgs.push('low block');
  }
  if (has('possession','keep the ball','short pass','tiki','patient')){
    T.style = 'possession'; T.risk = Math.min(T.risk, 0.5); msgs.push('possession game');
  }
  if (has('long ball','play direct','direct football','hoof','over the top','route one')){
    T.style = 'direct'; T.risk = Math.max(T.risk, 0.65); msgs.push('direct long balls');
  }
  if (has('counter')){
    T.style = 'counter'; T.mentality = 0.45; T.defLine = 0.35; T.risk = 0.7; msgs.push('counter-attack');
  }
  if (has('zonal','zone defence','zone defense','drop the trap','drop the offside trap','no trap','stop the trap')){
    T.scheme = 'zonal'; T.trap = 0; msgs.push('zonal marking');
  } else if (has('offside trap','spring the trap','trap them','push the trap')){
    T.scheme = 'trap'; T.trap = 0.8; T.defLine = Math.max(T.defLine, 0.6); msgs.push('offside trap');
  }
  if (has('man mark','man-mark','tight marking','stick to them')){
    T.scheme = 'man'; T.trap = 0; msgs.push('man marking');
  }
  if (has('wing','wide','flank','cross more','byline','width')){
    T.width = 0.85; msgs.push('attack the wings');
  }
  if (has('through the middle','narrow','central','middle')){
    T.width = 0.25; msgs.push('through the middle');
  }
  if (has('high line','push up','squeeze up','push the line')){
    T.defLine = 0.75; msgs.push('high defensive line');
  }
  if (has('deep line','drop the line','sit back','drop deep','sit deep')){
    T.defLine = 0.28; msgs.push('deep defensive line');
  }
  if (has('compact','tight','stay close')){ T.compactness = 0.45; msgs.push('compact shape'); }
  if (has('stretch','spread out','make it big')){ T.compactness = 0.18; msgs.push('stretched shape'); }
  if ((has('take risks','ambitious','gamble') || (has('risky') && !has('risky tackle', 'risky tackles'))) &&
      !has('avoid risk','no risk')){ T.risk = 0.8; msgs.push('risky passing'); }
  if (has('play safe','careful','no risks','keep it simple','safe pass')){ T.risk = 0.28; msgs.push('safe passing'); }
  if (has('calm','settle','slow it down')){ T.risk = 0.4; T.pressing = Math.min(T.pressing, 0.55); msgs.push('calm it down'); }
  // ---- Tactical Intelligence vocabulary ----
  if (has('waste time','time wasting','run the clock','kill the game','take your time to restart')){
    T.timeWaste = 0.9; T.tempo = 0.2; T.risk = Math.min(T.risk, 0.3); msgs.push('waste time');
  }
  if (has('stop wasting','play on','hurry')){ T.timeWaste = 0; msgs.push('no time wasting'); }
  if (has('slow the tempo','slow tempo','lower the tempo','slow down')){ T.tempo = 0.22; msgs.push('slow tempo'); }
  if (has('up the tempo','high tempo','faster','quick tempo','speed it up')){ T.tempo = 0.88; msgs.push('high tempo'); }
  if (has('attack down the left','through the left','left wing','left flank','left side','down the left')){
    T.attackSide = 'left'; msgs.push('attack the left');
  }
  if (has('attack down the right','through the right','right wing','right flank','right side','down the right')){
    T.attackSide = 'right'; msgs.push('attack the right');
  }
  if (has('both flanks','either side','use both wings')){ T.attackSide = 'both'; msgs.push('use both flanks'); }
  if (has('cross more','more crosses','whip it in','get crosses in')){ T.crossing = 0.9; T.width = Math.max(T.width, 0.7); msgs.push('cross more'); }
  if (has('fewer crosses','stop crossing')){ T.crossing = 0.15; msgs.push('fewer crosses'); }
  if (has('shoot from distance','shoot on sight','long shots','shoot more')){ T.shootTendency = 0.9; msgs.push('shoot on sight'); }
  if (has('fewer shots','only clear chances','be patient in the box')){ T.shootTendency = 0.2; msgs.push('patient finishing'); }
  if (has('overlap','fullbacks forward','full backs forward','push the fullbacks','wingbacks forward')){
    T.overlap = 0.9; msgs.push('overlapping fullbacks');
  }
  if (has('fullbacks stay','no overlap')){ T.overlap = 0.15; msgs.push('fullbacks hold'); }
  if (has('press after losing','press immediately after','win it back','counter press')){
    T.pressAfterLoss = 0.95; msgs.push('counter-press');
  }
  if (has('aggressive tackl','tackle harder','get stuck in','more aggressive','play aggressively')){
    T.defAggression = 0.85; msgs.push('aggressive challenges');
  }
  if (has('avoid risky tackle','no silly fouls','stay on your feet','careful tackl','clean tackl')){
    T.defAggression = 0.2; msgs.push('stay on your feet');
  }
  if (has('back three','back 3','three at the back','switch to a back three','three centre backs','3 5 2')){
    T.formation = '352'; msgs.push('back three (3-5-2)');
  }
  if (has('back four','back 4','four at the back','4 4 2')){ T.formation = '442'; msgs.push('back four (4-4-2)'); }
  if (has('4 3 3','front three')){ T.formation = '433'; msgs.push('4-3-3'); }
  if (has('keeper long','goal kicks long','launch it','keeper kick long')){ T.gkLong = 0.95; msgs.push('keeper goes long'); }
  if (has('keeper short','play out from the back','build from the back','short goal kick')){
    T.gkLong = 0.1; T.style = 'possession'; msgs.push('build from the back');
  }
  if (has('mark their striker','man mark the striker','mark the striker','shadow their striker','mark their best player')){
    const opp2 = team.idx === 0 ? 'away' : 'home';
    T.markTarget = opp2 + '_mark_best'; msgs.push('man-mark their striker');
  }
  // reset only when nothing else matched, so "new game plan: press high" keeps the order
  if (!msgs.length && has('default','reset','back to normal','game plan')){
    Object.assign(S, team.baseTactics); S.timeWaste = 0; S.attackSide = 'both'; S.markTarget = null;
    msgs.push('back to the game plan');
  }
  S.label = msgs.join(' · ');
  return { script: S, msgs };
}
