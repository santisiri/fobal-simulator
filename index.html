/* ------------------- DEFENSIVE LINE MANAGER + OFFSIDE TRAP ------------------ */
// One flat, believable back line per team. Height comes from tactics + ball
// position; the line retreats when a carrier has time, and organized sides
// spring coordinated offside traps (OffsideTrapAI).
class DefensiveLineManager {
  constructor(team){
    this.team = team;
    this.lineX = team.ownGoalX();
    this.trapUntil = -1e9; this.lastTrap = -1e9;
    this.org = null;
  }
  update(game){
    const T = this.team.tactics, gx = this.team.ownGoalX();
    const ball = game.ball;
    const defending = game.possessionTeam() !== this.team;
    if (this.org === null){
      const defs = this.team.players.filter(q => q.line === 'DEF');
      this.org = defs.length ? defs.reduce((a, q) => a + q.a.positioning, 0) / defs.length : 0.6;
    }
    const ballDist = Math.abs(ball.x - gx);
    let h = 8 + T.defLine * 14 + clamp(ballDist - 40, -12, 30) * 0.3;
    // retreat when the carrier has time and space to hurt us
    const c = ball.controller;
    if (defending && c && c.team !== this.team && ballDist < 55 && pressureOn(c, this.team.players) < 0.3) h -= 3;
    // OffsideTrapAI: step up together just before the killer pass
    const now = game.match.tMatch;
    if (defending && (T.scheme === 'trap' || (T.trap || 0) > 0.5) && c && c.team !== this.team &&
        now - this.lastTrap > 45 && ballDist > 30 && ballDist < 62 &&
        srand() < (0.35 + this.org * 0.4) * game.loopDt){
      this.trapUntil = now + 26; this.lastTrap = now;
    }
    if (now < this.trapUntil) h += 7;
    this.trapActive = now < this.trapUntil;
    const hh = clamp(h, 6, 56);
    this.lineX = gx === 0 ? hh : CFG.PITCH_L - hh;
  }
}

/* --------------------------------- AI ------------------------------------- */
function laneClear(a, b, opps, soft){
  const abx = b.x - a.x, aby = b.y - a.y;
  const L2 = abx * abx + aby * aby;
  if (L2 < 1) return 1;
  let worst = 1;
  for (const o of opps){
    const t = ((o.pos.x - a.x) * abx + (o.pos.y - a.y) * aby) / L2;
    if (t < 0.07 || t > 0.95) continue;
    const cx = a.x + abx * t, cy = a.y + aby * t;
    const w = clamp(Math.hypot(o.pos.x - cx, o.pos.y - cy) / (2.4 + soft), 0, 1);
    if (w < worst) worst = w;
  }
  return worst;
}
function pressureOn(p, opps){
  let s = 0;
  for (const o of opps){
    const d = dist(p.pos, o.pos);
    if (d < 5.5) s += (1 - d / 5.5) * (0.6 + o.a.aggression * 0.4);
  }
  return clamp(s, 0, 1);
}
function coneSpace(pos, ang, opps){
  let best = 14;
  for (const o of opps){
    const d = dist(pos, o.pos);
    if (d > 14 || d < 0.01) continue;
    const a = Math.atan2(o.pos.y - pos.y, o.pos.x - pos.x);
    let dd = a - ang;
    while (dd >  Math.PI) dd -= 2 * Math.PI;
    while (dd < -Math.PI) dd += 2 * Math.PI;
    if (Math.abs(dd) < 0.62 && d < best) best = d;
  }
  return best;
}
function receiverSpace(m, opps){
  let nd = 99;
  for (const o of opps){ const d = dist(m.pos, o.pos); if (d < nd) nd = d; }
  return clamp(nd / 9, 0, 1);
}
function interceptPoint(p, ball){
  let bx = ball.x, by = ball.y, bz = ball.z, bvx = ball.vx, bvy = ball.vy, bvz = ball.vz;
  const sp = Math.max(2, p.maxSpeed());
  let t = 0;
  const dt = 0.09;
  for (let i = 0; i < 28; i++){
    const grounded = bz <= 0.15;
    const gsp = Math.hypot(bvx, bvy);
    const f = Math.exp(-(grounded ? (gsp > 11 ? ENV.skidFr : ENV.groundFr) : CFG.BALL_FR_AIR) * dt);
    bx += bvx * dt; by += bvy * dt;
    bvx *= f; bvy *= f;
    bvz -= CFG.GRAV * dt; bz += bvz * dt;
    if (bz <= 0.11){ bz = 0.11; if (bvz < -1.2) bvz = -bvz * ENV.bounce; else bvz = 0; }
    t += dt;
    if (bz < 2.1 && Math.hypot(p.pos.x - bx, p.pos.y - by) / sp + 0.12 <= t)
      return { x: clamp(bx, -1, 106), y: clamp(by, -1, 69) };
  }
  return { x: clamp(bx, -1, 106), y: clamp(by, -1, 69) };
}

/* ------------------------------ OFFSIDE SYSTEM ------------------------------ */
// Real rule: position snapshot at the moment of a pass, flag only raised when
// the offside player becomes involved. Restart: indirect free kick.
class OffsideSystem {
  constructor(game){ this.game = game; this.watch = null; }
  // DefensiveLineManager companion: x of the second-last defender (incl. GK)
  lineX(defTeam){
    const gx = defTeam.ownGoalX();
    let d1 = 1e9, d2 = 1e9;
    for (const o of defTeam.players){
      const d = Math.abs(o.pos.x - gx);
      if (d < d1){ d2 = d1; d1 = d; } else if (d < d2) d2 = d;
    }
    return gx === 0 ? d2 : CFG.PITCH_L - d2;
  }
  // is m in an offside POSITION right now, judged against the ball at (bx)?
  isOffside(m, team, bx){
    const dir = team.attackDir;
    const line = this.lineX(this.game.other(team));
    return (m.pos.x - line) * dir > 0.3
      && (m.pos.x - bx) * dir > 0
      && (m.pos.x - CFG.PITCH_L / 2) * dir > 0;
  }
  snapshot(kicker){
    // throw-ins, corners and goal kicks are exempt (kick happens pre-PLAYING)
    if (this.game.match.state !== 'PLAYING'){ this.watch = null; return; }
    const team = kicker.team;
    const set = new Set();
    for (const m of team.players){
      if (m === kicker || m.isGK) continue;
      if (this.isOffside(m, team, this.game.ball.x)) set.add(m);
    }
    this.watch = set.size ? { set, team, t: this.game.match.tMatch } : null;
  }
  onTouch(p){
    const w = this.watch;
    if (!w) return false;
    if (this.game.match.tMatch - w.t > 200){ this.watch = null; return false; } // phase over
    if (p.team !== w.team){ this.watch = null; return false; } // defenders reset play
    if (!w.set.has(p)){ this.watch = null; return false; }     // an onside teammate's touch = new phase
    this.watch = null;
    this.game.match.callOffside(p);
    return true;
  }
}

// MatchEventTracker helpers: every ball contact flows through these so
// touches, pass outcomes and interceptions are attributed exactly once.
function creditTouch(game, p){
  const ball = game.ball;
  if (ball.lastToucher !== p){
    ball.prevToucher2 = ball.prevToucher;       // two-deep chain for assists
    ball.prevTouch2Clock = ball.prevTouchClock;
    ball.prevToucher = ball.lastToucher;
    ball.prevTouchClock = game.match.tMatch;
    p.stats.touches++;
    if (game.recorder) game.recorder.log('touch', { actor: p.pid, position: EventSerializer.pos(p.pos), z: +ball.z.toFixed(2) });
  }
  ball.lastToucher = p; ball.lastTouchTeam = p.team;
  if (game.offsideSys) game.offsideSys.onTouch(p); // involvement = the flag goes up
}
function resolvePendingPass(game, gainer, canIntercept){
  const pp = game.pendingPass;
  if (!pp) return;
  if (gainer.team === pp.team){
    if (pp.passer && gainer !== pp.passer){
      gainer.team.passCmp++; pp.passer.stats.passCmp++;
      if (game.recorder) game.recorder.log('pass_complete', { actor: pp.passer.pid, target: gainer.pid });
      // a long completed ball into the danger zone makes the feed
      const gd = dist(gainer.pos, { x: gainer.team.oppGoalX(), y: 34 });
      if (gd < 30 && dist(pp.passer.pos, gainer.pos) > 16 &&
          game.match.tMatch - (game.lastChanceT || -1e9) > 120){
        game.lastChanceT = game.match.tMatch;
        pp.passer.stats.chancesCreated = (pp.passer.stats.chancesCreated || 0) + 1;
        game.commentate('chance', { p: pp.passer, team: pp.team });
      }
    }
  } else if (canIntercept && gainer !== pp.passer){
    gainer.stats.interceptions++;
    if (pp.passer) pp.passer.stats.possLost = (pp.passer.stats.possLost || 0) + 1;
    if (game.recorder) game.recorder.log('interception', { actor: gainer.pid, target: pp.passer ? pp.passer.pid : undefined });
  }
  game.pendingPass = null;
}

// Shared kick physics: passes, shots, crosses, clearances, headers, restarts.
function doKick(p, game, opt){
  const ball = game.ball;
  const dx = opt.tx - ball.x, dy = opt.ty - ball.y;
  // AttributeInfluenceEngine: aim error grows with base sigma, across-body
  // kicks on the weak foot, tired legs and body angle vs composure
  let sigma = opt.sigma || 0.05;
  const kickSide = Math.sin(Math.atan2(dy, dx) - p.facing); // + = kicking to his left
  const offFoot = p.foot === 1 ? kickSide > 0.45 : kickSide < -0.45;
  if (offFoot && !opt.header) sigma *= 1.3;
  sigma *= 1 + (1 - clamp(p.stamina, 0, 1)) * 0.4;
  let ang = Math.atan2(dy, dx) + gauss() * sigma;
  const bodyOff = Math.abs(turnToward(0, ang - p.facing, 9));
  ang += gauss() * bodyOff * 0.02 * (2 - p.a.composure);
  const sp = opt.speed * (1 + gauss() * 0.04) * (offFoot && !opt.header ? 0.94 : 1)
    * (opt.type === 'shot' ? 0.9 + clamp(p.stamina, 0, 1) * 0.1 : 1); // tired strikes fade
  ball.vx = Math.cos(ang) * sp;
  ball.vy = Math.sin(ang) * sp;
  ball.vz = opt.vz || 0;
  ball.z = Math.max(ball.z, 0.12);
  // BallSpinSystem: when the caller doesn't dictate spin, it emerges from
  // technique, preferred foot and contact geometry — inside-foot wraps curl
  // toward the target side, outside-foot bends away, chips carry backspin,
  // driven balls dip with topspin. Trajectories bend before gravity and
  // drag finish the flight.
  const tech = (p.a.passing + p.a.shooting) * 0.5;
  if (!opt.header && !opt.spin){
    const inside = (p.foot === 1 && kickSide > 0.12) || (p.foot === -1 && kickSide < -0.12);
    ball.spin = (kickSide > 0 ? 1 : -1) * Math.min(1.8, Math.abs(kickSide) * (0.4 + tech * 1.5))
      * (inside ? 1 : -0.5) * clamp(sp / 24, 0.3, 1) * (offFoot ? 0.55 : 1);
  } else ball.spin = opt.spin || 0;
  if (opt.header){ ball.spinZ = 0; }
  else if (opt.spinZ !== undefined){ ball.spinZ = opt.spinZ; }
  else if ((opt.vz || 0) > 3.2) ball.spinZ = 0.9 + tech * 1.1;              // chipped: floats
  else if ((opt.vz || 0) < 1.2 && sp > 17) ball.spinZ = -(0.5 + tech * 0.9); // driven: dips
  else ball.spinZ = 0.15;
  ball.controller = null;
  ball.flightT = 0;
  ball.intendedReceiver = opt.receiver || null;
  const preState = game.match.state;
  creditTouch(game, p);
  // the touch itself may have been the offside involvement: whistle's gone,
  // so none of this kick's bookkeeping (stats, announcements) may run
  const flagged = preState === 'PLAYING' && game.match.state !== 'PLAYING';
  if (flagged) return;
  // remember the last DELIBERATE strike so deflections don't steal goals
  ball.lastKicker = p;
  ball.lastKickShot = opt.type === 'shot';
  ball.lastKickClock = game.match.tMatch;
  ball.shotCredited = false; // on-target credit given at most once per strike
  ball.isShot = opt.type === 'shot';
  p.kickCooldown = 0.45;
  // EventSerializer hook: every deliberate strike becomes a timeline event
  if (game.recorder) game.recorder.log(opt.cross ? 'cross' : (opt.header ? 'header' : opt.type), {
    actor: p.pid, from: EventSerializer.pos(p.pos),
    aim: { x: +(+opt.tx).toFixed(2), y: +(+opt.ty).toFixed(2) },
    target: opt.receiver ? opt.receiver.pid : undefined,
    power: +clamp(sp / 30, 0, 1).toFixed(3), speed: +sp.toFixed(2),
    vz: +(opt.vz || 0).toFixed(2), spin: +(opt.spin || 0).toFixed(2),
    trajectory: (opt.vz || 0) > 2.2 ? 'high' : ((opt.vz || 0) > 0.5 ? 'lofted' : 'ground'),
    human: p.human ? true : undefined,
  });
  // action pose for the kick
  if (!opt.silent){
    if (opt.header) p.setAction('head', 0.5);
    else if (opt.type === 'shot' || opt.type === 'clear') p.setAction('shoot', 0.4);
    else if (opt.cross) p.setAction('cross', 0.4);
    else p.setAction('pass', 0.3);
  }
  if (opt.type === 'pass' && !opt.header){
    p.team.passAtt++; p.stats.passAtt++;
    game.pendingPass = { team: p.team, passer: p, t: 0 };
  }
  if (opt.type === 'clear') p.stats.clears = (p.stats.clears || 0) + 1;
  // OffsideSystem: freeze attacker positions at the moment of any touch that
  // can create involvement (passes, crosses, clears — and rebounds off shots)
  if (game.offsideSys) game.offsideSys.snapshot(p);
  if (opt.type === 'shot'){
    exert(p, 0.005);
    p.team.shots++; p.stats.shots++; game.lastShooter = p;
    // ballistic on-target prediction for the ticker (ignores curve/blocks)
    const gx = p.team.oppGoalX();
    const tGoal = (gx - ball.x) / (ball.vx || 1e-6);
    const yc = ball.y + ball.vy * tGoal;
    const zc = ball.z + ball.vz * tGoal - 0.5 * CFG.GRAV * tGoal * tGoal;
    const onT = tGoal > 0 && Math.abs(yc - 34) < CFG.GOAL_W / 2 + 0.4 && zc < CFG.GOAL_H + 0.4;
    game.announce(onT ? 'SHOT ON TARGET' : 'SHOT');
    game.commentate('shot', { p, team: p.team, on: onT });
    if (game.stadium) game.stadium.react('shot', p.team);
  }
  if (opt.cross){ game.announce('CROSS'); game.counts.cross++; }
}
// pass weight compensates for the surface: heavy pitches need firmer passes
function groundPassSpeed(d){ return clamp(3 + d * 0.66 * (ENV.groundFr / CFG.BALL_FR_GROUND), 8, 27); }
// on heavy pitches long ground passes physically can't arrive — chip them instead
function groundedPassLimit(){ return 24 * clamp(CFG.BALL_FR_GROUND / ENV.groundFr * 1.25, 0.45, 1); }
function loftFor(d){
  const v = Math.sqrt(d * CFG.GRAV / 0.97) * 1.08;
  return { vh: v * Math.cos(0.66), vz: v * Math.sin(0.66) };
}

// ---- Duty assignment: who chases, who presses, who holds shape ------------
function assignDuties(team, game){
  const ball = game.ball;
  for (const p of team.players){ p.duty = p.isGK ? 'keeper' : 'position'; }
  // dead ball: hold shape and respect restart distance — nobody hunts the spot
  if (game.match.state !== 'PLAYING') return;
  if (ball.holder){
    if (ball.holder.team !== team){
      let best = null, bd = 1e9;
      for (const p of team.players){ if (p.isGK) continue; const d = dist(p.pos, ball); if (d < bd){ bd = d; best = p; } }
      if (best && bd < 14) best.duty = 'press';
    }
    return;
  }
  const c = ball.controller;
  if (c && c.team === team){ c.duty = 'onball'; return; }
  const field = team.players.filter(p => !p.isGK);
  if (!field.length) return; // heavily red-carded team
  field.sort((a, b) => dist(a.pos, ball) - dist(b.pos, ball));
  // counter-press: the seconds after losing the ball, hunt in a pack
  const gegen = game.transitionT > 0 && game.lastPoss && game.lastPoss !== team
    && (team.tactics.pressAfterLoss || 0) > 0.6;
  if (c){
    field[0].duty = 'press';
    if (field.length > 1 && (team.tactics.pressing > 0.45 || gegen) &&
        dist(field[1].pos, ball) < (gegen ? 22 : 8 + team.tactics.pressing * 12)) field[1].duty = 'press2';
    if (gegen && field.length > 2 && dist(field[2].pos, ball) < 18) field[2].duty = 'press';
    // pressing forward: hound keepers and center backs playing out
    if (team.tactics.pressing > 0.65 && (c.isGK || c.line === 'DEF') &&
        Math.abs(c.pos.x - c.team.ownGoalX()) < 26){
      let st2 = null, sd = 30;
      for (const p of team.players){
        if (p.line !== 'ATT' || p.duty !== 'position') continue;
        const d = dist(p.pos, c.pos);
        if (d < sd){ sd = d; st2 = p; }
      }
      if (st2) st2.duty = 'press';
    }
  } else {
    field[0].duty = 'chase';
    const r = ball.intendedReceiver;
    if (r && r.team === team && !r.isGK) r.duty = 'chase';
    else if (field.length > 1 && dist(field[1].pos, ball) < 9) field[1].duty = 'chase';
  }
}

// ---- Off-ball positioning --------------------------------------------------
const LINE_FOLLOW = { DEF: 0.30, MID: 0.42, ATT: 0.34 };
function offBallTarget(p, game){
  const team = p.team, ball = game.ball, dir = team.attackDir, T = team.tactics;
  const own = game.possessionTeam() === team;
  const base = formationWorld(p);
  const rs = game.match.restart;
  const st = game.match.state;
  // DeadBallStateManager: staged set-piece positions (walls, runners, markers).
  // Values may carry a per-player walk/jog speed: { x, y, sw }.
  if (rs && rs.spTargets && rs.spTargets.has(p) && st !== 'PLAYING'){
    const sp = rs.spTargets.get(p);
    p.target = { x: sp.x, y: sp.y };
    const d0 = dist(p.pos, p.target);
    const sw = sp.sw !== undefined ? sp.sw : 0.95;
    // hustle over distance, settle into a walk on arrival
    p.speedWish = d0 < 1.2 ? 0.25 : (d0 > 18 ? 1 : (d0 > 9 ? Math.min(1, sw + 0.3) : sw));
    // waiting bodies feel alive: box jostling, defenders organizing
    if (p.actionT <= 0 && d0 < 1.5){
      if (st === 'CORNER' && srand() < game.loopDt * 1.2) p.setAction('shield', 0.35);
      else if (p.line === 'DEF' && srand() < game.loopDt * 0.3) p.setAction('point', 0.55);
    }
    return;
  }
  let tx = base.x + (ball.x - CFG.PITCH_L/2) * LINE_FOLLOW[p.line];
  let ty = base.y + (ball.y - CFG.PITCH_W/2) * T.compactness * (own ? 0.55 : 1);
  let speed = 0.62;
  if (own){
    tx += dir * (2.5 + T.mentality * 7);
    // counter-attacking sides break the moment the ball turns over
    if (game.transitionT > 0 && (T.counter || 0) > 0.6 && p.line !== 'DEF'){ tx += dir * 4; }
    // overlapping fullbacks join the attack outside the winger
    if ((T.overlap || 0) > 0.6 && (p.role === 'LB' || p.role === 'RB')){
      const carrier2 = ball.controller;
      const myFlank = base.y < 34 ? 'low' : 'high';
      if (carrier2 && carrier2.team === team && ((carrier2.pos.y < 30 && myFlank === 'low') || (carrier2.pos.y > 38 && myFlank === 'high')))
        tx += dir * (4 + T.overlap * 5);
    }
    const carrier = ball.controller;
    if (p.line === 'ATT'){
      const oppGx = team.oppGoalX();
      const opps = game.other(team).players; // keeper counts for the offside line
      let d1 = 1e9, d2 = 1e9, lineX = oppGx - dir * 14;
      for (const o of opps){
        const d = Math.abs(o.pos.x - oppGx);
        if (d < d1){ d2 = d1; d1 = d; } else if (d < d2) d2 = d;
      }
      if (d2 < 1e8) lineX = oppGx - dir * d2;
      // an offside trap catches strikers judging by the OLD line: they react
      // a beat late, exactly like the real thing
      const oppDlm = game.other(team).dlm;
      if (oppDlm && oppDlm.trapActive) lineX += dir * 5; // blind to the step: holds the OLD, higher position
      // shoulder-of-the-last-defender runs: sharp strikers stay level, poor
      // positioning gambles a stride too early
      tx = lineX + dir * (0.1 + (1 - p.a.positioning) * 1.2 + Math.sin(game.match.tMatch * 0.08 + p.num * 2.1) * 1.3);
      if (game.transitionT > 0 && Math.abs(ball.x - oppGx) < 60) tx += dir * 1.5; // breaking early
      if (p.role === 'LW' || p.role === 'RW') ty = 34 + (base.y - 34) * (0.55 + T.width * 0.9);
      else ty = clamp(34 + (ball.y - 34) * 0.3 + (base.y - 34) * 0.55, 8, 60);
      speed = Math.abs(ball.x - oppGx) < 55 ? 0.92 : 0.7;
    }
    else if (p.line === 'MID' && carrier && carrier !== p && dist(p.pos, carrier.pos) < 20){
      const side = base.y > carrier.pos.y ? 1 : -1; // offer on the player's natural flank
      tx = carrier.pos.x + dir * 5.5;
      ty = clamp(carrier.pos.y + side * 8, 4, 64);
      speed = 0.78;
    }
    else if (p.role === 'LB' || p.role === 'RB'){
      tx += dir * 4; ty = base.y; speed = 0.7;
    }
    // PositionalAwarenessAI: advanced mids drift into the half-spaces and
    // slightly overload the ball side
    if (p.line === 'MID'){
      ty = lerp(ty, 34 + (base.y >= 34 ? 11 : -11), 0.3);
      ty = lerp(ty, ball.y, 0.12);
    }
  } else {
    tx -= dir * (3 + (1 - T.defLine) * 5);
    speed = 0.72;
    ty = base.y + (ball.y - CFG.PITCH_W / 2) * Math.min(0.5, T.compactness + 0.12); // unit shift to ball side
    const lm = team.dlm;
    if (p.line === 'DEF' && lm){
      // DefensiveRoleBehavior: hold a FLAT line; disorganized defenders miss
      // the trap step and play attackers onside
      let lx = lm.lineX;
      // disorganized defenders miss the trap step (varies per trap instance)
      if (lm.trapActive && p.a.positioning < 0.7 &&
          (p.num * 13 + ((game.match.tMatch / 45) | 0)) % 4 === 0) lx -= dir * 6;
      tx = lx;
      // MarkingSystem: a runner at/behind the line gets tracked goal-side
      let runner = null, rd = T.scheme === 'man' ? 14 : 8;
      for (const o of game.other(team).players){
        if (o.isGK) continue;
        if (o.trackClaim === game.frameNo) continue;           // a teammate has him
        if ((o.pos.x - lx) * dir > 1.5) continue;              // in front of the line
        if ((lx - o.pos.x) * dir > 15) continue;               // too deep to be p's job
        const d = Math.abs(o.pos.y - base.y);
        if (d < rd){ rd = d; runner = o; }
      }
      if (runner) runner.trackClaim = game.frameNo;
      if (runner && !lm.trapActive){
        const ownGx = team.ownGoalX();
        tx = clamp(runner.pos.x + (ownGx - runner.pos.x) * 0.18, Math.min(lx, runner.pos.x) - 2, Math.max(lx, runner.pos.x) + 2);
        ty = runner.pos.y + (34 - runner.pos.y) * (T.scheme === 'man' ? 0.02 : 0.08);
        speed = 0.9;
      }
    } else if (p.role === 'CM' && p.slot.x <= 0.34 && ball.controller &&
               Math.abs(ball.x - team.ownGoalX()) < 55){
      // defensive midfielder screens the central lane in front of the line
      tx = lerp(ball.x, lm ? lm.lineX : tx, 0.45);
      ty = lerp(ball.y, 34, 0.4);
      speed = 0.8;
    } else if (team.tactics.markTarget && (p.role === 'CM' || p.line === 'DEF') && !p.isGK &&
               (team._marker === p || !team._marker || !team.players.includes(team._marker))){
      // coach's order: shadow one named opponent everywhere sensible
      const tgt = EventSerializer.player(game, team.tactics.markTarget);
      if (tgt && tgt.team !== team && game.other(team).players.includes(tgt)){
        team._marker = p;
        const ownGx2 = team.ownGoalX();
        tx = tgt.pos.x + (ownGx2 - tgt.pos.x) * 0.1;
        ty = tgt.pos.y + (34 - tgt.pos.y) * 0.06;
        speed = 0.92;
      }
    } else if (p.line !== 'ATT'){
      // PassingLaneAnalyzer-lite: mids pick up the nearest free opponent
      const oppPlayers = game.other(team).players;
      let mark = null, md = T.scheme === 'man' ? 14 : 11;
      for (const o of oppPlayers){
        if (o.isGK || o === ball.controller) continue;
        const d = dist(o.pos, { x: tx, y: ty });
        if (d < md){ md = d; mark = o; }
      }
      if (mark){
        const ownGx = team.ownGoalX();
        tx = mark.pos.x + (ownGx - mark.pos.x) * 0.12;
        ty = mark.pos.y + (34 - mark.pos.y) * 0.08;
        speed = 0.8;
      }
    }
  }
  // TacticalEngine: focus play down a chosen flank — applied AFTER the
  // per-line shaping so it actually sticks: that side pushes on and holds
  // width, the other tucks toward the middle
  if (own && T.attackSide && T.attackSide !== 'both' && !p.isGK){
    const sideY = T.attackSide === 'left' ? (dir === 1 ? 8 : 60) : (dir === 1 ? 60 : 8);
    if (Math.abs(base.y - sideY) < 22){ ty = lerp(ty, sideY, 0.4); tx += dir * 1.5; }
    else ty = lerp(ty, 34, 0.3);
  }
  // transition moments: everyone reacts a beat faster
  if (game.transitionT > 0) speed = Math.min(1, speed + 0.15 + (own && (T.counter || 0) > 0.6 ? 0.12 : 0));
  // tempo: high tempo teams move sharper off the ball; time-wasters stroll
  speed = clamp(speed * (0.86 + (T.tempo !== undefined ? T.tempo : 0.5) * 0.28) * (1 - (own ? (T.timeWaste || 0) * 0.18 : 0)), 0.15, 1);
  // PlayerCallForBallSystem: shout when open, running, or warning the carrier
  if (own && ball.controller && ball.controller !== p && st === 'PLAYING'){
    const now = game.match.tMatch;
    if ((p.callCd || -1e9) < now && (game.lastCallT || -1e9) < now - 20){
      const opps2 = game.other(team).players;
      const spaceD = receiverSpace(p, opps2);
      const dGoal2 = dist(p.pos, { x: team.oppGoalX(), y: 34 });
      let want = 0, text = 'HERE!';
      if (p.line === 'ATT' && dGoal2 < 45 && spaceD > 0.5){ want = 0.7; text = 'THROUGH!'; }
      else if ((p.role === 'LW' || p.role === 'RW' || p.role === 'LM' || p.role === 'RM')
        && spaceD > 0.7 && Math.abs(p.pos.y - ball.y) > 22){ want = 0.6; text = 'SWITCH!'; }
      else if (spaceD > 0.6 && dist(p.pos, ball.controller.pos) < 26){ want = 0.45; text = 'HERE!'; }
      if (pressureOn(ball.controller, opps2) > 0.55 && dist(p.pos, ball.controller.pos) < 14){ want = 0.75; text = 'MAN ON!'; }
      // confident, creative players demand it; nervous ones stay quiet
      const conf = 0.35 + p.a.composure * 0.5 + (p.a.vision > 0.72 ? 0.12 : 0);
      if (want > 0.4 && srand() < want * conf * 0.35){
        p.callT = 1.1; p.callText = text;
        if (game.recorder) game.recorder.log('call_for_ball', { actor: p.pid, position: EventSerializer.pos(p.pos), text, gesture: 'raise_hand' });
        p.callCd = now + 180; game.lastCallT = now;
        if (p.actionT <= 0 && len(p.vel) < 5) p.setAction('point', 0.5);
      }
    }
  }
  // respect restart distance (all dead-ball restarts)
  if (rs && rs.spot && team !== rs.team && st !== 'PLAYING'){
    const rad = st === 'THROWIN' ? 4 : 9.5;
    const d = dist({ x: tx, y: ty }, rs.spot);
    if (d < rad){
      const away = norm(sub({ x: tx, y: ty }, rs.spot));
      tx = rs.spot.x + away.x * rad; ty = rs.spot.y + away.y * rad;
    }
  }
  if (p.stamina < 0.45){
    // exhausted players lose their spots by a stride or two
    const w = (0.45 - p.stamina) * 9;
    tx += (srand() - 0.5) * w; ty += (srand() - 0.5) * w;
  }
  p.target = { x: clamp(tx, 1, CFG.PITCH_L - 1), y: clamp(ty, 1, CFG.PITCH_W - 1) };
  const d = dist(p.pos, p.target);
  p.speedWish = d > 14 ? Math.min(1, speed + 0.25) : (d < 2 ? 0.3 : speed);
}

// ---- On-ball decisions: shoot / pass / cross / dribble / shield / clear ----
function carrierDecide(p, game){
  const team = p.team, T = team.tactics, dir = team.attackDir;
  const opp = game.other(team), opps = opp.players;
  const gx = team.oppGoalX();
  const goal = { x: gx, y: 34 };
  const dGoal = dist(p.pos, goal);
  const press = pressureOn(p, opps);

  // SHOOT
  let shoot = 0, shootAim = null;
  if (dGoal < 34){
    let bestOpen = 0, bestY = 34;
    for (const ay of [34 - 3.0, 34 - 1.5, 34 + 1.5, 34 + 3.0]){
      const open = laneClear(p.pos, { x: gx, y: ay }, opps, 0);
      if (open > bestOpen){ bestOpen = open; bestY = ay; }
    }
    const inBox = Math.abs(p.pos.x - gx) < 16.5 && Math.abs(p.pos.y - 34) < 20;
    shoot = (1 - dGoal / 34) * (0.55 + p.a.shooting * 0.8) * (0.25 + bestOpen * 0.85) * (1 - press * 0.3)
          + (inBox ? 0.44 : 0);
    // coach's shot appetite: shoot-on-sight scales it up (and lets fly from
    // range); patient sides hold for clearer chances
    shoot *= 0.55 + (T.shootTendency !== undefined ? T.shootTendency : 0.5) * 0.9;
    if (T.shootTendency > 0.7 && dGoal > 22 && p.a.shooting > 0.5) shoot += 0.12;
    shootAim = { x: gx, y: bestY };
  }

  // PASS / THROUGH BALL
  let bestPass = 0, passOpt = null;
  for (const m of team.players){
    if (m === p) continue;
    if (m.isGK && press < 0.55) continue;
    const dm = dist(p.pos, m.pos);
    if (dm < 3.5 || dm > 46) continue;
    const grounded = dm < groundedPassLimit();
    const tof = grounded ? dm / groundPassSpeed(dm) : Math.sqrt(2 * dm / CFG.GRAV) * 1.35;
    const lead = {
      x: clamp(m.pos.x + m.vel.x * tof * 0.85, 1.5, CFG.PITCH_L - 1.5),
      y: clamp(m.pos.y + m.vel.y * tof * 0.85, 1.5, CFG.PITCH_W - 1.5),
    };
    const lane = laneClear(p.pos, lead, opps, grounded ? 0 : 2.2);
    const space = receiverSpace(m, opps);
    const adv = clamp((lead.x - p.pos.x) * dir / 28, -0.5, 1);
    let sc = (0.48 + p.a.passing * 0.5) * (lane * 0.62 + space * 0.33) * (0.6 + adv * (0.5 + T.risk * 0.35));
    if (m.line === 'ATT' && adv > 0.25) sc *= 1.25;
    if (T.style === 'possession' && grounded) sc *= 1.12;
    if (T.attackSide && T.attackSide !== 'both'){
      const sideY2 = T.attackSide === 'left' ? (dir === 1 ? 8 : 60) : (dir === 1 ? 60 : 8);
      if (Math.abs(m.pos.y - sideY2) < 20) sc *= 1.22; // feed the chosen flank
    }
    if ((T.timeWaste || 0) > 0.5 && adv < 0.1) sc *= 1.3; // recycle it backwards
    if (T.tempo !== undefined) sc *= 0.9 + T.tempo * 0.2;
    if ((T.style === 'direct' || T.style === 'counter') && !grounded && adv > 0.3) sc *= 1.18;
    if (T.style === 'counter' && game.transitionT > 0 && adv > 0.3) sc *= 1.35; // break fast
    if (m.callT > 0) sc *= 1.1; // he's calling for it
    // passers avoid CLEARLY offside targets; marginal calls get played —
    // and that is exactly where the flag comes from
    if (game.offsideSys){
      const line2 = game.offsideSys.lineX(opp);
      const over = (m.pos.x - line2) * dir;
      if (over > 1.5 && (m.pos.x - p.pos.x) * dir > 0 && (m.pos.x - CFG.PITCH_L / 2) * dir > 0)
        sc *= 0.15 + (1 - p.a.vision) * 0.5;
    }
    sc *= 0.85 + p.a.vision * 0.3;
    if (sc > bestPass){
      bestPass = sc;
      passOpt = { mate: m, lead, dm, loft: !grounded || (lane < 0.4 && dm > 15) };
    }
  }
  bestPass *= 0.82 + press * 0.5;

  // CROSS: wide and advanced -> whip it toward runners in the box
  let cross = 0, crossOpt = null;
  const wide = Math.abs(p.pos.y - 34) > 14 && Math.abs(p.pos.x - gx) < 32;
  if (wide){
    let runners = 0, tgt = null, bd = 1e9;
    for (const m of team.players){
      if (m === p || m.isGK) continue;
      const inBoxArea = Math.abs(m.pos.x - gx) < 20 && Math.abs(m.pos.y - 34) < 16;
      if (inBoxArea){ runners++; const d = Math.abs(m.pos.y - 34); if (d < bd){ bd = d; tgt = m; } }
    }
    if (runners > 0){
      cross = (0.42 + p.a.passing * 0.4) * Math.min(1, runners / 2 + 0.4) * (1 - press * 0.2) * (0.5 + T.width)
            * (0.55 + (T.crossing !== undefined ? T.crossing : 0.5) * 0.9);
      const aim = tgt ? { x: clamp(tgt.pos.x + tgt.vel.x * 0.6, gx === 0 ? 3 : 85, gx === 0 ? 20 : 102), y: clamp(tgt.pos.y, 24, 44) }
                      : { x: gx + (gx === 0 ? 9 : -9), y: 34 };
      crossOpt = { aim, tgt };
    }
  }

  // DRIBBLE
  const dribAng = Math.atan2(34 + (p.pos.y - 34) * 0.75 - p.pos.y, gx - p.pos.x);
  const space = coneSpace(p.pos, dribAng, opps);
  let drib = clamp(space / 11, 0, 1) * (0.30 + p.a.dribbling * 0.38) * (1 - press * 0.5);
  const ownGx = team.ownGoalX();
  if (Math.abs(p.pos.x - ownGx) < 34) drib *= 0.72;

  // CLEAR
  let clear = 0;
  if (dist(p.pos, { x: ownGx, y: 34 }) < 27 && press > 0.4) clear = 0.5 + press * 0.45 + (p.line === 'DEF' ? 0.15 : 0);

  // SHIELD: nothing good and heavy pressure -> protect the ball
  const shieldU = (press > 0.55 && Math.max(shoot, bestPass, cross, drib) < 0.34) ? 0.35 : 0;

  // DecisionEvaluator: every option scored, every modifier on the record —
  // the debug view renders this verbatim, so nothing on the pitch is magic
  p.lastEval = {
    t: game.match.tMatch,
    press: +press.toFixed(2),
    options: [
      { k: 'shoot', s: shoot, info: shootAim ? Math.round(dGoal) + 'm out' : '' },
      { k: 'pass', s: bestPass, info: passOpt ? '#' + passOpt.mate.num + ' · lane ' + Math.round(laneClear(p.pos, passOpt.lead, opps, 0) * 100) + '%' : '' },
      { k: 'cross', s: cross, info: crossOpt && crossOpt.tgt ? 'to #' + crossOpt.tgt.num : '' },
      { k: 'dribble', s: drib, info: '' },
      { k: 'clear', s: clear, info: '' },
      { k: 'shield', s: shieldU, info: '' },
    ].map(o => ({ ...o, s: +o.s.toFixed(3) })).sort((a, b) => b.s - a.s),
    mods: {
      style: T.style, tempo: +(T.tempo ?? 0.5).toFixed(2), risk: +T.risk.toFixed(2),
      side: T.attackSide || 'both', shootBias: +(T.shootTendency ?? 0.5).toFixed(2),
      crossBias: +(T.crossing ?? 0.5).toFixed(2), waste: +(T.timeWaste || 0).toFixed(2),
      fatigue: +(1 - clamp(p.stamina, 0, 1)).toFixed(2),
    },
  };
  const best = Math.max(shoot, bestPass, cross, drib, clear, shieldU, 0.18);
  if (best === shoot && shootAim){
    p.decision = { type:'shot', tx: shootAim.x, ty: shootAim.y,
      speed: 23 + p.a.shooting * 10 + srand() * 3,
      vz: 0.5 + srand() * 2.4,
      spin: (srand() - 0.5) * 3,
      sigma: 0.085 - p.a.composure * 0.045 + press * 0.05 };
  } else if (best === cross && crossOpt){
    const d = dist(p.pos, crossOpt.aim);
    const l = loftFor(d);
    p.decision = { type:'pass', cross:true, tx: crossOpt.aim.x, ty: crossOpt.aim.y,
      speed: l.vh, vz: l.vz, spin: (p.pos.y < 34 ? 1 : -1) * (gx === 0 ? -1 : 1) * 2.0,
      sigma: 0.1 - p.a.passing * 0.04, receiver: crossOpt.tgt };
  } else if (best === bestPass && passOpt){
    const o = passOpt;
    if (o.loft){
      const l = loftFor(o.dm);
      p.decision = { type:'pass', tx:o.lead.x, ty:o.lead.y, speed:l.vh, vz:l.vz,
        spin:(srand()-0.5)*2, sigma:0.1 - p.a.passing*0.05, receiver:o.mate };
    } else {
      p.decision = { type:'pass', tx:o.lead.x, ty:o.lead.y, speed:groundPassSpeed(o.dm), vz:0,
        spin:0, sigma:0.09 - p.a.passing*0.055 + press*0.04, receiver:o.mate };
    }
  } else if (best === clear && clear > 0){
    const side = p.pos.y > 34 ? 60 : 8;
    p.decision = { type:'clear', tx: ownGx + dir * 48, ty: side,
      speed: loftFor(44).vh, vz: loftFor(44).vz, spin: 0, sigma: 0.2 };
  } else if (best === shieldU && shieldU > 0){
    p.decision = { type:'shield' };
  } else {
    p.decision = { type:'dribble', ang: dribAng, cautious: drib < 0.3 };
  }
  if (p.lastEval) p.lastEval.chosen = p.decision.type;
  // tempo drives how quickly the man on the ball makes up his mind
  p.decideT = (0.24 + srand() * 0.12) * (1.35 - (T.tempo !== undefined ? T.tempo : 0.5) * 0.55)
    * (1 + (T.timeWaste || 0) * 0.7);
}

function playerThink(p, game){
  const ball = game.ball;
  switch (p.duty){
    case 'keeper': keeperThink(p, game); break;
    case 'onball': {
      p.decideT -= p.thinkInterval || 0.15;
      if (p.decideT <= 0) carrierDecide(p, game);
      if (p.decision.type === 'dribble'){
        const a = p.decision.ang ?? Math.atan2(34 - p.pos.y, p.team.oppGoalX() - p.pos.x);
        const r = p.decision.cautious ? 4 : 9;
        p.target = { x: clamp(p.pos.x + Math.cos(a) * r, 1, 104), y: clamp(p.pos.y + Math.sin(a) * r, 1, 67) };
        p.speedWish = p.decision.cautious ? 0.55 : 0.85;
      } else if (p.decision.type === 'shield'){
        p.target = { x: p.pos.x, y: p.pos.y }; p.speedWish = 0.15;
      } else {
        p.target = { x: ball.x, y: ball.y }; p.speedWish = 0.7;
      }
      break;
    }
    case 'chase': {
      const ip = interceptPoint(p, ball);
      p.target = ip; p.speedWish = 1;
      break;
    }
    case 'press': {
      const c = ball.controller || ball.holder;
      const cp = c ? add(c.pos, scl(c.vel, 0.3)) : { x: ball.x, y: ball.y };
      p.target = cp; p.speedWish = 0.9 + p.a.aggression * 0.1;
      break;
    }
    case 'press2': {
      const c = ball.controller;
      if (c){
        const ownGx = p.team.ownGoalX();
        p.target = { x: c.pos.x + (ownGx - c.pos.x) * 0.18, y: c.pos.y + (34 - c.pos.y) * 0.2 };
      } else p.target = { x: ball.x, y: ball.y };
      p.speedWish = 0.85;
      break;
    }
    default: offBallTarget(p, game);
  }
}

// ---- Goalkeeper brain ------------------------------------------------------
function keeperThink(p, game){
  const ball = game.ball, team = p.team;
  const gx = team.ownGoalX();
  const inward = gx === 0 ? 1 : -1;
  p.diving = false;
  if (ball.holder === p){ p.target = { x: gx + inward * 8, y: 34 }; p.speedWish = 0.7; return; }
  // set pieces against us: organize the wall / the box, shout and point
  const m2 = game.match, rs2 = m2.restart;
  if (rs2 && rs2.team !== team && (m2.state === 'FREEKICK' || m2.state === 'CORNER')){
    if (m2.state === 'FREEKICK' && rs2.shooting){
      // cover the side of the goal the wall doesn't
      p.target = { x: gx + inward * 0.8, y: 34 + (rs2.spot.y > 34 ? -1.7 : 1.7) };
    } else {
      p.target = { x: gx + inward * 1.2, y: 34 + (m2.state === 'CORNER' ? inward * 0 + 1.5 * (rs2.spot.y < 34 ? 1 : -1) : 0) };
    }
    p.speedWish = 0.9;
    if (p.actionT <= 0 && srand() < (game.loopDt || 0.016) * 0.8) p.setAction('point', 0.6);
    return;
  }
  const approaching = (gx === 0 && ball.vx < -5) || (gx === CFG.PITCH_L && ball.vx > 5);
  const reacted = ball.flightT > 0.26 - p.a.gk * 0.14;
  if (approaching && reacted && Math.abs(ball.x - gx) < 30){
    const px = gx + inward * 0.9;
    const tc = (px - ball.x) / ball.vx;
    if (tc > 0 && tc < 1.6){
      const yc = ball.y + ball.vy * tc;
      const zc = ball.z + ball.vz * tc - 0.5 * CFG.GRAV * tc * tc;
      if (Math.abs(yc - 34) < 7 && zc < 4){
        p.target = { x: px, y: clamp(yc, 34 - 3.9, 34 + 3.9) };
        p.speedWish = 1;
        p.diving = tc < 0.55 && Math.abs(yc - p.pos.y) > 1.1;
        if (p.diving && len(p.vel) > 3 && p.actionT <= 0) p.setAction('gk_dive', 0.5);
        return;
      }
    }
  }
  // sweeper-keeper: range grows with a higher defensive line
  const sweepR = 11 + (team.tactics.defLine || 0.5) * 9;
  const dBall = dist(p.pos, ball);
  if (!ball.controller && !ball.holder && ball.speed() < 9 && dBall < 10 && Math.abs(ball.x - gx) < sweepR && Math.abs(ball.y-34) < 22){
    let oppNear = 99;
    for (const o of game.other(team).players){ const d = dist(o.pos, ball); if (d < oppNear) oppNear = d; }
    if (dBall < oppNear + 1.5){ p.target = { x: ball.x, y: ball.y }; p.speedWish = 1; return; }
  }
  const d = dist(ball, { x: gx, y: 34 });
  const off = clamp(10 - d * 0.13, 0.7, 6);
  const dv = norm(sub(ball, { x: gx, y: 34 }));
  p.target = {
    x: clamp(gx + dv.x * off, gx === 0 ? 0.5 : CFG.PITCH_L - 13, gx === 0 ? 13 : CFG.PITCH_L - 0.5),
    y: clamp(34 + dv.y * off, 34 - 7.5, 34 + 7.5),
  };
  p.speedWish = 0.8;
}
function keeperResolve(game, dt){
  const ball = game.ball;
  if (ball.holder){
    const k = ball.holder;
    // keeper-collision foul: opponents crashing into a keeper holding the ball
    for (const o of game.other(k.team).players){
      const d = dist(o.pos, k.pos);
      if (d < 0.9 && len(o.vel) > 4 && o.tackleCd <= 0){
        o.tackleCd = 2;
        game.match.registerFoul(o, k, 'keeper collision', true, 0.5);
      }
    }
    k.holdT -= dt;
    if (k.holdT <= 0){
      let best = null, bs = -1;
      for (const m of k.team.players){
        if (m === k) continue;
        const dm = dist(k.pos, m.pos);
        if (dm < 14 || dm > 58) continue;
        const adv = (m.pos.x - k.pos.x) * k.team.attackDir;
        const s = adv + Math.abs(m.pos.y - 34) * 0.4 + srand() * 6;
        if (s > bs){ bs = s; best = m; }
      }
      ball.holder = null;
      if (best){
        const dm = dist(k.pos, best.pos);
        const l = loftFor(dm);
        ball.z = 0.5;
        doKick(k, game, { type:'pass', tx:best.pos.x, ty:best.pos.y, speed:l.vh, vz:l.vz, sigma:0.12, receiver:best });
      }
      k.holdCd = 2;
    }
    return;
  }
  for (const team of game.teams){
    const k = team.gk;
    if (k.holdCd > 0 || k.kickCooldown > 0.3) continue;
    const d2 = dist(k.pos, ball);
    const d3 = Math.hypot(d2, Math.max(0, ball.z - 1.0));
    const reach = 0.95 + k.a.gk * 0.65 + (k.diving ? 0.5 : 0);
    // the keeper may not scoop up his own team's routine touches, but he MUST
    // be able to save a deflection heading for his own goal
    const gxOwn = team.ownGoalX();
    const dangerous = ((gxOwn === 0 && ball.vx < -6) || (gxOwn === CFG.PITCH_L && ball.vx > 6)) &&
      Math.abs(ball.x - gxOwn) < 24 && Math.abs(ball.y - 34) < 15;
    const ownTouch = ball.lastTouchTeam === team;
    if (d3 < reach && ball.z < 2.45 && ball.lastToucher !== k && (!ownTouch || dangerous)){
      const sp3 = Math.hypot(ball.vx, ball.vy, ball.vz);
      const wasShot = ball.isShot;
      if (sp3 < 11 + k.a.gk * 7 && srand() < 0.28 + k.a.gk * 0.34 + ENV.catchMod){
        ball.holder = k; k.holdT = (1.3 + srand() * 0.6) * (1 + (k.team.tactics.timeWaste || 0) * 1.1);
        if (game.recorder) game.recorder.log('gk_catch', { actor: k.pid, position: EventSerializer.pos(k.pos), save: !!wasShot });
        ball.controller = null; ball.isShot = false;
        creditTouch(game, k);
        resolvePendingPass(game, k, true);
        k.setAction('gk_catch', 0.6);
        if (wasShot){ game.announce('SAVE!'); game.counts.save++; k.stats.saves++; game.commentate('save', { p: k, team }); if (game.lastShooter){ game.lastShooter.team.onTarget++; game.lastShooter.stats.shotsOn++; } ball.shotCredited = true; if (game.stadium) game.stadium.react('save', team); }
      } else {
        const inward = team.ownGoalX() === 0 ? 1 : -1;
        if (srand() < 0.35){
          // pushed wide behind the goal line -> corner territory
          ball.vx = -inward * (1.5 + srand() * 2.5);
          ball.vy = Math.sign(ball.y - 34 || (srand() - 0.5)) * (9 + srand() * 5);
        } else {
          // live rebound into the box: dangerous, like a real spill
          ball.vx = inward * (4 + srand() * 6);
          ball.vy = Math.sign(ball.y - 34 || 1) * (4 + srand() * 7) + ball.vy * 0.25;
        }
        ball.vz = 1 + srand() * 2;
        ball.isShot = false;
        creditTouch(game, k);
        resolvePendingPass(game, k, true);
        k.holdCd = 0.9;
        k.setAction('gk_parry', 0.5);
        if (game.recorder) game.recorder.log('gk_parry', { actor: k.pid, position: EventSerializer.pos(k.pos), save: !!wasShot });
        if (wasShot){ game.announce('SAVE!'); game.counts.save++; k.stats.saves++; game.commentate('save', { p: k, team }); if (game.lastShooter){ game.lastShooter.team.onTarget++; game.lastShooter.stats.shotsOn++; } ball.shotCredited = true; if (game.stadium) game.stadium.react('save', team); }
      }
    }
  }
}

// ---- Ball control, dribble touches ----------------------------------------
function updateControl(game, dt){
  const ball = game.ball;
  if (ball.holder) return;
  let best = null, bestScore = 1e9;
  for (const team of game.teams){
    for (const p of team.players){
      if (p.kickCooldown > 0) continue;
      if (p.actionT > 0 && (p.action === 'fall' || p.action === 'slide')) continue;
      const d = dist(p.pos, ball);
      if (d > CFG.CONTROL_RADIUS || ball.z > 1.3) continue;
      const rel = Math.hypot(ball.vx - p.vel.x, ball.vy - p.vel.y);
      const ctl = 8 + (p.isGK ? p.a.gk : p.a.dribbling) * 9;
      if (rel > ctl) continue;
      const score = d - p.a.dribbling * 0.3;
      if (score < bestScore){ bestScore = score; best = p; }
    }
  }
  ball.controller = best;
  if (!best) return;
  ball.intendedReceiver = null;
  if (ball.lastToucher !== best){
    creditTouch(game, best);
    resolvePendingPass(game, best, true);
    // controlled possession by the other side ends any deflection window
    if (ball.lastKicker && best.team !== ball.lastKicker.team) ball.lastKickClock = -1e9;
  }
  const sp = len(best.vel);
  const d = dist(best.pos, ball);
  if (sp > 0.8){
    if (d < 0.65 && best.touchCd <= 0){
      const noise = gauss() * (1 - best.a.dribbling) * 0.22;
      const a = best.facing + noise;
      const push = 1.25 + sp * 0.32 + best.a.dribbling * 0.6;
      ball.vx = best.vel.x + Math.cos(a) * push;
      ball.vy = best.vel.y + Math.sin(a) * push;
      ball.vz = Math.max(ball.vz, 0);
      best.touchCd = 0.28 + (1 - best.a.dribbling) * 0.14;
    }
  } else {
    const fx = best.pos.x + Math.cos(best.facing) * 0.45;
    const fy = best.pos.y + Math.sin(best.facing) * 0.45;
    ball.vx = lerp(ball.vx, (fx - ball.x) * 4, Math.min(1, 8 * dt));
    ball.vy = lerp(ball.vy, (fy - ball.y) * 4, Math.min(1, 8 * dt));
  }
}
function canKick(p, ball){
  return !ball.holder && p.kickCooldown <= 0 && ball.z < 1.5 && dist(p.pos, ball) < CFG.KICK_RANGE;
}
function executePendingKicks(game){
  if (game.match.state !== 'PLAYING') return; // an offside call can kill the phase mid-frame
  const ball = game.ball;
  const c = ball.controller;
  if (!c || c.human) return;
  const dec = c.decision;
  if (dec && dec.type !== 'dribble' && dec.type !== 'shield' && canKick(c, ball)){
    doKick(c, game, dec);
    c.decision = { type: 'dribble' };
    c.decideT = 0.3;
  }
}

// ---- Tackles: standing vs sliding, fouls ------------------------------------
function fromBehind(tackler, carrier){
  // tackler approaching from the carrier's back
  const toC = norm(sub(carrier.pos, tackler.pos));
  return (toC.x * Math.cos(carrier.facing) + toC.y * Math.sin(carrier.facing)) > 0.4;
}
function resolveTackles(game, dt){
  const ball = game.ball;
  const c = ball.controller;
  // ongoing slides: check for contact with the ball / carrier
  for (const team of game.teams){
    for (const p of team.players){
      if (p.action !== 'slide' || p.actionT <= 0 || p.slideHit) continue;
      if (dist(p.pos, ball) < 1.3 && ball.z < 0.9){
        p.slideHit = true;
        const victim = ball.controller && ball.controller.team !== p.team ? ball.controller : null;
        const behind = victim ? fromBehind(p, victim) : false;
        p.stats.tackAtt++;
        exert(p, 0.012); if (victim) exert(victim, 0.005);
        const winCh = victim
          ? clamp(0.42 + (p.a.tackling - victim.a.dribbling) * 0.35 - (behind ? 0.22 : 0), 0.1, 0.8)
          : 0.9;
        if (srand() < winCh){
          p.stats.tackWon++;
          if (victim) victim.stats.possLost = (victim.stats.possLost || 0) + 1;
          if (game.recorder) game.recorder.log('tackle', { actor: p.pid, target: victim ? victim.pid : undefined, slide: true, won: true });
          const dir = norm({ x: (p.team.oppGoalX() - ball.x) * 0.3 + (srand() - 0.5) * 6, y: (srand() - 0.5) * 8 });
          const kb = 6 + srand() * 5;
          ball.vx = dir.x * kb; ball.vy = dir.y * kb; ball.vz = 0.5 + srand();
          ball.controller = null; ball.isShot = false;
          creditTouch(game, p);
          resolvePendingPass(game, p, false); // tackle stats already credit the win
          if (victim) victim.slowT = 0.5;
        } else if (victim){
          const foulCh = 0.5 + (behind ? 0.35 : 0) + p.a.aggression * 0.1;
          if (srand() < foulCh){
            // referee judgement: slide + speed + angle + stopping an attack
            const promising = Math.abs(victim.pos.x - victim.team.oppGoalX()) < 42;
            const sev = 0.45 + (behind ? 0.22 : 0) + p.a.aggression * 0.12
              + (len(p.vel) > 6 ? 0.08 : 0) + (promising ? 0.08 : 0);
            game.match.registerFoul(p, victim,
              behind ? 'sliding tackle from behind' : 'late sliding tackle', false, sev);
          }
        }
      }
    }
  }
  if (!c) return;
  for (const p of game.other(c.team).players){
    if (p.isGK || p.tackleCd > 0) continue;
    if (p.duty !== 'press' && p.duty !== 'press2' && p.duty !== 'chase') continue;
    const dBall = dist(p.pos, ball);
    const dCar = dist(p.pos, c.pos);
    const closing = (c.pos.x - p.pos.x) * p.vel.x + (c.pos.y - p.pos.y) * p.vel.y > 0;
    // SLIDING tackle: a lunge from range — riskier, more foul-prone
    // (booked players are noticeably more careful)
    if (dBall > 1.7 && dBall < 3.2 && closing && len(p.vel) > 3 && p.actionT <= 0){
      const ownGx = p.team.ownGoalX();
      const desperate = Math.abs(c.pos.x - ownGx) < 30;
      const caution = p.stats.yellow > 0 ? 0.5 : 1;
      if ((desperate || p.a.aggression > 0.6) && srand() < (0.35 + p.a.aggression * 0.25) * caution){
        p.tackleCd = 1.8;
        p.setAction('slide', 0.55);
        p.slideHit = false;
        const ip = add(ball, scl({ x: ball.vx, y: ball.vy }, 0.25));
        const dir2 = norm(sub(ip, p.pos));
        p.vel = scl(dir2, 7 + p.a.pace * 2.5);
        p.slowT = 1.1; // getting back up costs time after the slide ends
        continue;
      }
    }
    // STANDING tackle
    if (dBall < 1.6 && dCar < 2.2){
      const behind = fromBehind(p, c);
      const agg = p.team.tactics.defAggression !== undefined ? p.team.tactics.defAggression : 0.5;
      const chance = clamp(0.32 + (p.a.tackling - c.a.dribbling) * 0.5 + p.a.aggression * 0.08 - (behind ? 0.12 : 0), 0.15, 0.75)
        * (0.85 + agg * 0.3);
      p.tackleCd = 1.7 - agg * 0.9; // aggressive sides go again sooner
      exert(p, 0.008); if (c) exert(c, 0.005); // the duel costs both men
      p.setAction('tackle', 0.35);
      p.stats.tackAtt++;
      if (srand() < chance){
        p.stats.tackWon++;
        c.stats.possLost = (c.stats.possLost || 0) + 1;
        if (game.recorder) game.recorder.log('tackle', { actor: p.pid, target: c.pid, slide: false, won: true });
        const dir = norm({ x: (p.team.oppGoalX() - ball.x) * 0.3 + (ball.x - c.pos.x), y: (ball.y - c.pos.y) + (srand() - 0.5) * 4 });
        const kb = 5 + srand() * 4;
        ball.vx = dir.x * kb; ball.vy = dir.y * kb; ball.vz = 0.5 + srand();
        ball.controller = null; ball.isShot = false;
        creditTouch(game, p);
        resolvePendingPass(game, p, false);
        c.slowT = 0.7;
        p.kickCooldown = 0.35;
      } else {
        p.slowT = 0.9;
        const pr = game.ref.profile || { strictness: 0.5 };
        const foulCh = (0.11 + (behind ? 0.2 : 0) + p.a.aggression * 0.1) * (0.6 + pr.strictness * 0.8);
        const roll = srand();
        if (roll >= foulCh && roll < foulCh * 1.5 && game.ref.stats) game.ref.stats.foulsIgnored++;
        if (roll < foulCh){
          const sev = 0.24 + (behind ? 0.2 : 0) + p.a.aggression * 0.1;
          game.match.registerFoul(p, c, behind ? 'challenge from behind' : 'late challenge', false, sev);
        }
      }
    }
  }
}
function resolveBlocks(game){
  const ball = game.ball;
  if (ball.holder) return;
  const sp = ball.speed();
  if (sp < 7) return;
  for (const team of game.teams){
    for (const p of team.players){
      if (p === ball.controller || p.blockCd > 0 || p.kickCooldown > 0.25) continue;
      // a jumping wall blocks high free kicks; everyone else blocks low balls
      if (ball.z > ((p.wallJumpT || 0) > 0 ? 2.3 : 1.25)) continue;
      const d = dist(p.pos, ball);
      if (d < 0.5){
        const n = d < 1e-4 ? { x: 1, y: 0 } : norm(sub(ball, p.pos));
        ball.vx = n.x * sp * 0.4 + p.vel.x * 0.5 + gauss() * 1.5;
        ball.vy = n.y * sp * 0.4 + p.vel.y * 0.5 + gauss() * 1.5;
        ball.vz = Math.abs(ball.vz) * 0.4 + 1;
        ball.isShot = false;
        creditTouch(game, p);
        resolvePendingPass(game, p, true); // a body-block IS the interception
        p.blockCd = 0.5;
      }
    }
  }
}
// ---- Headers: contest aerial balls ------------------------------------------
// Gated so players only attack headable balls (descending, end of flight or
// in a box), not every pass that happens to fly overhead.
function resolveHeaders(game){
  const ball = game.ball;
  if (game.headerCd > 0) return;
  if (ball.holder || ball.z < 1.35 || ball.z > 2.35) return;
  if (ball.vz > 1) return; // still rising: let it travel
  const hsp = ball.speed();
  const inABox = [0, CFG.PITCH_L].some(gx => Math.abs(ball.x - gx) < CFG.BOX_D && Math.abs(ball.y - 34) < CFG.BOX_W / 2);
  if (Math.hypot(ball.vx, ball.vy, ball.vz) < 5) return;
  if (hsp > 13 && !inABox) return; // mid-flight rockets only contested in the box
  let best = null, bd = 1e9;
  for (const team of game.teams){
    for (const p of team.players){
      if (p.isGK || p.kickCooldown > 0) continue;
      const d = dist(p.pos, ball);
      if (d < 1.0 && d < bd){ bd = d; best = p; }
    }
  }
  if (!best) return;
  // the intended receiver in space brings it down instead of heading it
  if (best === ball.intendedReceiver){
    let oppNear = 1e9;
    for (const o of game.other(best.team).players){ const d = dist(o.pos, best.pos); if (d < oppNear) oppNear = d; }
    if (oppNear > 2.5) return;
  }
  if (srand() > 0.35 + best.a.positioning * 0.35) return; // mistimed jump
  game.headerCd = 1.2;
  resolvePendingPass(game, best, true); // headed cross = completed / cut out
  const team = best.team;
  const gx = team.oppGoalX();
  const dGoal = dist(best.pos, { x: gx, y: 34 });
  game.announce('HEADER'); game.counts.header++;
  if (dGoal < 22){
    doKick(best, game, { type:'shot', header:true, tx: gx, ty: 34 + gauss() * 2,
      speed: 13 + best.a.strength * 8, vz: -1 + srand() * 2, sigma: 0.13 });
  } else {
    const ownGx = team.ownGoalX();
    const defensive = Math.abs(best.pos.x - ownGx) < 30;
    if (defensive){
      doKick(best, game, { type:'clear', header:true, tx: ownGx + team.attackDir * 40, ty: best.pos.y < 34 ? 10 : 58,
        speed: 10 + best.a.strength * 5, vz: 4 + srand() * 2, sigma: 0.25 });
    } else {
      // knock-down toward a nearby teammate
      let mate = null, md = 1e9;
      for (const m of team.players){ if (m === best || m.isGK) continue; const d = dist(m.pos, best.pos); if (d < md && d > 3){ md = d; mate = m; } }
      const tx = mate ? mate.pos.x : best.pos.x + team.attackDir * 8;
      const ty = mate ? mate.pos.y : best.pos.y;
      doKick(best, game, { type:'pass', header:true, tx, ty, speed: 7 + srand() * 3, vz: -0.5, sigma: 0.18, receiver: mate });
    }
  }
}

/* ---------------------- TACTICAL POSITIONING SYSTEM ------------------------ */
// TacticalPositioningSystem: builds full-team staged-position maps for every
// restart so both sides reorganize like a televised set piece. Entries are
// { x, y, sw } — sw is the walk/jog speedWish used on the way in. Consumed by
// offBallTarget's dead-ball branch; delayed runs live in restart.spTargets2
// and are merged into spTargets at restart.swapT (see Match.update).
const TacticalPositioningSystem = {
  // ThrowInRoutineSystem: teammates carve out passing lanes — a short option
  // to feet, a down-the-line runner, an infield triangle and a safety valve.
  // Opponents mark the receivers instead of crowding the ball.
  stageThrowIn(r, game){
    const team = r.team, opp = game.other(team), dir = team.attackDir, spot = r.spot;
    r.spTargets = new Map();
    const inY = spot.y < 34 ? 1 : -1; // infield direction
    const mates = team.players.filter(p => !p.isGK && p !== r.taker)
      .sort((a, b) => dist(a.pos, spot) - dist(b.pos, spot));
    const lanes = [
      { x: spot.x + dir * 4.5, y: spot.y + inY * 4.5, sw: 0.7 },  // short, to feet
      { x: spot.x + dir * 11,  y: spot.y + inY * 2.5, sw: 0.85 }, // down the line
      { x: spot.x + dir * 1.5, y: spot.y + inY * 10,  sw: 0.7 },  // infield triangle
      { x: spot.x - dir * 7,   y: spot.y + inY * 6,   sw: 0.6 },  // safety valve
    ];
    lanes.forEach(sp => {
      // lanes clamp tighter than markers so goal-side offsets survive corners
      sp.x = clamp(sp.x, 4, CFG.PITCH_L - 4); sp.y = clamp(sp.y, 1.2, CFG.PITCH_W - 1.2);
    });
    lanes.forEach((sp, i) => { if (mates[i]) r.spTargets.set(mates[i], sp); });
    // markers pick up the staged receivers, goal-side, outside the 2m circle
    const receivers = [...r.spTargets.entries()];
    const defs = opp.players.filter(p => !p.isGK)
      .sort((a, b) => dist(a.pos, spot) - dist(b.pos, spot));
    const ownGx = opp.ownGoalX();
    let di = 0;
    for (const [, sp] of receivers){
      if (di >= 3) break;
      const mk = defs[di++];
      if (!mk) break;
      const t = { x: sp.x + Math.sign(ownGx - sp.x) * 1.5, y: sp.y + (34 - sp.y) * 0.06, sw: 0.75 };
      const d = dist(t, spot);
      if (d < 2.5){ const away = norm(sub(t, spot)); t.x = spot.x + away.x * 2.5; t.y = spot.y + away.y * 2.5; }
      t.x = clamp(t.x, 2, CFG.PITCH_L - 2); t.y = clamp(t.y, 1.2, CFG.PITCH_W - 1.2);
      r.spTargets.set(mk, t);
    }
  },
  // GoalKickRoutineSystem: possession sides split their back line to build
  // out; direct sides push bodies to the second-ball zone. High-pressing
  // opponents send strikers up to squeeze the short options.
  stageGoalKick(r, game){
    const team = r.team, opp = game.other(team), dir = team.attackDir, gx = team.ownGoalX();
    r.spTargets = new Map();
    const cbs = team.players.filter(p => p.role === 'CB');
    const fbs = team.players.filter(p => p.role === 'LB' || p.role === 'RB');
    const dms = team.players.filter(p => p.role === 'CM')
      .sort((a, b) => a.slot.x - b.slot.x);
    r.shortTo = cbs[0] || null; // any style can play short when asked to
    if (team.tactics.style === 'possession'){
      cbs.slice(0, 2).forEach((p, i) => r.spTargets.set(p, { x: gx + dir * 8, y: 34 + (i === 0 ? -15 : 15), sw: 0.7 }));
      fbs.forEach(p => r.spTargets.set(p, { x: gx + dir * 24, y: formationWorld(p).y < 34 ? 6 : 62, sw: 0.75 }));
      if (dms[0]) r.spTargets.set(dms[0], { x: gx + dir * 17, y: 34, sw: 0.7 });
    } else {
      const zone = gx + dir * 55;
      team.players.filter(p => p.line === 'ATT').slice(0, 3).forEach((p, i) =>
        r.spTargets.set(p, { x: clamp(zone + dir * 3, 8, CFG.PITCH_L - 8), y: 20 + i * 12, sw: 0.75 }));
    }
    if (opp.tactics.pressing > 0.6){
      opp.players.filter(p => p.line === 'ATT').slice(0, 2).forEach((p, i) =>
        r.spTargets.set(p, { x: gx + dir * (14 + i * 3), y: 34 + (i === 0 ? -12 : 12), sw: 0.8 }));
    }
  },
  // CornerRoutineSystem extras: rebound hunters on the edge of the box, a
  // near-post zonal guard, a cutback screen — and delayed darts: the aerial
  // targets hold off their marks, then attack the spots just before delivery.
  stageCornerExtras(r, game){
    const team = r.team, def = game.other(team);
    const gx = r.spot.x < 50 ? 0 : CFG.PITCH_L, inw = gx === 0 ? 1 : -1;
    const spare = team.players.filter(q => !q.isGK && q !== r.taker && q !== r.short && !r.spTargets.has(q) && q.line !== 'DEF')
      .sort((a, b) => Math.abs(a.pos.x - gx) - Math.abs(b.pos.x - gx));
    spare.slice(0, 2).forEach((q, i) =>
      r.spTargets.set(q, { x: gx + inw * (19.5 + i * 3), y: 34 + (i === 0 ? -7 : 7), sw: 0.7 }));
    const guards = def.players.filter(q => !q.isGK && !r.spTargets.has(q))
      .sort((a, b) => dist(a.pos, r.spot) - dist(b.pos, r.spot));
    if (guards[0]) r.spTargets.set(guards[0], { x: gx + inw * 2.6, y: 34 + (r.spot.y < 34 ? -3.4 : 3.4), sw: 0.85 });
    if (guards[1]) r.spTargets.set(guards[1], { x: gx + inw * 13, y: 34 + (r.spot.y < 34 ? -8 : 8), sw: 0.8 });
    r.spTargets2 = new Map();
    for (const [p, sp] of [...r.spTargets]){
      if (p.team !== team || p === r.short) continue;
      if (Math.abs(sp.x - gx) > 14) continue; // only the box crowd darts late
      r.spTargets2.set(p, { x: sp.x, y: sp.y, sw: 0.98 });
      r.spTargets.set(p, {
        x: sp.x + inw * 3.2,
        y: sp.y + (34 - sp.y) * 0.25 + (srand() - 0.5) * 2,
        sw: 0.6,
      });
    }
  },
  // WallFormationSystem extras: defenders pick up the free-kick runners
  // goal-side, one attacker hangs on the edge for the rebound, and the
  // runners themselves dart for the far line only as the taker steps up.
  stageFreeKickExtras(r, game){
    const team = r.team, def = game.other(team);
    if (!r.shooting){
      // simple free kick: two nearby teammates offer angles around the ball
      const dir = team.attackDir;
      const near = team.players.filter(p => !p.isGK && p !== r.taker)
        .sort((a, b) => dist(a.pos, r.spot) - dist(b.pos, r.spot));
      r.spTargets = r.spTargets || new Map();
      if (near[0]) r.spTargets.set(near[0], { x: clamp(r.spot.x + dir * 7, 2, 103), y: clamp(r.spot.y - 6, 2, 66), sw: 0.7 });
      if (near[1]) r.spTargets.set(near[1], { x: clamp(r.spot.x - dir * 4, 2, 103), y: clamp(r.spot.y + 7, 2, 66), sw: 0.65 });
      return;
    }
    const gxA = team.oppGoalX(), inwA = gxA === 0 ? 1 : -1;
    const runners = [...r.spTargets.entries()].filter(([p]) => p.team === team && p !== r.short);
    const freeDefs = def.players.filter(q => !q.isGK && !r.spTargets.has(q))
      .sort((a, b) => dist(a.pos, { x: gxA, y: 34 }) - dist(b.pos, { x: gxA, y: 34 }));
    let di = 0;
    r.spTargets2 = r.spTargets2 || new Map();
    for (const [p, sp] of runners){
      // marker: goal-side of where the runner will END up
      if (di < 3){
        const mk = freeDefs[di++];
        if (mk) r.spTargets.set(mk, { x: sp.x + inwA * -1.4, y: sp.y + (34 - sp.y) * 0.1, sw: 0.8 });
      }
      // delayed run: hold a stride deeper, dart as the taker approaches
      r.spTargets2.set(p, { x: sp.x, y: sp.y, sw: 0.98 });
      r.spTargets.set(p, { x: sp.x + inwA * 3, y: sp.y + (34 - sp.y) * 0.2, sw: 0.6 });
    }
    const spare = team.players.filter(q => !q.isGK && q !== r.taker && !r.spTargets.has(q) && q.line !== 'DEF')
      .sort((a, b) => Math.abs(a.pos.x - gxA) - Math.abs(b.pos.x - gxA));
    if (spare[0]) r.spTargets.set(spare[0], { x: gxA + inwA * 19, y: 34 + (r.spot.y < 34 ? 5 : -5), sw: 0.7 });
  },
};

/* --------------------------- MATCH STATE MANAGER --------------------------- */
class Match {
  constructor(game){
    this.game = game;
    this.state = 'KICKOFF'; this.stateT = 0;
    this.half = 1; this.tMatch = 0;
    this.score = [0, 0];
    this.firstKick = 0;
    this.restart = null;
    this.banner = ''; this.bannerSub = '';
    this.goalScorer = null;
    this.pendingFoul = null;
  }
  setState(s){
    if (this.game.recorder && this.state !== s)
      this.game.recorder.log('state', { from: this.state, to: s });
    this.state = s; this.stateT = 0;
  }
  registerFoul(by, victim, desc, immediate, severity){
    if (this.state !== 'PLAYING') return;
    if (this.game.ref.stats){ this.game.ref.stats.foulsCalled++; this.game.ref.stats.decisions++; }
    // low-advantage referees whistle straight away
    if (!immediate && this.game.ref.profile && srand() > this.game.ref.profile.advantage + 0.25) immediate = true;
    if (this.game.recorder) this.game.recorder.log('foul_committed', { actor: by.pid, target: victim.pid, severity: +(severity || 0.3).toFixed(2) });
    victim.setAction('fall', 0.8);
    victim.slowT = 1.0;
    by.stats.foulsC++;
    victim.stats.foulsS++;
    if (this.pendingFoul){
      // second foul during the advantage window: whistle now, and punish
      // whichever offence is worse — with ITS offender, victim and spot
      const f = this.pendingFoul;
      if ((severity || 0.3) > f.severity){
        Object.assign(f, {
          spot: { x: clamp(victim.pos.x, 2, 103), y: clamp(victim.pos.y, 2, 66) },
          team: victim.team, byTeam: by.team, by, victim, desc, severity: severity || 0.3,
        });
      }
      f.t = Math.max(f.t, 99);
      f.immediate = true;
      return;
    }
    this.pendingFoul = { spot: { x: clamp(victim.pos.x, 2, 103), y: clamp(victim.pos.y, 2, 66) },
      team: victim.team, byTeam: by.team, by, victim, desc,
      severity: severity || 0.3, immediate: !!immediate, t: immediate ? 99 : 0 };
  }
  // The referee remembers card-worthy fouls even when play continues:
  // advantage kept, a goal in the window, or the half-time whistle.
  flushFoulCards(){
    const f = this.pendingFoul;
    this.pendingFoul = null;
    if (f && f.severity > 0.48){
      this.game.counts.foul++;
      f.byTeam.fouls++;
      this.applyDiscipline(f);
    }
  }
  callOffside(p){
    const g = this.game;
    if (this.state !== 'PLAYING') return;
    if (g.broadcast) g.broadcast.event({ icon: 'offside', title: 'OFFSIDE',
      sub: p.name + ' · ' + p.team.code, color: p.team.kit.shirt, dur: 2.4, pri: 1.4 });
    g.commentate('offside', { p, team: p.team });
    if (g.recorder) g.recorder.log('offside', { actor: p.pid, position: EventSerializer.pos(p.pos) });
    g.counts.offside = (g.counts.offside || 0) + 1;
    if (g.stadium){
      g.stadium.react('offside', p.team);
      const lin = g.stadium.actors.find(a => a instanceof SidelineOfficial && ((a.side === 0) === (p.pos.x > 52.5)));
      if (lin){ lin.setAction('flagup', 2.4); }
    }
    const defTeam = g.other(p.team);
    this.beginRestart('FREEKICK', defTeam, { x: clamp(p.pos.x, 8, 97), y: clamp(p.pos.y, 4, 64) });
  }
  // CardSystem: referee judgement once the foul is whistled
  applyDiscipline(f){
    const g = this.game, off = f.by;
    if (!off || off.isGK) return; // subbed players can still be carded
    // RefereeDecisionModel: personality moves the card thresholds, and an
    // inconsistent official occasionally produces a controversial one
    const pr = g.ref.profile || { cardTendency: 0.5, consistency: 0.8 };
    let yT = 0.48 * (1.3 - pr.cardTendency * 0.6);
    let rT = 0.92 * (1.15 - pr.cardTendency * 0.3);
    if (srand() > pr.consistency){ const skew = (srand() - 0.5) * 0.3; yT += skew; rT += skew; g.announce('THE REF SEES IT DIFFERENTLY…', 2); }
    let card = null;
    if (f.severity > rT) card = 'red';
    else if (f.severity > yT || off.stats.foulsC >= 3) card = 'yellow';
    if (card === 'yellow' && off.stats.yellow >= 1) card = 'red2';
    if (!card) return;
    if (card === 'yellow'){
      off.stats.yellow++;
      g.counts.yellow = (g.counts.yellow || 0) + 1;
      if (g.broadcast) g.broadcast.event({ icon: 'card', iconColor: UITheme.warn, title: 'YELLOW CARD',
        sub: off.name + ' · ' + off.team.code, color: off.team.kit.shirt, dur: 3, pri: 2.4 });
      g.commentate('yellow', { p: off, team: off.team, desc: f.desc });
      if (g.ref.stats) g.ref.stats.yellows++;
      if (g.recorder) g.recorder.log('card', { actor: off.pid, card: 'yellow' });
      g.ref.showCard('y');
      if (g.fx) g.fx.play(new RefereeCardAnimation(g, off, 'yellow'));
      if (!g.replayMode) g.present(off, 1.8);
    } else {
      if (card === 'red2') off.stats.yellow++;
      off.stats.red = 1;
      g.counts.red = (g.counts.red || 0) + 1;
      if (g.broadcast) g.broadcast.event({ icon: 'card', iconColor: UITheme.bad, title: 'RED CARD',
        sub: off.name + ' · ' + off.team.code + (card === 'red2' ? ' · second yellow' : ''),
        color: off.team.kit.shirt, dur: 3.6, pri: 2.6 });
      g.ref.showCard('r');
      if (g.ref.stats) g.ref.stats.reds++;
      if (g.recorder) g.recorder.log('card', { actor: off.pid, card: card === 'red2' ? 'red2' : 'red' });
      if (g.fx) g.fx.play(new RefereeCardAnimation(g, off, 'red'));
      if (off.team.players.includes(off)) g.sendOff(off); // else: already off the pitch
      g.commentate('red', { p: off, team: off.team, left: off.team.players.length });
    }
    if (g.stadium) g.stadium.react('card', off.team);
  }
  update(dt){
    const g = this.game;
    this.stateT += dt;
    switch (this.state){
      case 'KICKOFF':
        if (this.stateT > 1.15){
          const r = this.restart;
          if (r && r.taker && r.helper){
            g.ball.z = 0.11;
            doKick(r.taker, g, { type:'pass', tx: r.helper.pos.x, ty: r.helper.pos.y,
              speed: groundPassSpeed(dist(r.taker.pos, r.helper.pos)), vz: 0, sigma: 0.03, receiver: r.helper });
          }
          this.restart = null;
          this.setState('PLAYING');
        }
        break;
      case 'PLAYING':
        this.tMatch += dt * TIME_SCALE;
        // goals and ball-out first: a goal scored during the advantage window stands
        this.checkBallOut();
        if (this.state !== 'PLAYING') break;
        // advantage window: play on if the fouled team keeps the ball
        if (this.pendingFoul){
          const f = this.pendingFoul;
          f.t += dt;
          if (f.t > 0.9){
            this.pendingFoul = null;
            const pt = g.possessionTeam();
            if (!f.immediate && pt === f.team){
              g.announce('ADVANTAGE'); g.counts.advantage++;
              if (g.ref.stats) g.ref.stats.advantages++;
              if (g.recorder) g.recorder.log('advantage', { team: f.team.id });
              // play on — but a card-worthy offence is still punished
              if (f.severity > 0.48){ g.counts.foul++; f.byTeam.fouls++; this.applyDiscipline(f); }
            } else {
              g.announce('FOUL: ' + f.desc); g.counts.foul++;
              f.byTeam.fouls++;
              g.commentate('foul', { p: f.by, v: f.victim, team: f.byTeam, desc: f.desc });
              g.ref.signal(f.spot);
              if (g.stadium) g.stadium.react('foul', f.byTeam, { spot: f.spot, severity: f.severity });
              this.applyDiscipline(f);
              if (g.ball.holder) g.ball.holder = null;
              this.beginRestart('FREEKICK', f.team, this.freekickSpot(f.spot));
              break;
            }
          }
        }
        if (this.half === 1 && this.tMatch >= 45 * 60){
          this.tMatch = 45 * 60;
          this.flushFoulCards();
          this.banner = 'HALF TIME'; this.bannerSub = this.scoreLine();
          g.commentate('ht', { score: this.scoreLine() });
          this.setState('HALFTIME');
        } else if (this.half === 2 && this.tMatch >= 90 * 60){
          this.tMatch = 90 * 60;
          this.flushFoulCards();
          this.banner = 'FULL TIME'; this.bannerSub = this.scoreLine();
          g.commentate('ft', { score: this.scoreLine() });
          postMatchValueUpdate(g); // PostMatchValueUpdate: market values drift on form
          this.setState('FULLTIME');
        }
        break;
      case 'THROWIN': case 'CORNER': case 'GOALKICK': case 'FREEKICK': {
        // ceremony clock parks just shy of the half boundary — the half ends
        // legitimately on the first PLAYING tick after the delivery
        this.tMatch = Math.min(this.tMatch + dt * TIME_SCALE * 0.45, (this.half === 1 ? 45 : 90) * 60 - 0.5);
        const r = this.restart;
        const b = this.game.ball;
        b.x = r.spot.x; b.y = r.spot.y; b.z = 0.11; b.vx = b.vy = b.vz = 0; b.controller = null;
        b.px = b.x; b.py = b.y;
        // RestartState: FORM (walk into shape) → SET (run-up, late darts) → deliver
        const wait = r.wait || 1.2, force = r.force || wait + 2.4;
        if (r.spTargets2 && this.stateT >= (r.swapT || 0)){
          for (const [p, sp] of r.spTargets2) r.spTargets.set(p, sp); // delayed runs go now
          r.spTargets2 = null;
        }
        // readiness: are the staged bodies (mostly) where they belong?
        let ready = true;
        if (r.spTargets && r.spTargets.size){
          let missing = 0, n = 0;
          for (const [p, sp] of r.spTargets){ n++; if (dist(p.pos, sp) > 3.2) missing++; }
          ready = missing <= Math.ceil(n * 0.25);
        }
        // taker choreography: corners place the ball first, then everyone
        // waits at the run-up mark and steps up when the stage is set
        const needsPlace = this.state === 'CORNER' && !r.placed;
        if (needsPlace && dist(r.taker.pos, r.spot) < 1.8){
          r.placed = true; r.taker.setAction('tackle', 0.35);
        }
        const runup = (this.stateT > wait - 0.55 && ready) || this.stateT > force - 0.55;
        const tkTarget = (needsPlace || runup || !r.standback) ? r.spot : r.standback;
        r.taker.target = { x: tkTarget.x, y: tkTarget.y };
        r.taker.speedWish = runup ? 0.95 : (dist(r.taker.pos, tkTarget) > 12 ? 0.85 : 0.6);
        r.taker.duty = 'taker';
