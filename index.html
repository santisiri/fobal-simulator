    if (inp.once('KeyT')){
      if (this.panel && this.panel.type === 'profile'){ this.closePanel(); this.statsFor = null; }
      else { this.statsFor = this.trackPlayer() || this.ball.lastToucher; if (this.statsFor) this.openPanel('profile'); }
    }
    if (inp.once('KeyY')){
      if (this.panel && this.panel.type === 'tactics') this.closePanel();
      else this.openPanel('tactics');
    }
    if (inp.once('KeyL')){
      if (this.panel && this.panel.type === 'history') this.closePanel();
      else this.openPanel('history');
    }
    if (inp.once('KeyG')) this.cycleGrass();
    if (inp.once('KeyN')) this.cycleWeather();
    if (inp.once('KeyB')){
      const keys = Object.keys(STADIUM_THEMES);
      STADIUM.theme = keys[(keys.indexOf(STADIUM.theme) + 1) % keys.length];
      this.rebuildStadium();
      this.announce('STADIUM: ' + STADIUM_THEMES[STADIUM.theme].label, 2.6);
    }
    if (inp.once('KeyU')){
      const steps = [0.35, 0.6, 0.85, 1];
      const i = steps.findIndex(v => Math.abs(v - STADIUM.crowdDensity) < 0.01);
      STADIUM.crowdDensity = steps[(i + 1) % steps.length];
      this.rebuildStadium();
      this.announce('CROWD: ' + Math.round(STADIUM.crowdDensity * 100) + '%', 2.6);
    }
    if (inp.once('KeyP')) this.paused = !this.paused;
    if (inp.once('KeyR')) this.reset();
    { const dTap = inp.once('KeyD'); // D steers right in human mode — no debug flips mid-dribble
      if (dTap && !this.humanMode) this.debug = !this.debug; }
    if (inp.once('KeyH')){
      this.humanMode = !this.humanMode;
      if (this.recorder) this.recorder.log('human_mode', { on: this.humanMode });
      this.selected = this.humanMode ? this.nearestToBall(this.teams[0]) : null;
      // discard any releases recorded while spectating
      inp.passReleased = null; inp.shootReleased = null; this.kickBuffer = null;
      // a pending human set piece reverts to the AI when the coach walks away
      const rsH = this.match.restart;
      if (!this.humanMode && rsH && rsH.humanTaker){
        rsH.humanTaker = false; rsH.awaiting = false;
        rsH.force = Math.min(rsH.force || 4, (rsH.wait || 1.2) + 3.6);
        this.takeRequested = false; this.takeShoot = false;
      }
    }
    if (this.humanMode && inp.once('KeyE')){
      // no cycling away from the taker while a set piece waits on the coach
      const rsE = this.match.restart;
      if (!(rsE && rsE.humanTaker && this.match.state !== 'PLAYING')){
        this.selected = this.nextSelection();
        if (this.recorder && this.selected) this.recorder.log('human_select', { actor: this.selected.pid });
      }
    }
  }
  nearestToBall(team){
    let best = null, bd = 1e9;
    for (const p of team.players){
      if (p.isGK) continue;
      const d = dist(p.pos, this.ball);
      if (d < bd){ bd = d; best = p; }
    }
    return best;
  }
  nextSelection(){
    const list = this.teams[0].players.filter(p => !p.isGK)
      .sort((a, b) => dist(a.pos, this.ball) - dist(b.pos, this.ball));
    const i = list.indexOf(this.selected);
    return list[(i + 1) % list.length];
  }
  // ScriptParser -> ReplayController: validate then start a script session
  loadScript(src, opts = {}){
    const res = ScriptParser.parse(src);
    this.scriptReport = { errors: res.errors, warnings: res.warnings, when: this.animT };
    if (!res.ok){
      this.announce('SCRIPT REJECTED: ' + res.errors.length + ' error(s)', 3.2);
      this.openPanel('script');
      return { ok: false, errors: res.errors, warnings: res.warnings };
    }
    const mode = opts.mode || this.nextLoadMode || 'strict';
    const session = this.replay.load(res.script, mode);
    if (!session){
      this.announce('SCRIPT REJECTED: initial state could not be restored', 3.2);
      this.openPanel('script');
      return { ok: false, errors: (this.scriptReport && this.scriptReport.errors) || ['initial state restore failed'], warnings: res.warnings };
    }
    this.announce('SCRIPT LOADED · ' + mode.toUpperCase() + (res.warnings.length ? ' · ' + res.warnings.length + ' warning(s)' : ''), 3);
    this.openPanel('script');
    return { ok: true, errors: [], warnings: res.warnings };
  }
  humanControl(dt){
    if (!this.humanMode) return;
    let p = this.selected;
    if (!p) return;
    const r = this.ball.intendedReceiver;
    if (this.match.state === 'PLAYING' && r && r.team === this.teams[0] && !r.isGK && this.ball.flightT < 2){
      this.selected = r; p = r;
    }
    p.human = true;
    if (this.coachOpen){
      // the console owns the keyboard: swallow releases, hold position
      this.input.passReleased = null; this.input.shootReleased = null; this.kickBuffer = null;
      p.target = p.pos; p.speedWish = 0;
      return;
    }
    const rsx = this.match.restart;
    if (this.match.state !== 'PLAYING' && this.match.state !== 'RESET' && rsx && rsx.taker === p){
      // Match.update owns the taker's walk-in and polls the trigger keys —
      // releases are left un-consumed so an early press buffers until ready
      this.kickBuffer = null;
      return;
    }
    // input source: replay feed > script runner > live keys — footage and
    // script sessions must never read the viewer's keyboard
    let dir;
    if (this.goalReplay && this.goalReplay.playing) dir = this.replayHumanDir || null;
    else if (this.scriptRunner) dir = this.scriptRunner.moveDir !== undefined ? this.scriptRunner.moveDir : null;
    else dir = this.input.moveDir();
    const dirKey = dir ? Math.round(dir.x * 500) + ',' + Math.round(dir.y * 500) : '';
    if (dirKey !== this._lastMoveKey){
      // full precision: these values are RE-INJECTED in strict replay, and
      // any rounding becomes physical divergence. The dedup key only advances
      // when the event was actually recorded (suppressed logs must not eat
      // the first real change after a replay/session).
      const logged = this.recorder && this.recorder.log('human_move', { actor: p.pid,
        dir: dir ? { x: dir.x, y: dir.y } : null });
      if (logged) this._lastMoveKey = dirKey;
    }
    if (dir){
      p.target = add(p.pos, scl(dir, 6));
      p.speedWish = 1;
      p.facing = turnToward(p.facing, Math.atan2(dir.y, dir.x), CFG.TURN_RATE * dt * 1.4);
    } else if (this.match.state !== 'PLAYING' && rsx && rsx.spTargets && rsx.spTargets.has(p)){
      // dead-ball choreography: with no stick input the selected player walks
      // to the staged spot like everyone else (arrows still override)
      const sp = rsx.spTargets.get(p);
      p.target = { x: sp.x, y: sp.y };
      p.speedWish = dist(p.pos, p.target) < 1.2 ? 0 : (sp.sw !== undefined ? sp.sw : 0.8);
    } else {
      p.target = p.pos; p.speedWish = 0;
    }
    const pwr = this.input.passReleased, swr = this.input.shootReleased;
    this.input.passReleased = null; this.input.shootReleased = null;
    if (pwr || swr){
      // exogenous input: recorded so strict replay can re-arm it identically
      if (this.recorder) this.recorder.log('human_kick', { actor: p.pid,
        pass: pwr || undefined, shoot: swr || undefined }); // full precision — re-injected in strict replay
    }
    if (this.match.state !== 'PLAYING'){ this.kickBuffer = null; return; } // no kicking at dead balls
    // buffer a released kick briefly so a slightly-early release still fires
    // (sim ticks, not wall time — the buffer must replay deterministically)
    if (pwr || swr) this.kickBuffer = { pw: pwr, sw: swr, untilTick: this.simTick + 21 };
    if (this.kickBuffer && this.simTick > this.kickBuffer.untilTick) this.kickBuffer = null;
    if (this.kickBuffer && canKick(p, this.ball)){
      const pw = this.kickBuffer.pw, sw = this.kickBuffer.sw;
      this.kickBuffer = null;
      if (sw){
        const gx = p.team.oppGoalX();
        doKick(p, this, { type:'shot', tx: gx, ty: 34 + gauss() * 1.6,
          speed: 15 + sw * 14, vz: 0.5 + sw * 2.5, spin: gauss(), sigma: 0.09 - p.a.composure * 0.04 });
      } else if (pw){
        let best = null, bs = -1;
        for (const m of p.team.players){
          if (m === p) continue;
          const dm = dist(p.pos, m.pos);
          if (dm < 3 || dm > 50) continue;
          const a = Math.atan2(m.pos.y - p.pos.y, m.pos.x - p.pos.x);
          let dd = Math.abs(a - p.facing);
          while (dd > Math.PI) dd = Math.abs(dd - 2 * Math.PI);
          if (dd > 1.1) continue;
          const s = (1 - dd / 1.1) * 0.6 + laneClear(p.pos, m.pos, this.other(p.team).players, 0) * 0.4;
          if (s > bs){ bs = s; best = m; }
        }
        if (best){
          const dm = dist(p.pos, best.pos);
          const loft = pw > 0.62 || dm > 26;
          const l = loftFor(dm);
          doKick(p, this, { type:'pass', tx: best.pos.x + best.vel.x * 0.5, ty: best.pos.y + best.vel.y * 0.5,
            speed: loft ? l.vh : groundPassSpeed(dm) * (0.6 + pw * 0.6), vz: loft ? l.vz : 0,
            sigma: 0.06, receiver: best });
        } else {
          doKick(p, this, { type:'pass', tx: p.pos.x + Math.cos(p.facing) * 15 * pw * 2, ty: p.pos.y + Math.sin(p.facing) * 15 * pw * 2,
            speed: 8 + pw * 14, vz: pw > 0.6 ? 4 : 0, sigma: 0.08 });
        }
      }
    }
  }
  update(dt){
    const m = this.match;
    m.update(dt);
    if (m.state === 'GOAL' || m.state === 'HALFTIME' || m.state === 'FULLTIME'){
      if (m.state === 'GOAL' && this.celebration) this.celebration.update(dt, this);
      return;
    }
    const frozen = m.state === 'KICKOFF';
    for (const t of this.teams) for (const p of t.players) p.human = false;
    this.frameNo = (this.frameNo || 0) + 1; // per-frame claims (runner tracking)
    this.loopDt = dt;                       // dt for rate-scaled AI dice
    // transition detection + defensive lines, before anyone thinks
    const poss = this.possessionTeam();
    if (poss && poss !== this.lastPoss){ this.lastPoss = poss; this.transitionT = 1.2; }
    this.transitionT = Math.max(0, (this.transitionT || 0) - dt);
    for (const t of this.teams) t.dlm.update(this);
    for (const t of this.teams) assignDuties(t, this);
    if (m.restart && m.restart.taker && (m.state === 'THROWIN' || m.state === 'CORNER' || m.state === 'GOALKICK' || m.state === 'FREEKICK'))
      m.restart.taker.duty = 'taker';
    for (const t of this.teams){
      for (const p of t.players){
        p.thinkT -= dt;
        if (p.thinkT <= 0){
          p.thinkInterval = (0.13 + srand() * 0.07) * (1 + (1 - p.stamina) * 0.45); // tired minds react late
          p.thinkT = p.thinkInterval;
          if (p.duty !== 'taker' && !p.scripted && !(this.humanMode && p === this.selected)) playerThink(p, this);
        }
      }
    }
    this.humanControl(dt);
    // ceremony walks: dismissed and substituted players leave the field on
    // the SIM clock, so restarts that wait for them stay deterministic in
    // live play, headless runs and strict replays alike
    for (const t of this.teams)
      for (const p of [...t.bench, ...t.offList])
        if (p.walkOff && p.seatPos){
          // leave by the NEAREST touchline; a far-side exit heads for the
          // tunnel there and the ceremony releases as soon as he's off
          const south = p.pos.y > 40;
          if (south && p.pos.y > CFG.PITCH_W + 1){ p.walkOff = false; p.pos = { ...p.seatPos }; p.action = 'sit'; p.facing = Math.PI / 2; continue; }
          const offPitch = p.pos.y < -1.2;
          const tx2 = offPitch ? p.seatPos.x : p.pos.x;
          const ty2 = offPitch ? p.seatPos.y : (south ? CFG.PITCH_W + 1.6 : -1.6);
          const dx2 = tx2 - p.pos.x, dy2 = ty2 - p.pos.y, d2 = Math.hypot(dx2, dy2);
          const step2 = 4.1 * dt;
          if (d2 < 0.4 && offPitch){ p.walkOff = false; p.action = 'sit'; p.facing = Math.PI / 2; }
          else if (d2 > 1e-4){
            p.pos.x += dx2 / d2 * Math.min(d2, step2); p.pos.y += dy2 / d2 * Math.min(d2, step2);
            p.facing = Math.atan2(dy2, dx2); p.runPhase += step2;
            p.action = 'jog';
          }
        }
    this.ref.think(this);
    if (!frozen){
      for (const t of this.teams) for (const p of t.players) p.update(dt, this);
      this.ref.update(dt, this);
    } else {
      for (const t of this.teams) for (const p of t.players){ p.vel.x *= 0.8; p.vel.y *= 0.8; p.actionT = Math.max(0, p.actionT - dt); if (p.actionT <= 0) p.deriveAction(this); }
    }
    const all = [...this.teams[0].players, ...this.teams[1].players];
    for (let i = 0; i < all.length; i++){
      for (let j = i + 1; j < all.length; j++){
        const a = all[i], bb = all[j];
        const d = dist(a.pos, bb.pos);
        if (d < 0.7 && d > 1e-4){
          const push = scl(norm(sub(a.pos, bb.pos)), (0.7 - d) * 0.5);
          a.pos = add(a.pos, push); bb.pos = sub(bb.pos, push);
        }
      }
    }
    if (m.state === 'PLAYING'){
      this.headerCd = Math.max(0, (this.headerCd || 0) - dt);
      updateControl(this, dt);
      executePendingKicks(this);
      resolveTackles(this, dt);
      resolveBlocks(this);
      resolveHeaders(this);
      keeperResolve(this, dt);
      this.ball.update(dt);
      if (this.pendingPass){ this.pendingPass.t += dt; if (this.pendingPass.t > 4) this.pendingPass = null; }
      const pt = this.possessionTeam();
      if (pt) pt.possT += dt;
    } else if (m.state === 'KICKOFF' && this.ball.holder === null){
      this.ball.vx = this.ball.vy = this.ball.vz = 0;
    }
  }
  // one fixed simulation step — the ONLY way sim time advances. Determinism
  // depends on every path (live loop, __simulate, replays) using this.
  step(){
    this.simTick = (this.simTick || 0) + 1;
    this._inStep = true;
    if (this.goalReplay && this.goalReplay.playing) this.goalReplay.applyFeed();
    if (this.scriptRunner) this.scriptRunner.tick();
    this.update(SIM_STEP);
    if (this.recorder) this.recorder.tick();
    this._inStep = false;
    if (this.goalReplay) this.goalReplay.tick();
  }
  loop(){
    const now = performance.now();
    let dt = Math.min(0.05, (now - this.lastT) / 1000);
    this.lastT = now;
    this.fps = lerp(this.fps, 1 / Math.max(dt, 1e-4), 0.05);
    this.animT += dt;
    this.handleGlobalKeys();
    if (this.replay && this.replay.session) this.replay.tickLoop();
    if (!this.paused){
      // fixed-timestep accumulator; simRate is the replay slow-mo/fast-forward
      const rate = this.simRate !== undefined ? this.simRate : 1;
      this.simAcc = Math.min((this.simAcc || 0) + dt * rate, SIM_STEP * 6);
      while (this.simAcc >= SIM_STEP){ this.step(); this.simAcc -= SIM_STEP; }
    }
    // the stadium is purely cosmetic and stays alive even when paused;
    // it runs on the render clock so headless __simulate skips it entirely
    if (this.stadium) this.stadium.update(dt);
    if (this.fx) this.fx.update(dt); // broadcast-flavor animations, render clock only
    this.renderer.frame(this);
    requestAnimationFrame(() => this.loop());
  }
  rebuildStadium(){
    spriteCache.clear(); // evict the old actor generation's cached poses
    this.stadium = new Stadium(this);
    if (this.renderer) this.renderer.buildBackground();
  }
  simulate(seconds){
    const n = Math.floor(seconds * 60);
    this.headless = true; // broadcast replays are for live viewing only
    try {
      for (let i = 0; i < n; i++){
        this.animT += SIM_STEP;
        this.step();
        if (!isFinite(this.ball.x + this.ball.y + this.ball.z)) throw new Error('NaN ball at step ' + i);
      }
    } finally { this.headless = false; }
    return this.stats();
  }
  stats(){
    const t0 = this.teams[0], t1 = this.teams[1];
    const tot = Math.max(1, t0.possT + t1.possT);
    return {
      state: this.match.state, clock: this.match.clock(), half: this.match.half,
      score: [...this.match.score],
      shots: [t0.shots, t1.shots], onTarget: [t0.onTarget, t1.onTarget],
      passes: [t0.passCmp + '/' + t0.passAtt, t1.passCmp + '/' + t1.passAtt],
      possession: [Math.round(t0.possT/tot*100), Math.round(t1.possT/tot*100)],
      fouls: [t0.fouls, t1.fouls],
      counts: { ...this.counts },
      ball: { x: +this.ball.x.toFixed(1), y: +this.ball.y.toFixed(1), z: +this.ball.z.toFixed(2) },
    };
  }
}

const game = new Game();
window.game = game;
window.__simulate = s => game.simulate(s);
window.__reset = seed => game.reset(seed);
window.__stats = () => game.stats();
// programmatic coach API: __coach("press high and attack the wings")
window.__coach = t => {
  const { script, msgs } = parseCoach(t, game.teams[0]);
  if (msgs.length) TacticalEngine.apply(game, game.teams[0], script, msgs.join(' · '));
  game.announce(msgs.length ? 'COACH ▸ ' + msgs.join(' · ') : 'COACH: not understood', 3.4);
  return msgs;
};
window.__tactics = script => TacticalEngine.apply(game, game.teams[0], script, 'scripted tactics');
window.__llmConfig = patch => LLMSettings.save(patch || {});
window.__present = on => { game.presentCfg.ceremonies = on !== false; return game.presentCfg; }; // e.g. {provider:'openai', apiKey:'sk-…', model:'gpt-4o-mini', endpoint:'', temperature:0.4, maxTokens:400}
window.__setEnv = (grass, weather) => {
  if (grass && GRASS_TYPES[grass]) game.grassKey = grass;
  if (weather && WEATHER_TYPES[weather]) game.weatherKey = weather;
  game.envLocked = true; // pinned across resets (deterministic QA runs)
  game.applyEnv();
  if (game.renderer) game.renderer.buildBackground();
  return ENV.grass.label + ' · ' + ENV.weather.label;
};
window.__unlockEnv = () => { game.envLocked = false; return 'env re-randomizes each match'; };
// ---- scripting / replay console API ----
window.__exportScript = () => game.recorder ? game.recorder.export() : null;
window.__exportScriptJSON = () => JSON.stringify(window.__exportScript());
window.__downloadScript = () => {
  const doc = window.__exportScript();
  if (!doc) return 'no recording';
  const blob = new Blob([JSON.stringify(doc)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'fobal-match-' + (doc.match.seed >>> 0) + '.json';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  return a.download;
};
window.__loadScript = (src, opts) => game.loadScript(src, opts || {});
window.__validateScript = src => { const r = ScriptParser.parse(src); return { ok: r.ok, errors: r.errors, warnings: r.warnings }; };
// ---- on-chain avatar / token API ----
window.__tokenMetadata = pid => {
  const p = EventSerializer.player(game, pid);
  return p ? PlayerTokenMetadata.build(game, p) : null;
};
window.__avatarSVG = pid => {
  const p = EventSerializer.player(game, pid);
  return p ? ProceduralAvatarGenerator.svg(playerTokenId(game, p), { skin: p.app.skin, hair: p.app.hair, shirt: p.app.shirt }) : null;
};
</script>
