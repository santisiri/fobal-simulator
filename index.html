      const x = s.x + ox, y = s.y + oy;
      const hit = beat(2 + en * 4, d.ph);
      ctx.fillStyle = '#6b4a2a'; ctx.fillRect(x - 3, y - 5, 7, 4);      // drum shell
      ctx.fillStyle = '#e8e2d2'; ctx.fillRect(x - 3, y - 6, 7, 1.5);    // skin
      ctx.fillStyle = d.col; ctx.fillRect(x - 2, y - 12, 5, 6);          // drummer
      ctx.fillStyle = '#e8b48c';
      ctx.fillRect(x - 2, y - 15, 3, 3);                                 // head
      ctx.fillRect(x - 4, hit ? y - 10 : y - 13, 2, 2);                  // beating arms
      ctx.fillRect(x + 3, hit ? y - 13 : y - 10, 2, 2);
    }
    for (const cpo of this.capos){
      const s = project(cpo.x, cpo.y, cpo.z);
      const x = s.x + ox, y = s.y + oy - (beat(3 + en * 3, cpo.ph) && en > 0.7 ? 2 : 0);
      ctx.fillStyle = cpo.col; ctx.fillRect(x - 2, y - 11, 5, 6);
      ctx.fillStyle = '#e8b48c'; ctx.fillRect(x - 2, y - 14, 3, 3);
      ctx.fillStyle = '#f0e8d0';                                         // megaphone
      ctx.beginPath(); ctx.moveTo(x + 3, y - 13); ctx.lineTo(x + 8, y - 15); ctx.lineTo(x + 8, y - 10); ctx.closePath(); ctx.fill();
    }
  }
}

// CrowdEmotionSystem + CrowdSpeechBubbleRenderer: comic-style chants rising
// from the stands, chosen by allegiance, score, momentum and recent events.
const CROWD_LINES = {
  goal_for: ['YEEES!', 'GOOOAL!', "THAT'S FOOTBALL!", 'GET IN!'],
  goal_against: ['NO WAY…', 'WAKE UP!', 'NOT AGAIN…'],
  star: ['SUPERSTAR!', 'HE\'S MAGIC!'],
  miss_for: ['HOW?!', 'SHOOT EARLIER!', 'SO CLOSE!'],
  save_for: ['WHAT A SAVE!', 'SAFE HANDS!'],
  foul_against: ['REF, COME ON!', 'CARD HIM!', 'DISGRACE!'],
  card_them: ['OFF! OFF! OFF!', 'BYE BYE!'],
  card_us: ['NEVER A CARD!', 'SOFT!'],
  offside_att: ['NEVER OFFSIDE!', 'LEVEL, REF!'],
  offside_def: ["FLAG'S UP!", 'CAUGHT HIM!'],
  chance: ['SHOOT!', 'GO ON!', 'GREAT BALL!'],
  press_up: ['COME ON!', 'PUSH UP!', 'MOVE IT!'],
  hold: ['HOLD THE LINE!', 'HOLD ON…', 'CLEAR IT!', 'FOCUS!'],
  believe: ['WE BELIEVE!', 'ONE MORE!', 'ALL GAME!'],
  bored: ['MOVE IT!', 'ATTACK!', 'BORING…'],
  angry: ['WAKE UP!', 'WHAT WAS THAT?', 'SORT IT OUT!'],
  sub_ok: ['GOOD SUB!', 'ABOUT TIME!'],
  ole: ['OLE!', 'PATIENT NOW!', 'KEEP IT!'],
};
class CrowdEmotionSystem {
  constructor(stadium){
    this.stadium = stadium;
    this.bubbles = [];
    this.nextAmbient = 5;
    this.spellTeam = null; this.spellT = 0;
  }
  say(sec, key, dur, sym){
    if (!sec) return;
    const pool = key ? CROWD_LINES[key] : null;
    if (key && !pool) return;
    if (this.bubbles.length >= 4) this.bubbles.shift();
    this.bubbles.push({
      x: sec.bx + 24 + Math.random() * Math.max(24, sec.w - 70),
      y: sec.by + 16 + Math.random() * 16,
      text: pool ? pool[(Math.random() * pool.length) | 0] : '',
      sym: sym || null,
      t: 0, dur: dur || 2.3,
    });
  }
  // comic-style symbols above sections during emotional spikes — sparing,
  // playful, readable: "!?", "…", "@#%!", angry clouds, applause bursts
  saySym(sec, sym, dur){ this.say(sec, null, dur || 1.8, sym); }
  pick(aff){
    const list = this.stadium.crowd.sections.filter(s => aff ? s.affinity === aff : s.affinity !== 'vip');
    return list.length ? list[(Math.random() * list.length) | 0] : null;
  }
  affOf(team){ return team && team.idx === 0 ? 'home' : 'away'; }
  otherAff(team){ return team && team.idx === 0 ? 'away' : 'home'; }
  onEvent(type, team, game){
    const riv = STADIUM.rivalry !== undefined ? STADIUM.rivalry : 0.6;
    switch (type){
      case 'goal': {
        this.say(this.pick(this.affOf(team)), 'goal_for');
        this.say(this.pick(this.otherAff(team)), 'goal_against');
        this.saySym(this.pick(this.affOf(team)), 'burst', 2.4);
        this.saySym(this.pick(this.otherAff(team)), 'dots', 2.6);
        const sc = game.match.goalScorer;
        if (sc && sc.value > 0.35) this.say(this.pick(this.affOf(team)), 'star'); // star quality
        break;
      }
      case 'miss':
        if (team) this.say(this.pick(this.affOf(team)), 'miss_for');
        if (team && Math.random() < 0.6) this.saySym(this.pick(this.affOf(team)), 'shock');
        break;
      case 'save': this.say(this.pick(this.affOf(team)), 'save_for'); if (Math.random() < 0.5) this.saySym(this.pick(this.affOf(team)), 'burst'); break;
      case 'foul':
        if (Math.random() < 0.4 + riv * 0.5) this.say(this.pick(this.otherAff(team)), 'foul_against');
        if (Math.random() < 0.35 + riv * 0.4) this.saySym(this.pick(this.otherAff(team)), 'angry');
        break;
      case 'card':
        this.say(this.pick(this.otherAff(team)), 'card_them');
        if (Math.random() < riv){ this.say(this.pick(this.affOf(team)), 'card_us'); this.saySym(this.pick(this.affOf(team)), 'angry'); }
        break;
      case 'offside':
        this.say(this.pick(this.affOf(team)), 'offside_att');
        this.say(this.pick(this.otherAff(team)), 'offside_def');
        break;
      case 'shot': case 'corner': if (Math.random() < 0.5) this.say(this.pick(this.affOf(team)), 'chance', 1.6); break;
      case 'sub': if (Math.random() < 0.5) this.say(this.pick(this.affOf(team)), 'sub_ok', 1.8); break;
    }
  }
  update(dt, mrs, game){
    for (const b of this.bubbles) b.t += dt;
    this.bubbles = this.bubbles.filter(b => b.t < b.dur);
    // possession spell tracking (the "ole" crowd)
    const pt = game.possessionTeam();
    if (pt === this.spellTeam) this.spellT += dt; else { this.spellTeam = pt; this.spellT = 0; }
    // MomentumAnalyzer-driven ambient chatter: frequency rises with intensity
    this.nextAmbient -= dt * (0.7 + mrs.intensity);
    if (this.nextAmbient > 0 || game.match.state === 'FULLTIME') return;
    this.nextAmbient = 7 + Math.random() * 8;
    const m = game.match;
    const lead = m.score[0] - m.score[1];
    const late = m.tMatch > 70 * 60;
    const mom = mrs.momentum;
    if (this.spellT > 14 && pt){ this.say(this.pick(this.affOf(pt)), 'ole', 1.8); return; }
    if (late && lead > 0 && mom < -0.2){ this.say(this.pick('home'), 'hold'); return; }
    if (late && lead < 0 && mom > 0.2){ this.say(this.pick('home'), 'believe'); return; }
    if (mom > 0.45){ this.say(this.pick('home'), 'press_up', 1.8); return; }
    if (mom < -0.45){ this.say(this.pick('away'), 'press_up', 1.8); return; }
    if (mrs.intensity < 0.2 && Math.random() < 0.6){ this.say(this.pick(null), 'bored', 1.8); return; }
    if (late && lead < -1){ this.say(this.pick('home'), 'angry'); }
  }
  draw(ctx, ox, oy){
    for (const b of this.bubbles){
      const a = clamp(Math.min(b.t * 5, (b.dur - b.t) * 2.5), 0, 1);
      const x = b.x + ox, y = b.y + oy - b.t * 4; // gentle rise
      ctx.globalAlpha = a;
      if (b.sym){
        if (b.sym === 'angry'){
          // small dark cloud with a curse string
          ctx.fillStyle = '#2a2e35';
          for (const [dx, dy, r] of [[-5, 0, 5], [0, -3, 6], [6, 0, 5]]){
            ctx.beginPath(); ctx.arc(x + dx, y - 10 + dy, r, 0, 7); ctx.fill();
          }
          ctx.fillStyle = '#ffd257';
          ctx.font = 'bold 7px monospace';
          ctx.fillText('@#%!', x - 9, y - 13);
        } else if (b.sym === 'burst'){
          // applause / cheer burst
          ctx.strokeStyle = '#ffd257'; ctx.lineWidth = 2;
          ctx.beginPath();
          for (let i = 0; i < 8; i++){
            const an = i / 8 * Math.PI * 2 + b.t * 2;
            ctx.moveTo(x + Math.cos(an) * 4, y - 10 + Math.sin(an) * 4);
            ctx.lineTo(x + Math.cos(an) * (8 + Math.sin(b.t * 9) * 1.6), y - 10 + Math.sin(an) * (8 + Math.sin(b.t * 9) * 1.6));
          }
          ctx.stroke();
        } else {
          const txt = b.sym === 'shock' ? '!?' : '…';
          ctx.font = 'bold 12px monospace';
          const w2 = ctx.measureText(txt).width + 8;
          ctx.fillStyle = b.sym === 'shock' ? '#ffd257' : '#c9ced6';
          ctx.fillRect(x - w2 / 2, y - 16, w2, 15);
          ctx.beginPath(); ctx.moveTo(x - 3, y - 1); ctx.lineTo(x + 3, y - 1); ctx.lineTo(x, y + 3); ctx.closePath(); ctx.fill();
          ctx.fillStyle = '#14181d';
          ctx.fillText(txt, x - w2 / 2 + 4, y - 4);
        }
        ctx.globalAlpha = 1;
        continue;
      }
      ctx.font = 'bold 10px monospace';
      const w = ctx.measureText(b.text).width + 10;
      ctx.fillStyle = '#f2f4f6';
      ctx.fillRect(x - w / 2, y - 14, w, 14);
      ctx.beginPath(); // comic tail
      ctx.moveTo(x - 3, y); ctx.lineTo(x + 3, y); ctx.lineTo(x, y + 4); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#14181d';
      ctx.fillText(b.text, x - w / 2 + 5, y - 12);
      ctx.globalAlpha = 1;
    }
  }
}

class Stadium {
  constructor(game){
    this.game = game;
    actorSeq = 0; // deterministic actor ids per stadium generation (cache reuse)
    this.themeDef = STADIUM_THEMES[STADIUM.theme] || STADIUM_THEMES.classic90s;
    this.t = 0;
    this.lastEvent = { type: '', team: null, t: -99, data: null };
    // layout is deterministic per match+theme: strict replays and headless
    // runs rebuild the exact same ground (the sim never touches this stream)
    let th2 = 0;
    for (const ch of STADIUM.theme) th2 = (th2 * 31 + ch.charCodeAt(0)) | 0;
    const rng = mulberry32(((game.matchSeed >>> 0) ^ 0x51AD10 ^ th2) | 0);
    this.layoutRng = rng;
    this.mainStand = null;
    this.standDefs = StadiumBuilder.assemble(this, rng);
    if (!this.mainStand) this.mainStand = this.standDefs[0];
    this.mrs = new MomentumReactionSystem();
    this.crowd = new CrowdManager(this, rng);
    this.emotion = new CrowdEmotionSystem(this);
    this.buildBoards();
    this.buildActors();
  }
  get sections(){ return this.crowd.sections; }
  sectionInfo(mod, tier, u0, u1){
    const base = clamp(STADIUM.crowdDensity, 0, 1);
    const r = this.layoutRng;
    if (mod.away)
      return { affinity:'away', density: Math.min(1, base + 0.1), shirt: this.game.teams[1].kit.shirt, loyal: 0.78 };
    if ((mod.vip || mod.press) && STADIUM.vipBox && tier === mod.tiers.length - 1 && mod.tiers.length > 1)
      return { affinity:'vip', density: base * (mod.press ? 0.45 : 0.5), shirt: mod.press ? '#2e3138' : '#23262e' };
    if (mod.ultras)
      return { affinity:'home', density: Math.min(1, base + 0.08), shirt: this.game.teams[0].kit.shirt, loyal: 0.78 };
    if (mod.edge === 'N' && u0 > 26 && u1 < 79)
      return { affinity:'home', density: base, shirt: this.game.teams[0].kit.shirt };
    return { affinity:'neutral', density: base * (0.8 + r() * 0.2),
      shirt: r() < 0.3 ? this.game.teams[0].kit.shirt : null };
  }
  buildBoards(){
    this.panels = []; this.groups = [];
    const runs = [
      { a:{ x:-4, y:-5.5 }, b:{ x:109, y:-5.5 }, n:14 },
      { a:{ x:-5.5, y:71 }, b:{ x:-5.5, y:-3 }, n:10 },
    ];
    let gi = 0;
    for (const run of runs){
      for (let i = 0; i < run.n; i++){
        const t0 = i / run.n, t1 = (i + 0.96) / run.n;
        const p = new AdBoard(
          { x: lerp(run.a.x, run.b.x, t0), y: lerp(run.a.y, run.b.y, t0) },
          { x: lerp(run.a.x, run.b.x, t1), y: lerp(run.a.y, run.b.y, t1) }, 1.4);
        p.group = (gi / 3) | 0;
        this.panels.push(p); gi++;
      }
    }
    const nG = Math.ceil(gi / 3);
    for (let g = 0; g < nG; g++)
      this.groups.push({ cur: g % AD_DESIGNS.length, next: 0, t: STADIUM.adRotateSec * (0.4 + g * 0.27), trans: -1 });
  }
  buildActors(){
    this.actors = [];
    if (STADIUM.sidelineDetail === 'off') return;
    this.actors.push(new SidelineOfficial(0), new SidelineOfficial(1));
    // coaches only — the seats hold the REAL substitutes (see Team.bench)
    [[0, 30, 42.5], [1, 62.5, 75]].forEach(([ti, bx0, bx1]) => {
      this.actors.push(new BenchStaff(this.game.teams[ti], 'coach', (bx0 + bx1) / 2, -1.6));
    });
    if (STADIUM.sidelineDetail !== 'full') return;
    for (const gx of [0, CFG.PITCH_L]){
      const bx = gx === 0 ? -3 : CFG.PITCH_L + 3;
      for (const y of [23.5, 26.5, 41.5, 44.5]) this.actors.push(new Photographer(bx, y, gx));
      this.actors.push(new Photographer(bx, gx === 0 ? 4 : 63, gx));
    }
    const nStand = this.mainStand;
    let gy = -8.5, gz = 0;
    if (nStand.tiers.length > 1){
      const g = nStand.rowGeom(nStand.tiers[0]);
      gy = -(g.d - 1.4); gz = g.z;
    }
    this.actors.push(new CameraCrew(52.5, gy, gz));
    this.actors.push(new CameraCrew(-4.5, 14, 0));
    this.actors.push(new CameraCrew(CFG.PITCH_L + 4.5, 54, 0));
    const steadicam = new CameraCrew(50, -2.3, 0); // own lane behind the linesman
    steadicam.roam = true;
    this.actors.push(steadicam);
    this.actors.push(new FourthOfficial(53.2, -3.9));
    for (const [sx, sy] of [[-6.8, -4.5], [-6.8, 72.5], [111.8, -4.5], [111.8, 72.5], [20, 72.8], [52.5, 72.8], [85, 72.8], [-7, 34]])
      this.actors.push(new SecurityGuard(sx, sy));
    for (const [kx, ky] of [[16, 70.2], [89, 70.2], [-2.2, 8], [107.2, 60]])
      this.actors.push(new BallKid(kx, ky));
    this.actors.push(new MedicalStaff(46.5, -2.6), new MedicalStaff(59, -2.6));
    // sideline props: VAR station, kit bags, cones, spare bibs
    this.props = [
      new VARMonitor(56.5, -4.6),
      new StadiumProp('bag', 44.5, -2.4), new StadiumProp('bag', 61.5, -2.4),
      new StadiumProp('cones', 20, -3.2), new StadiumProp('cones', 86, -3.2),
      new StadiumProp('bibs', 33.5, -3.1), new StadiumProp('bibs', 71, -3.1),
    ];
  }
  react(type, team, data){
    if (this.game.replayMode) return;
    if (this.game.recorder) this.game.recorder.log('crowd', { kind: type, team: team ? team.id : undefined });
    this.lastEvent = { type, team, t: this.t, data: data || null };
    this.mrs.kick(type, team);
    this.crowd.react(type, team);
    this.emotion.onEvent(type, team, this.game);
  }
  update(dt){
    this.t += dt;
    this.mrs.update(dt, this.game);
    // momentum-shift commentary with hysteresis (feed, not spam)
    const m2 = this.mrs.momentum;
    const side = m2 > 0.55 ? 1 : m2 < -0.55 ? -1 : (Math.abs(m2) < 0.3 ? 0 : (this.momSide || 0));
    if (side !== (this.momSide || 0)){
      if (side !== 0 && this.game.match.state === 'PLAYING')
        this.game.commentate('momentum', { team: this.game.teams[side > 0 ? 0 : 1] });
      this.momSide = side;
    }
    this.crowd.update(dt, this.mrs, this.game);
    this.emotion.update(dt, this.mrs, this.game);
    this.updateBenches(dt);
    for (const gr of this.groups){
      if (gr.trans >= 0){
        gr.trans += dt / STADIUM.adSlideSec;
        if (gr.trans >= 1){ gr.cur = gr.next; gr.trans = -1; }
      } else {
        gr.t -= dt;
        if (gr.t <= 0){
          gr.next = (gr.cur + 1 + (this.groups.indexOf(gr) % (AD_DESIGNS.length - 1))) % AD_DESIGNS.length;
          gr.trans = 0; gr.t = STADIUM.adRotateSec;
        }
      }
    }
    for (const a of this.actors) a.update(dt, this.game);
  }
  // BenchArea behaviour: warm-ups, celebrations, protests, nerves
  updateBenches(dt){
    const g = this.game, m = g.match;
    g.teams.forEach((team, ti) => {
      const warming = m.tMatch > 40 * 60 && team.subsUsed < CFG.MAX_SUBS && m.state !== 'FULLTIME'
        ? team.bench.filter(b => b.slot.role !== 'GK').slice(0, 2) : [];
      [...team.bench, ...team.offList].forEach(p => {
        if (p.walkOff) return; // ceremony walks run on the SIM clock (Game.update)
        if (warming.includes(p)){
          // jogging and stretching along the touchline behind the boards
          p.warmPh = (p.warmPh || Math.random() * 6) + dt * 0.9;
          const bx = ti === 0 ? 20 : 86;
          p.pos.x = bx + Math.sin(p.warmPh) * 5;
          p.pos.y = -1.3;
          p.facing = Math.cos(p.warmPh) > 0 ? 0 : Math.PI;
          p.runPhase += dt * 3.2;
          p.action = ((p.warmPh | 0) % 5 === 4) ? 'stretch' : 'jog';
        } else {
          if (p.seatPos){ p.pos.x = p.seatPos.x; p.pos.y = p.seatPos.y; p.facing = Math.PI / 2; }
          const ev = this.lastEvent;
          const fresh = this.t - ev.t;
          const favor = this.mrs.momentum * (ti === 0 ? 1 : -1);
          if (ev.type === 'goal' && fresh < 3) p.action = ev.team === team ? 'celebrate' : 'sit';
          else if (ev.type === 'card' && fresh < 2 && ev.team === team) p.action = 'point';
          else if ((ev.type === 'shot' || ev.type === 'save') && fresh < 1.5) p.action = 'clap';
          else if (favor > 0.6 && this.mrs.intensity > 0.6) p.action = 'clap';
          else p.action = 'sit';
        }
      });
    });
  }
  // drawn between the pitch and the match entities
  drawCrowd(ctx, ox, oy){
    this.crowd.draw(ctx, ox, oy, this.t);
    this.drawRoof(ctx, ox, oy);
    for (const p of this.panels) p.draw(ctx, ox, oy, this.groups[p.group], this.t);
    for (const pr of this.props || []) pr.draw(ctx, ox, oy, this.t, this.game);
    this.emotion.draw(ctx, ox, oy); // crowd speech bubbles on top of the stands
  }
  // photographer flashes pop in FRONT of their sprites (drawn after entities)
  drawFrontFx(ctx, ox, oy){
    for (const a of this.actors){
      if (a.action === 'shoot_cam' && Math.random() < 0.05){
        const s = project(a.pos.x, a.pos.y, 1.9);
        ctx.fillStyle = 'rgba(255,255,255,0.95)';
        ctx.fillRect(s.x + ox + 4, s.y + oy, 3, 3);
      }
    }
  }
  drawRoof(ctx, ox, oy){ // RoofModule canopies above the far crowds
    for (const st of this.standDefs){
      if (st.near || !st.roof || st.edge.length > 1) continue;
      const top = st.topGeom();
      const S = (u, d, z) => { const w = st.world(u, d, z); const s = project(w.x, w.y, w.z); return { x: s.x + ox, y: s.y + oy }; };
      const depth = Math.min(6.5, st.totalRows() * st.rowDepth * 0.75);
      const col = st.roofCol || '#2c3138';
      const quad = (a, b, c2, d2, f) => {
        ctx.fillStyle = f;
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.lineTo(c2.x, c2.y); ctx.lineTo(d2.x, d2.y); ctx.closePath(); ctx.fill();
      };
      if (st.roof === 'pitched'){
        const zTop = top.z + 4.6, zEave = top.z + 3.0;
        const ridgeD = top.d - depth * 0.45;
        quad(S(st.u0, top.d - depth, zEave), S(st.u1, top.d - depth, zEave),
             S(st.u1, ridgeD, zTop), S(st.u0, ridgeD, zTop), col);
        quad(S(st.u0, ridgeD, zTop), S(st.u1, ridgeD, zTop),
             S(st.u1, top.d + 1.6, zEave + 0.4), S(st.u0, top.d + 1.6, zEave + 0.4), shadeHex(col, 0.72));
        const a = S(st.u0, st.u0 !== undefined ? ridgeD : ridgeD, zTop), b = S(st.u1, ridgeD, zTop);
        ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
      } else {
        const z = top.z + 3.2;
        const a = S(st.u0, top.d - depth, z), b = S(st.u1, top.d - depth, z);
        const c2 = S(st.u1, top.d + 1.6, z + 0.8), d2 = S(st.u0, top.d + 1.6, z + 0.8);
        quad(a, b, c2, d2, col);
        ctx.strokeStyle = 'rgba(255,255,255,0.16)'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
      }
      // fascia: an accent band with the module's own trim colour
      const fz = top.z + 2.9;
      const f0 = S(st.u0, top.d + 1.5, fz), f1 = S(st.u1, top.d + 1.5, fz);
      ctx.strokeStyle = st.seatCol ? hexA(st.seatCol, 0.85) : 'rgba(232,226,210,0.35)';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(f0.x, f0.y); ctx.lineTo(f1.x, f1.y); ctx.stroke();
    }
  }
  // static structure baked into the pre-rendered background
  drawStructure(c, P){
    const th = this.themeDef;
    const poly = (pts, col) => {
      c.beginPath(); pts.forEach((p, i) => i ? c.lineTo(p.x, p.y) : c.moveTo(p.x, p.y));
      c.closePath(); c.fillStyle = col; c.fill();
    };
    for (const st of this.standDefs){
