/* ================== SCRIPTING, RECORDING & REPLAY ENGINE =================== */
// EventSerializer: entity <-> stable-id translation shared by snapshots, the
// recorder and the script systems. Players are 'home_10' style, teams are
// 'home'/'away'.
const EventSerializer = {
  pid(p){ return p ? p.pid : null; },
  tid(t){ return t ? t.id : null; },
  playerMap(game){
    const m = new Map();
    for (const t of game.teams)
      for (const p of [...t.players, ...t.bench, ...t.offList]) m.set(p.pid, p);
    return m;
  },
  player(game, pid, map){
    if (!pid) return null;
    if (map) return map.get(pid) || null;
    for (const t of game.teams)
      for (const p of [...t.players, ...t.bench, ...t.offList]) if (p.pid === pid) return p;
    return null;
  },
  team(game, tid){ return tid === 'home' ? game.teams[0] : (tid === 'away' ? game.teams[1] : null); },
  pos(v){ return v ? { x: +(+v.x).toFixed(3), y: +(+v.y).toFixed(3) } : null; },
};

// SnapshotManager: complete sim-state capture/restore. A restored snapshot
// continues EXACTLY like the uninterrupted run — same RNG stream, same maps,
// same timers — which is what makes seeking and goal replays deterministic.
const SnapshotManager = {
  PLAYER_FIELDS: ['facing','runPhase','stamina','speedWish','duty','thinkT','thinkInterval','decideT',
    'kickCooldown','touchCd','tackleCd','slowT','blockCd','holdT','holdCd','diving','action','actionT',
    'actionDur','slideHit','glanceT','callT','callCd','callText','wallJumpT','walkOff','role','line','isGK',
    'form','value','valueDelta','_pvx','_pvy','_stamSampleT'],
  BALL_FIELDS: ['x','y','z','vx','vy','vz','spin','spinZ','inNet','roll','flightT','isShot','px','py','pz',
    'lastKickShot','lastKickClock','shotCredited','prevTouchClock','prevTouch2Clock'],
  BALL_REFS: ['controller','holder','intendedReceiver','lastToucher','lastKicker','prevToucher','prevToucher2'],
  capture(game){
    const E = EventSerializer, m = game.match;
    const ball = {};
    for (const k of this.BALL_FIELDS) ball[k] = game.ball[k];
    for (const k of this.BALL_REFS) ball[k] = E.pid(game.ball[k]);
    ball.lastTouchTeam = E.tid(game.ball.lastTouchTeam);
    return {
      tick: game.simTick, seed: game.matchSeed, rng: RNG.state(),
      env: { grass: game.grassKey, weather: game.weatherKey, windDir: game.windDir, surfaceSeed: game.surfaceSeed },
      counts: { ...game.counts },
      g: {
        transitionT: game.transitionT, lastPoss: E.tid(game.lastPoss), headerCd: game.headerCd || 0,
        frameNo: game.frameNo, lastCallT: game.lastCallT, lastChanceT: game.lastChanceT,
        lastShooter: E.pid(game.lastShooter),
        pendingPass: game.pendingPass
          ? { team: E.tid(game.pendingPass.team), passer: E.pid(game.pendingPass.passer), t: game.pendingPass.t } : null,
        human: { on: game.humanMode, sel: EventSerializer.pid(game.selected) },
        kickBuffer: game.kickBuffer ? { ...game.kickBuffer } : null,
        celebration: game.celebration && game.celebration.scorer ? {
          scorer: E.pid(game.celebration.scorer),
          mates: game.celebration.mates.map(p => E.pid(p)),
          run: { ...game.celebration.run },
        } : null,
      },
      ball,
      match: {
        state: m.state, stateT: m.stateT, half: m.half, tMatch: m.tMatch, score: [...m.score],
        firstKick: m.firstKick, concededIdx: m.concededIdx, banner: m.banner, bannerSub: m.bannerSub,
        goalScorer: E.pid(m.goalScorer),
        ceremonyHold: m.ceremonyHold ? { p: E.pid(m.ceremonyHold.p), kind: m.ceremonyHold.kind } : null,
        pendingFoul: m.pendingFoul ? { ...m.pendingFoul, team: E.tid(m.pendingFoul.team),
          byTeam: E.tid(m.pendingFoul.byTeam), by: E.pid(m.pendingFoul.by),
          victim: E.pid(m.pendingFoul.victim), spot: { ...m.pendingFoul.spot } } : null,
        restart: this.captureRestart(m.restart),
      },
      ref: (r => ({ pos: { ...r.pos }, vel: { ...r.vel }, facing: r.facing, runPhase: r.runPhase,
        action: r.action, actionT: r.actionT, actionDur: r.actionDur,
        target: { ...r.target }, signalT: r.signalT || 0 }))(game.ref),
      teams: game.teams.map(t => ({
        assignedFormation: t.assignedFormation,
        tactics: { ...t.tactics }, attackDir: t.attackDir, subsUsed: t.subsUsed, lastAutoSub: t.lastAutoSub || 0,
        shots: t.shots, onTarget: t.onTarget, passAtt: t.passAtt, passCmp: t.passCmp, possT: t.possT, fouls: t.fouls,
        gk: E.pid(t.gk),
        squad: [...t.players, ...t.bench, ...t.offList].map(p => this.capturePlayer(p)),
        players: t.players.map(p => p.pid),
        bench: t.bench.map(p => p.pid),
        offList: t.offList.map(p => p.pid),
        dlm: { lineX: t.dlm.lineX, trapUntil: t.dlm.trapUntil, lastTrap: t.dlm.lastTrap,
          trapActive: !!t.dlm.trapActive, org: t.dlm.org },
      })),
      offside: game.offsideSys && game.offsideSys.watch
        ? { set: [...game.offsideSys.watch.set].map(p => E.pid(p)),
            team: E.tid(game.offsideSys.watch.team), t: game.offsideSys.watch.t } : null,
    };
  },
  capturePlayer(p){
    const o = { pid: p.pid, pos: { ...p.pos }, vel: { ...p.vel }, target: { ...p.target },
      slot: { ...p.slot }, stats: { ...p.stats },
      seatPos: p.seatPos ? { ...p.seatPos } : null,
      decision: p.decision ? { ...p.decision, receiver: EventSerializer.pid(p.decision.receiver) } : null };
    for (const k of this.PLAYER_FIELDS) o[k] = p[k];
    return o;
  },
  captureRestart(r){
    if (!r) return null;
    const E = EventSerializer;
    const mapOf = m => m ? [...m].map(([p, v]) => [E.pid(p), { ...v }]) : null;
    return {
      type: r.type, team: E.tid(r.team), spot: { ...r.spot }, taker: E.pid(r.taker), helper: E.pid(r.helper),
      wait: r.wait, force: r.force, swapT: r.swapT, standback: r.standback ? { ...r.standback } : null,
      humanTaker: !!r.humanTaker, awaiting: !!r.awaiting, humanChoice: r.humanChoice || null,
      delivery: r.delivery || null, shooting: !!r.shooting, placed: !!r.placed,
      short: E.pid(r.short), shortTo: E.pid(r.shortTo), decoy: E.pid(r.decoy), lying: E.pid(r.lying),
      wall: r.wall ? r.wall.map(p => E.pid(p)) : null,
      spTargets: mapOf(r.spTargets), spTargets2: mapOf(r.spTargets2), plan: mapOf(r.plan),
    };
  },
  restore(game, snap){
    const E = EventSerializer;
    if (game.grassKey !== snap.env.grass || game.weatherKey !== snap.env.weather ||
        game.surfaceSeed !== snap.env.surfaceSeed){
      game.grassKey = snap.env.grass; game.weatherKey = snap.env.weather;
      game.surfaceSeed = snap.env.surfaceSeed;
      game.applyEnv();
      if (game.renderer) game.renderer.buildBackground();
    }
    game.windDir = snap.env.windDir;
    RNG.restore(snap.rng);
    game.simTick = snap.tick;
    game.counts = { ...snap.counts };
    const map = E.playerMap(game);
    const P = pid => (pid ? map.get(pid) || null : null);
    snap.teams.forEach((ts, i) => {
      const team = game.teams[i];
      for (const ps of ts.squad){
        const p = map.get(ps.pid); if (!p) continue;
        p.pos = { ...ps.pos }; p.vel = { ...ps.vel }; p.target = { ...ps.target };
        p.slot = { ...ps.slot }; p.stats = { ...ps.stats };
        p.decision = ps.decision ? { ...ps.decision, receiver: P(ps.decision.receiver) } : { type: 'dribble' };
        if (ps.seatPos) p.seatPos = { ...ps.seatPos };
        for (const k of this.PLAYER_FIELDS) if (ps[k] !== undefined) p[k] = ps[k];
        p.human = false; p.trackClaim = 0;
      }
      team.players = ts.players.map(P).filter(Boolean);
      team.bench = ts.bench.map(P).filter(Boolean);
      team.offList = ts.offList.map(P).filter(Boolean);
      team.gk = P(ts.gk) || team.players[0];
      Object.assign(team.tactics, ts.tactics);
      team.assignedFormation = ts.assignedFormation !== undefined ? ts.assignedFormation : ts.tactics.formation;
      team.attackDir = ts.attackDir; team.subsUsed = ts.subsUsed; team.lastAutoSub = ts.lastAutoSub;
      team.shots = ts.shots; team.onTarget = ts.onTarget; team.passAtt = ts.passAtt; team.passCmp = ts.passCmp;
      team.possT = ts.possT; team.fouls = ts.fouls;
      Object.assign(team.dlm, ts.dlm);
    });
    const b = game.ball;
    for (const k of this.BALL_FIELDS) if (snap.ball[k] !== undefined) b[k] = snap.ball[k];
    if (!isFinite(b.spinZ)) b.spinZ = 0;
    b.inNet = !!b.inNet;
    for (const k of this.BALL_REFS) b[k] = P(snap.ball[k]);
    b.lastTouchTeam = E.team(game, snap.ball.lastTouchTeam);
    b.trail = [];
    const m = game.match, ms = snap.match;
    m.state = ms.state; m.stateT = ms.stateT; m.half = ms.half; m.tMatch = ms.tMatch;
    m.score = [...ms.score]; m.firstKick = ms.firstKick; m.concededIdx = ms.concededIdx;
    m.banner = ms.banner; m.bannerSub = ms.bannerSub;
    m.goalScorer = P(ms.goalScorer);
    m.ceremonyHold = ms.ceremonyHold && P(ms.ceremonyHold.p) ? { p: P(ms.ceremonyHold.p), kind: ms.ceremonyHold.kind } : null;
    m.pendingFoul = ms.pendingFoul ? { ...ms.pendingFoul, team: E.team(game, ms.pendingFoul.team),
      byTeam: E.team(game, ms.pendingFoul.byTeam), by: P(ms.pendingFoul.by),
      victim: P(ms.pendingFoul.victim), spot: { ...ms.pendingFoul.spot } } : null;
    m.restart = this.restoreRestart(game, ms.restart, P);
    Object.assign(game.ref, { pos: { ...snap.ref.pos }, vel: { ...snap.ref.vel }, facing: snap.ref.facing,
      runPhase: snap.ref.runPhase, action: snap.ref.action, actionT: snap.ref.actionT,
      actionDur: snap.ref.actionDur, target: { ...snap.ref.target }, signalT: snap.ref.signalT });
    game.transitionT = snap.g.transitionT;
    game.lastPoss = E.team(game, snap.g.lastPoss);
    game.headerCd = snap.g.headerCd; game.frameNo = snap.g.frameNo;
    game.lastCallT = snap.g.lastCallT; game.lastChanceT = snap.g.lastChanceT;
    game.lastShooter = P(snap.g.lastShooter);
    game.pendingPass = snap.g.pendingPass ? { team: E.team(game, snap.g.pendingPass.team),
      passer: P(snap.g.pendingPass.passer), t: snap.g.pendingPass.t } : null;
    game.celebration = snap.g.celebration
      ? Object.assign(Object.create(GoalCelebrationAnimation.prototype), {
          dur: 2.4, scorer: P(snap.g.celebration.scorer),
          mates: snap.g.celebration.mates.map(P).filter(Boolean),
          run: { ...snap.g.celebration.run } })
      : null;
    if (game.offsideSys) game.offsideSys.watch = snap.offside
      ? { set: new Set(snap.offside.set.map(P).filter(Boolean)),
          team: E.team(game, snap.offside.team), t: snap.offside.t } : null;
    game.kickBuffer = snap.g && snap.g.kickBuffer ? { ...snap.g.kickBuffer } : null;
    if (snap.g && snap.g.human){
      game.humanMode = !!snap.g.human.on;
      game.selected = P(snap.g.human.sel);
    }
    if (game.selected && !game.teams[0].players.includes(game.selected))
      game.selected = game.humanMode ? game.nearestToBall(game.teams[0]) : null;
    if (game.statsFor && game.statsFor.team && !map.has(game.statsFor.pid)) game.statsFor = null;
  },
  restoreRestart(game, rs, P){
    if (!rs) return null;
    const E = EventSerializer;
    const mapBack = arr => { if (!arr) return null; const m = new Map();
      for (const [pid, v] of arr){ const p = P(pid); if (p) m.set(p, { ...v }); } return m; };
    const r = {
      type: rs.type, team: E.team(game, rs.team), spot: { ...rs.spot }, taker: P(rs.taker),
      wait: rs.wait, force: rs.force, swapT: rs.swapT,
      standback: rs.standback ? { ...rs.standback } : null,
      humanTaker: rs.humanTaker, awaiting: rs.awaiting, humanChoice: rs.humanChoice || undefined,
      delivery: rs.delivery || undefined, shooting: rs.shooting, placed: rs.placed,
      short: P(rs.short), shortTo: P(rs.shortTo), decoy: P(rs.decoy), lying: P(rs.lying),
      startedAt: 0,
    };
    if (rs.helper) r.helper = P(rs.helper);
    if (rs.wall) r.wall = rs.wall.map(P).filter(Boolean);
    if (rs.spTargets) r.spTargets = mapBack(rs.spTargets);
    if (rs.spTargets2) r.spTargets2 = mapBack(rs.spTargets2);
    if (rs.plan) r.plan = mapBack(rs.plan);
    return r;
  },
};

// MatchRecorder: turns live play — AI and human — into a MatchScript: semantic
// timeline events (passes, tackles, restarts, cards, calls, tactics...),
// periodic movement samples for path data, and seek snapshots. Suppressed
// while game.replayMode is on so replays never re-record themselves.
const SCRIPT_VERSION = '1.0';
class MatchRecorder {
  constructor(game){
    this.game = game;
    this.enabled = true;
    this.moveEvery = 30;  // ticks between movement samples (0.5s)
    this.snapEvery = 300; // ticks between seek snapshots (5s)
    this.begin();
  }
  begin(){
    this.timeline = []; this.snapshots = []; this.eventSeq = 0;
    this.initial = null; this.createdAt = new Date().toISOString();
  }
  start(){ // called at the end of Game.reset — captures the pristine kickoff
    this.begin();
    this.initial = SnapshotManager.capture(this.game);
    this.snapshots.push(this.initial);
    this.human0 = { on: this.game.humanMode,
      sel: this.game.selected ? this.game.selected.pid : null };
  }
  t(){ return +(this.game.simTick / 60).toFixed(3); }
  log(type, data){
    if (!this.enabled || this.game.replayMode) return null;
    // tick is the authoritative timestamp (time is a rounded convenience —
    // strict playback must fire on the exact sim step). Events logged from
    // UI handlers between steps take effect on the NEXT tick, so stamp them
    // there — otherwise every panel click becomes a one-tick drift seed.
    const tick = this.game.simTick + (this.game._inStep ? 0 : 1);
    const e = { id: 'e' + (++this.eventSeq), time: this.t(), tick, type, ...(data || {}) };
    this.timeline.push(e);
    return e;
  }
  tick(){
    if (!this.enabled || this.game.replayMode) return;
    if (this.game.match.state === 'FULLTIME') return; // nothing left to record
    const g = this.game;
    if (g.simTick % this.snapEvery === 0) this.snapshots.push(SnapshotManager.capture(g));
    if (g.simTick % this.moveEvery === 0){
      const frames = [];
      for (const t of g.teams)
        for (const p of t.players)
          frames.push([p.pid, +p.pos.x.toFixed(2), +p.pos.y.toFixed(2), +p.facing.toFixed(2), +len(p.vel).toFixed(2)]);
      frames.push(['ball', +g.ball.x.toFixed(2), +g.ball.y.toFixed(2), +g.ball.z.toFixed(2)]);
      this.timeline.push({ id: 'e' + (++this.eventSeq), time: this.t(), type: 'movement', frames });
    }
  }
  // MatchScript document: versioned, self-contained, replayable
  export(){
    const g = this.game;
    const teams = g.teams.map(t => ({
      id: t.id, name: t.name, code: t.code, kit: { ...t.kit }, gkKit: { ...t.gkKit },
      formation: t.assignedFormation, tactics: { ...t.tactics },
      players: [...t.players, ...t.bench, ...t.offList].map(p => ({
        id: p.pid, num: p.num, name: p.name, role: p.role, isGK: p.isGK,
        age: p.age, rarity: p.rarity, foot: p.foot,
        attrs: Object.fromEntries(Object.entries(p.a).map(([k, v]) => [k, +v.toFixed(3)])),
      })),
    }));
    const KEY_TYPES = ['goal','card','substitution','send_off','restart','offside','kickoff','tactic','foul'];
    return {
      version: SCRIPT_VERSION,
      kind: 'fobal-match-script',
      metadata: {
        created: this.createdAt, exported: new Date().toISOString(),
        engine: 'FOBAL SIMULATOR', realSeconds: this.t(),
        score: [...g.match.score], clock: g.match.clock(),
      },
      match: {
        seed: g.matchSeed, duration: CFG.MATCH_REAL_SECONDS, simStep: SIM_STEP, timeScale: TIME_SCALE,
        env: { grass: g.grassKey, weather: g.weatherKey, windDir: g.windDir, surfaceSeed: g.surfaceSeed },
        firstKick: g.match.firstKick,
        human: this.human0 || { on: false, sel: null },
      },
      teams,
      initialState: this.initial,
      timeline: this.timeline.slice(),
      events: this.timeline.filter(e => KEY_TYPES.includes(e.type))
        .map(e => ({ id: e.id, time: e.time, type: e.type, actor: e.actor || e.player || e.taker || null })),
      snapshots: this.snapshots.slice(),
      finalState: SnapshotManager.capture(g),
    };
  }
}

// ScriptParser: accepts a JSON string or object, normalizes it into a script
// the runner understands, and never throws on bad input — it reports instead.
const ScriptParser = {
  parse(src){
    let doc = src;
    if (typeof src === 'string'){
      try { doc = JSON.parse(src); }
      catch (err){ return { ok: false, errors: ['JSON parse failed: ' + err.message], warnings: [], script: null }; }
    }
    if (!doc || typeof doc !== 'object') return { ok: false, errors: ['script is not an object'], warnings: [], script: null };
    const v = ScriptValidator.validate(doc);
    return { ok: v.errors.length === 0, errors: v.errors, warnings: v.warnings, script: v.errors.length ? null : v.script };
  },
};

// ScriptValidator: structural + semantic checks. Errors block playback,
// warnings are shown but tolerated. Bad scripts must never crash the game.
const ScriptValidator = {
  KNOWN_TYPES: ['movement','move','pass','shot','clear','cross','header','touch','pass_complete','interception',
    'tackle','block','gk_catch','gk_parry','foul_committed','foul','advantage','card','offside','restart',
    'restart_taken','kickoff','reset_start','goal','substitution','send_off','state','call_for_ball','tactic',
    'coach_command','crowd','ref_signal','gesture','human_move','human_kick','human_select','human_mode','take_trigger','wait'],
  validate(doc){
    const errors = [], warnings = [];
    const script = doc;
    if (doc.kind && doc.kind !== 'fobal-match-script') warnings.push('unexpected kind "' + doc.kind + '"');
    if (!doc.version) warnings.push('missing version — assuming ' + SCRIPT_VERSION);
    else if (String(doc.version).split('.')[0] !== SCRIPT_VERSION.split('.')[0])
      warnings.push('script version ' + doc.version + ' may not match engine ' + SCRIPT_VERSION);
    if (!doc.match || typeof doc.match !== 'object') errors.push('missing match section');
    else if (doc.match.seed === undefined && !doc.initialState)
      warnings.push('no seed and no initialState — strict playback unavailable');
    // state sections must be structurally sound or seeking/restoring throws
    const validSnap = s => s && typeof s === 'object' && Number.isFinite(s.tick)
      && s.ball && typeof s.ball === 'object' && s.match && typeof s.match === 'object'
      && Array.isArray(s.teams) && s.env && typeof s.env === 'object';
    if (doc.initialState && !validSnap(doc.initialState)) errors.push('malformed initialState');
    if (doc.finalState && !validSnap(doc.finalState)){ warnings.push('malformed finalState — ignored'); doc.finalState = null; }
    if (doc.snapshots !== undefined){
      if (!Array.isArray(doc.snapshots)){ warnings.push('snapshots is not an array — ignored'); doc.snapshots = []; }
      else {
        const n0 = doc.snapshots.length;
        doc.snapshots = doc.snapshots.filter(validSnap);
        if (doc.snapshots.length < n0) warnings.push((n0 - doc.snapshots.length) + ' malformed snapshot(s) dropped');
      }
    }
    const knownIds = new Set(['ball', 'home', 'away']);
    if (Array.isArray(doc.teams))
      for (const t of doc.teams)
        if (Array.isArray(t.players)) for (const p of t.players) knownIds.add(p.id);
    const haveRoster = knownIds.size > 3;
    if (!Array.isArray(doc.timeline)){
      errors.push('timeline must be an array');
      return { errors, warnings, script };
    }
    let lastT = -1, unsorted = false;
    doc.timeline.forEach((e, i) => {
      const at = 'timeline[' + i + '] ';
      if (!e || typeof e !== 'object'){ errors.push(at + 'is not an object'); return; }
      if (typeof e.time !== 'number' || !isFinite(e.time) || e.time < 0) errors.push(at + 'invalid time ' + e.time);
      if (e.tick !== undefined && !Number.isFinite(e.tick)) errors.push(at + 'invalid tick ' + e.tick);
      else { if (e.time < lastT) unsorted = true; lastT = Math.max(lastT, e.time); }
      if (!e.type) errors.push(at + 'missing type');
      else if (!this.KNOWN_TYPES.includes(e.type)) warnings.push(at + 'unknown type "' + e.type + '" (will be skipped)');
      if (e.actor && haveRoster && !knownIds.has(e.actor)) errors.push(at + 'unknown actor "' + e.actor + '"');
      if (e.target && haveRoster && typeof e.target === 'string' && !knownIds.has(e.target))
        warnings.push(at + 'unknown target "' + e.target + '"');
      for (const key of ['position', 'from', 'to']){
        const v = e[key];
        if (!v || typeof v !== 'object') continue; // state events use string from/to
        if (typeof v.x !== 'number' || typeof v.y !== 'number') errors.push(at + 'malformed ' + key);
        else if (v.x < -5 || v.x > CFG.PITCH_L + 5 || v.y < -5 || v.y > CFG.PITCH_W + 5)
          warnings.push(at + key + ' is off the pitch (will be clamped)');
      }
      if (e.power !== undefined && (typeof e.power !== 'number' || e.power < 0 || e.power > 1))
        warnings.push(at + 'power outside 0..1 (will be clamped)');
      if (['pass','shot','cross','move'].includes(e.type) && !e.actor) errors.push(at + e.type + ' requires an actor');
    });
    if (unsorted){
      warnings.push('timeline was not sorted by time — auto-sorted');
      doc.timeline = doc.timeline.slice().sort((a, b) => (a.time || 0) - (b.time || 0));
    }
    return { errors, warnings, script };
  },
};

// ScriptRunner: executes a MatchScript timeline against the engine.
// STRICT mode re-arms only the exogenous inputs (human moves/triggers, manual
// subs, tactic changes) and lets the deterministic engine reproduce the rest,
// hard-resyncing from recorded snapshots if it ever drifts.
// ADAPTIVE mode treats every event as INTENT: actors are walked into place,
// kicks fire when plausible (with a grace window), and the surrounding AI
// fills every gap — so a hand-written script plays out on a living pitch.
class ScriptRunner {
  constructor(game, script, mode){
    this.game = game;
    this.script = script;
    this.mode = mode || 'strict';
    this.timeline = script.timeline;
    this.cursor = 0;
    // strict sessions never read the live keyboard: null = no stick input
    this.moveDir = mode === 'strict' ? null : undefined;
    this.warnings = [];
    this.pending = [];                 // adaptive: deferred kicks awaiting the ball
    this.orders = new Map();           // adaptive: player -> scripted move order
    this.active = null;                // {actor, target, until} for the debug highlight
    this.driftChecks = 0; this.resyncs = 0;
    this.snapIdx = 0;
  }
  t(){ return this.game.simTick / 60; }
  stop(){
    for (const p of this.orders.keys()) p.scripted = false;
    this.orders.clear();
    this.moveDir = undefined;
    this.game.scriptRunner = null;
  }
  warn(msg){
    if (this.warnings.length < 60) this.warnings.push(this.t().toFixed(1) + 's: ' + msg);
  }
  due(e, now){
    return e.tick !== undefined ? e.tick <= this.game.simTick : e.time <= now;
  }
  tick(){
    if (this.mode === 'strict'){
      // stray live releases must not reach Match.update's restart poll —
      // recorded human_kick events re-arm them below when due
      this.game.input.passReleased = null;
      this.game.input.shootReleased = null;
    }
    const now = this.t() + 1e-9;
    while (this.cursor < this.timeline.length && this.due(this.timeline[this.cursor], now)){
      try { this.exec(this.timeline[this.cursor]); }
      catch (err){ this.warn('event ' + this.timeline[this.cursor].id + ' failed: ' + err.message); }
      this.cursor++;
    }
    if (this.mode === 'strict'){
      try { this.checkDrift(now); }
      catch (err){ this.warn('drift check failed: ' + err.message); }
    }
    else { this.retryPending(now); this.applyOrders(now); }
  }
  // strict-mode drift watchdog: compare against recorded snapshots
  checkDrift(now){
    const snaps = this.script.snapshots || [];
    // snapshots hold post-update state of tick N; the runner sees that exact
    // state pre-update on tick N+1, so consume them at simTick-1
    while (this.snapIdx < snaps.length && snaps[this.snapIdx].tick <= this.game.simTick - 1){
      const s = snaps[this.snapIdx++];
      if (s.tick !== this.game.simTick - 1) continue; // seek jumped past it
      this.driftChecks++;
      const b = this.game.ball;
      const drift = Math.hypot(b.x - s.ball.x, b.y - s.ball.y);
      const scoreOk = this.game.match.score[0] === s.match.score[0] && this.game.match.score[1] === s.match.score[1];
      if (drift > 0.5 || !scoreOk){
        this.resyncs++;
        this.warn('drift ' + drift.toFixed(2) + 'm at ' + (s.tick / 60).toFixed(1) + 's — resynced');
        SnapshotManager.restore(this.game, s);
      }
    }
  }
  actorOf(e){ return EventSerializer.player(this.game, e.actor); }
  exec(e){
    const g = this.game, E = EventSerializer;
    const strict = this.mode === 'strict';
    switch (e.type){
      // ---- exogenous inputs: replayed in strict mode only ----
      case 'human_move': if (strict) this.moveDir = e.dir ? { x: e.dir.x, y: e.dir.y } : null; break;
      case 'human_kick':
        if (strict){
          if (e.pass) g.input.passReleased = e.pass;
          if (e.shoot) g.input.shootReleased = e.shoot;
        }
        break;
      case 'human_select': if (strict){ const p = this.actorOf(e); if (p) g.selected = p; } break;
      case 'human_mode': if (strict){ g.humanMode = !!e.on; g.selected = e.on ? g.nearestToBall(g.teams[0]) : null; } break;
      case 'take_trigger': if (strict){ g.takeRequested = true; g.takeShoot = e.choice === 'attack'; } break;
      case 'tactic': {
        const team = E.team(g, e.team) || g.teams[0];
        if (e.tactics) Object.assign(team.tactics, e.tactics);
        if (e.formation && g.setFormation) g.setFormation(team, e.formation);
        coachGlance(team); // same sim side effect as the live notifyTactic path
        break;
      }
      case 'substitution': {
        if (strict && e.auto) break; // deterministic AI subs reproduce themselves
        const team = E.team(g, e.team);
        const on = E.player(g, e.on), off = E.player(g, e.off);
        if (team && on && off && team.bench.includes(on) && team.players.includes(off)){
          g._runnerSub = true;
          g.performSub(team, off, on);
          g._runnerSub = false;
        }
        else if (!strict) this.warn('substitution impossible (' + e.on + ' for ' + e.off + ')');
        break;
      }
      // ---- everything below is adaptive-mode intent ----
      case 'move': case 'movement': {
        if (strict) break;
        if (e.type === 'movement') break; // recorded path samples — reference data, engine moves itself
        const p = this.actorOf(e); if (!p){ this.warn('move: unknown actor ' + e.actor); break; }
        const to = e.to || e.position; if (!to) break;
        this.orders.set(p, { x: clamp(to.x, 1, CFG.PITCH_L - 1), y: clamp(to.y, 1, CFG.PITCH_W - 1),
          sw: e.speed !== undefined ? clamp(e.speed, 0.15, 1) : 0.85,
          until: e.time + (e.duration || 6), face: e.direction });
        this.mark(p, null, 1.4);
        break;
      }
      case 'pass': case 'shot': case 'cross': case 'clear': case 'header': {
        if (strict) break; // the engine replays its own kicks deterministically
        this.pending.push({ e, deadline: e.time + 3.5 });
        break;
      }
      case 'call_for_ball': {
        if (strict) break;
        const p = this.actorOf(e); if (!p) break;
        p.callT = 1.1; p.callText = e.text || 'HERE!';
        if (p.actionT <= 0) p.setAction('point', 0.6);
        this.mark(p, null, 1.1);
        break;
      }
      case 'gesture': {
        if (strict) break;
        const p = this.actorOf(e); if (!p) break;
        const pose = { raise_hand: 'point', point: 'point', celebrate: 'celebrate', clap: 'clap',
          fall: 'fall', shield: 'shield', head: 'head' }[e.gesture] || 'point';
        p.setAction(pose, e.duration || 1);
        break;
      }
      case 'restart': {
        if (strict) break;
        const team = E.team(g, e.team) || g.teams[0];
        const kind = e.kind || 'FREEKICK';
        if (g.match.state === 'PLAYING' && ['THROWIN','CORNER','GOALKICK','FREEKICK'].includes(kind))
          g.match.beginRestart(kind, team, { x: clamp((e.position || {}).x || 52.5, 0.5, 104.5), y: clamp((e.position || {}).y || 34, 0.5, 67.5) });
        else if (g.match.state !== 'PLAYING') this.warn('restart skipped — already at a dead ball');
        break;
      }
      case 'restart_taken': {
        if (strict) break;
        const r = g.match.restart;
        if (r && g.match.state === r.type){ r.wait = 0; if (e.choice) r.humanChoice = e.choice; }
        break;
      }
      default: break; // touch/pass_complete/goal/state/crowd/... — outcomes, not commands
    }
  }
  mark(actor, target, dur){ this.active = { actor, target, until: this.t() + dur }; }
  retryPending(now){
    const g = this.game;
    this.pending = this.pending.filter(job => {
      const e = job.e;
      const p = this.actorOf(e);
      if (!p || !p.team.players.includes(p)){ this.warn(e.type + ': actor unavailable'); return false; }
      const b = g.ball;
      const d = dist(p.pos, b);
      // adaptive possession grant: the script says this is his moment — once
      // the event is due and he's plausibly close, the ball comes to his feet
      if (d >= 2.4 && d < 16 && now > e.time + 1.0 && g.match.state === 'PLAYING'){
        b.holder = null; b.controller = p;
        b.x = p.pos.x + Math.cos(p.facing) * 0.5; b.y = p.pos.y + Math.sin(p.facing) * 0.5;
        b.z = 0.11; b.vx = b.vy = b.vz = 0; b.spin = 0;
        b.px = b.x; b.py = b.y;
        creditTouch(g, p);
      }
      const near = dist(p.pos, b) < 2.4 && b.z < 1.4 && g.match.state === 'PLAYING';
      if (near){
        // adaptive nudge: the scripted man takes the ball for his moment
        if (b.controller && b.controller !== p){ b.controller = null; }
        if (b.holder && b.holder !== p) b.holder = null;
        const tgt = e.target ? EventSerializer.player(g, e.target) : null;
        const aim = e.aim || (tgt ? { x: tgt.pos.x, y: tgt.pos.y } : e.to) ||
          { x: p.team.oppGoalX(), y: 34 };
        const d = dist(p.pos, aim);
        const power = e.power !== undefined ? clamp(e.power, 0, 1) : null;
        let speed = e.speed !== undefined ? e.speed : (power !== null ? 6 + power * 24 : null);
        let vz = e.vz;
        if (vz === undefined){
          if (e.trajectory === 'high'){ vz = 4.5; if (speed === null) speed = loftFor(d).vh; }
          else if (e.trajectory === 'lofted' || (e.trajectory === undefined && d > groundedPassLimit() && e.type !== 'shot')){
            const l = loftFor(d); vz = l.vz; if (speed === null) speed = l.vh;
          } else vz = e.type === 'shot' ? 1.2 : 0;
        }
        if (speed === null) speed = e.type === 'shot' ? 22 : groundPassSpeed(d);
        doKick(p, g, { type: e.type === 'shot' ? 'shot' : (e.type === 'clear' ? 'clear' : 'pass'),
          cross: e.type === 'cross' || undefined, header: e.type === 'header' || undefined,
          tx: aim.x, ty: aim.y, speed, vz, spin: e.spin || 0, sigma: e.sigma !== undefined ? e.sigma : 0.05,
          receiver: tgt || undefined });
        this.mark(p, tgt, 1.6);
        return false;
      }
      // not there yet: chase the ball until the grace window closes
      this.orders.set(p, { x: b.x, y: b.y, sw: 1, until: job.deadline, chase: true });
      if (now > job.deadline){
        this.warn(e.type + ' by ' + e.actor + ' skipped — could not reach the ball');
        return false;
      }
      return true;
    });
  }
  applyOrders(now){
    for (const [p, o] of [...this.orders]){
      if (now > o.until || !p.team.players.includes(p)){
        p.scripted = false; this.orders.delete(p); continue;
      }
      p.scripted = true;
      if (o.chase){ o.x = this.game.ball.x; o.y = this.game.ball.y; }
      p.target = { x: o.x, y: o.y };
      p.speedWish = o.sw || 0.85;
      if (!o.chase && dist(p.pos, p.target) < 0.6){
        p.speedWish = 0;
        if (o.face !== undefined) p.facing = turnToward(p.facing, o.face, 0.2);
      }
    }
  }
}

// ReplayController: transport + seeking for a loaded MatchScript session.
// Seeks restore the nearest recorded snapshot and silently fast-forward the
// deterministic sim, so scrubbing never replays from kickoff.
class ReplayController {
  constructor(game){
    this.game = game;
    this.session = null; // { script, mode, duration }
    this.loopRange = null;
    this.speed = 1;
  }
  load(script, mode){
    const g = this.game;
    this.stop();
    g.reset(script.match && script.match.seed !== undefined ? script.match.seed : undefined);
    if (mode === 'strict' && script.initialState){
      try { SnapshotManager.restore(g, script.initialState); }
      catch (err){
        g.scriptReport = { errors: ['initialState restore failed: ' + err.message], warnings: [], when: g.animT };
        g.reset(); // bad state must never leak into play
        return null;
      }
    }
    g.scriptSession = true;
    if (g.recorder) g.recorder.enabled = false; // don't re-record a replay
    if (mode === 'strict' && script.match && script.match.human){
      // human-control state is part of the recording's initial conditions
      g.humanMode = !!script.match.human.on;
      g.selected = script.match.human.sel
        ? EventSerializer.player(g, script.match.human.sel)
        : (g.humanMode ? g.nearestToBall(g.teams[0]) : null);
    }
    g.scriptRunner = new ScriptRunner(g, script, mode);
    const last = script.timeline.length ? script.timeline[script.timeline.length - 1].time : 0;
    this.session = { script, mode, duration: Math.max(last, (script.finalState ? script.finalState.tick : 0) / 60) };
    this.speed = 1;
    g.simRate = 1;
    g.paused = false;
    return this.session;
  }
  stop(){
    const g = this.game;
    if (g.scriptRunner) g.scriptRunner.stop();
    g.scriptSession = false;
    if (g.recorder) g.recorder.enabled = true;
    this.session = null; this.loopRange = null;
    g.simRate = 1;
  }
  playing(){ return !!this.session && !this.game.paused; }
  play(){ if (this.session) this.game.paused = false; }
  pause(){ if (this.session) this.game.paused = true; }
  setSpeed(v){ this.speed = v; this.game.simRate = v; }
  restart(){ if (this.session) this.seek(0); }
  t(){ return this.game.simTick / 60; }
  // seek: nearest snapshot at or before target, then silent deterministic catch-up
  seek(target){
    if (!this.session) return;
    const g = this.game;
    target = clamp(target, 0, this.session.duration);
    const snaps = this.session.script.snapshots || [];
    let snap = this.session.script.initialState;
    for (const s of snaps){ if (s.tick / 60 <= target + 1e-6) snap = s; else break; }
    const runner = g.scriptRunner;
    if (!snap){
      // no snapshots to restore from: at least re-derive the cursor so the
      // editor's post-edit reseek can't skip or double-execute events
      if (runner){
        runner.cursor = 0;
        const now = g.simTick / 60 + 1e-9;
        while (runner.cursor < runner.timeline.length && runner.due(runner.timeline[runner.cursor], now))
          runner.cursor++;
        runner.pending.length = 0;
        for (const p of runner.orders.keys()) p.scripted = false;
        runner.orders.clear();
      }
      return;
    }
    SnapshotManager.restore(g, snap);
    if (runner){
      runner.cursor = 0;
      let lastDir;
      while (runner.cursor < runner.timeline.length){
        const e = runner.timeline[runner.cursor];
        if (e.tick !== undefined ? e.tick <= snap.tick : e.time <= snap.tick / 60){
          if (e.type === 'human_move') lastDir = e.dir ? { x: e.dir.x, y: e.dir.y } : null;
          runner.cursor++;
        } else break;
      }
      // rebuild the injected stick state from the consumed prefix (the
      // snapshot restores humanMode/selected, but moveDir is runner state)
      runner.moveDir = runner.mode === 'strict' ? (lastDir === undefined ? null : lastDir) : lastDir;
      runner.snapIdx = 0; runner.pending.length = 0;
      for (const p of runner.orders.keys()) p.scripted = false;
      runner.orders.clear();
    }
    const wantTick = Math.round(target * 60);
    const wasReplay = g.replayMode;
    g.replayMode = true; // silent catch-up: no banners, no crowd, no recording
    while (g.simTick < wantTick) g.step();
    g.replayMode = wasReplay;
  }
  stepEvent(dirn){
    if (!this.session) return;
    const tl = this.session.script.timeline.filter(e => e.type !== 'movement' && e.type !== 'touch');
    if (!tl.length) return;
    const now = this.t();
    let target = null;
    if (dirn > 0) target = tl.find(e => e.time > now + 1e-3);
    else { for (const e of tl){ if (e.time < now - 1e-3) target = e; else break; } }
    if (target) this.seek(target.time);
    this.game.paused = true;
  }
  stepFrame(){ if (this.session){ this.game.paused = true; this.game.step(); } }
  tickLoop(){ // called from panel draw (render clock is fine for a UX loop)
    if (this.session && this.loopRange && this.t() > this.loopRange[1]) this.seek(this.loopRange[0]);
  }
  bookmarks(){
    if (!this.session) return [];
    return this.session.script.timeline.filter(e => ['goal','card','substitution','restart','offside'].includes(e.type));
  }
}

// ReplayCameraController: cinematic framing for broadcast replays. The iso
// projection is fixed, so "angles" are honest framings — zoom level, target
// and pan character — cycled with a short cut-fade like a TV truck would.
class ReplayCameraController {
  constructor(game){ this.game = game; this.shot = null; this.fade = 0; }
  static ANGLES = [
    { name: 'WIDE',        zoom: 0.82, lerp: 0.05, of: 'ball' },
    { name: 'SIDELINE',    zoom: 1.26, lerp: 0.07, of: 'ball' },
    { name: 'TRACKING',    zoom: 1.4,  lerp: 0.10, of: 'ball' },
    { name: 'BEHIND GOAL', zoom: 1.5,  lerp: 0.08, of: 'goalline' },
    { name: 'SCORER',      zoom: 1.72, lerp: 0.12, of: 'scorer' },
  ];
  start(scorerPid, goalT, endT){
    const A = ReplayCameraController.ANGLES;
    const build = [A[0], A[1], A[2]][(Math.random() * 3) | 0];
    const finish = [A[2], A[3], scorerPid ? A[4] : A[3]][(Math.random() * 3) | 0];
    this.shot = { scorerPid, plan: [ { until: goalT - 2.0, angle: build }, { until: endT + 1, angle: finish } ] };
    this.fade = 0.35;
    this.cur = build;
  }
  stop(){ this.shot = null; this.game.replayCam = null; }
  update(){
    const g = this.game;
    if (!this.shot){ g.replayCam = null; return; }
    this.fade = Math.max(0, this.fade - SIM_STEP); // cut-fade decays with the replay itself
    const t = g.simTick / 60;
    const seg = this.shot.plan.find(s => t <= s.until) || this.shot.plan[this.shot.plan.length - 1];
    if (seg.angle !== this.cur){ this.cur = seg.angle; this.fade = 0.28; }
    const a = seg.angle;
    let target;
    if (a.of === 'scorer'){
      const p = EventSerializer.player(g, this.shot.scorerPid);
      target = p ? { x: p.pos.x, y: p.pos.y } : { x: g.ball.x, y: g.ball.y };
    } else if (a.of === 'goalline'){
      const gx = g.ball.x < 52.5 ? 0 : CFG.PITCH_L;
      target = { x: (g.ball.x * 2 + gx) / 3, y: (g.ball.y * 2 + 34) / 3 };
    } else target = { x: g.ball.x, y: g.ball.y };
    g.replayCam = { zoom: a.zoom, lerp: a.lerp, target, angle: a.name };
  }
}

// GoalReplayManager: after every goal, the broadcast truck rolls it back —
// restore a snapshot from before the buildup, re-run the DETERMINISTIC sim in
// slow motion under cinematic cameras, then restore live state and carry on
// with the walk-back and kickoff. Pure engine replay: no video, no fakery.
class GoalReplayManager {
  constructor(game){
    this.game = game;
    this.cfg = { enabled: true, length: 8, preRoll: 1.0, slowmo: 0.42, buildupRate: 1.15 };
    this.playing = null;
    this.armed = null;
    this.cams = new ReplayCameraController(game);
  }
  onGoal(){
    const g = this.game;
    if (!this.cfg.enabled || g.replayMode || g.scriptSession || g.headless) return;
    if (!g.recorder || !g.recorder.enabled) return; // nothing trustworthy to roll back
    this.armed = { tick: g.simTick, scorer: g.match.goalScorer ? g.match.goalScorer.pid : null };
  }
  tick(){
    const g = this.game;
    if (this.armed){
      if (g.match.state !== 'GOAL' || !this.cfg.enabled) this.armed = null;
      else if (g.match.stateT >= this.cfg.preRoll){ this.begin(); }
    }
    if (this.playing){
      // broadcast pacing: buildup slightly quick, the finish in slow motion
      const toGoal = (this.playing.goalTick - g.simTick) / 60;
      g.simRate = toGoal < 2.4 ? this.cfg.slowmo : this.cfg.buildupRate;
      this.cams.update();
      if (g.simTick >= this.playing.endTick) this.end();
    }
  }
  begin(){
    const g = this.game, rec = g.recorder;
    const scorer = (this.armed && this.armed.scorer) || (g.match.goalScorer ? g.match.goalScorer.pid : null);
    this.armed = null;
    if (!rec || !rec.snapshots.length) return;
    const goalTick = g.simTick - Math.round(g.match.stateT * 60);
    const startT = Math.max(0, goalTick / 60 - this.cfg.length);
    let snap = null;
    for (const s of rec.snapshots){ if (s.tick / 60 <= startT + 1e-6) snap = s; else break; }
    if (!snap || goalTick - snap.tick < 90) return; // nothing meaningful to roll back
    // a recording gap (REC toggled off) leaves only stale snapshots: skip the
    // replay rather than re-simulate minutes of match or show wrong footage
    if (Math.round(startT * 60) - snap.tick > rec.snapEvery + rec.moveEvery) return;
    const endTick = goalTick + Math.round(1.1 * 60);
    // recorded human input is re-fed during the rolled-back window so the
    // footage shows the REAL buildup, and live keys can't steer it
    const HUMAN_EVS = ['human_move', 'human_kick', 'human_select', 'human_mode'];
    let seedDir;
    for (const e of rec.timeline){
      if (e.tick === undefined || e.tick > snap.tick) break;
      if (e.type === 'human_move') seedDir = e.dir ? { x: e.dir.x, y: e.dir.y } : null;
    }
    this.playing = {
      liveSnap: SnapshotManager.capture(g),
      goalTick,
      endTick,
      fadeIn: 0.35,
      feed: {
        i: 0, dir: seedDir === undefined ? null : seedDir,
        evs: rec.timeline.filter(e => HUMAN_EVS.includes(e.type) && e.tick !== undefined
          && e.tick > snap.tick && e.tick <= endTick),
      },
    };
    g.replayMode = true;
    SnapshotManager.restore(g, snap);
    const wantTick = Math.round(startT * 60);
    const hardRate = g.simRate; g.simRate = 1;
    while (g.simTick < wantTick) g.step(); // silent catch-up to the buildup start
    g.simRate = hardRate;
    this.cams.start(scorer, this.playing.goalTick / 60, this.playing.endTick / 60);
    this.t0 = g.animT;
  }
  // re-inject the recorded human input at its exact ticks (called from step)
  applyFeed(){
    const g = this.game, f = this.playing && this.playing.feed;
    if (!f) return;
    while (f.i < f.evs.length && f.evs[f.i].tick <= g.simTick){
      const e = f.evs[f.i++];
      if (e.type === 'human_move') f.dir = e.dir ? { x: e.dir.x, y: e.dir.y } : null;
      else if (e.type === 'human_kick'){
        if (e.pass) g.input.passReleased = e.pass;
        if (e.shoot) g.input.shootReleased = e.shoot;
      } else if (e.type === 'human_select'){
        const p = EventSerializer.player(g, e.actor);
        if (p) g.selected = p;
      } else if (e.type === 'human_mode'){
        g.humanMode = !!e.on;
        g.selected = e.on ? g.nearestToBall(g.teams[0]) : null;
      }
    }
    g.replayHumanDir = f.dir;
  }
  end(){ this.finish(false); }
  skip(){ if (this.playing) this.finish(true); }
  abort(){ // discard without restoring — reset() owns the fresh state
    this.playing = null;
    this.armed = null;
    this.game.replayMode = false;
    this.game.simRate = 1;
    this.game.replayHumanDir = undefined;
    this.cams.stop();
  }
  finish(){
    const g = this.game;
    if (!this.playing) return;
    SnapshotManager.restore(g, this.playing.liveSnap);
    this.playing = null;
    g.replayMode = false;
    g.simRate = 1;
    g.replayHumanDir = undefined;
    this.cams.stop();
    g.replayFadeT = g.animT; // renderer: short fade back to live
  }
}

// BroadcastReplayOverlay: letterbox bars, REPLAY badge, angle label, progress
// and skip hint. Screen-space, drawn from drawHUD while a replay runs.
const BroadcastReplayOverlay = {
  draw(r, game){
    const gr = game.goalReplay;
    if (!gr || !gr.playing) return;
    const ctx = r.ctx, W = r.W, H = r.H;
    const age = game.animT - (gr.t0 || 0);
    const k = easeOutCubic(clamp(age / 0.45, 0, 1));
    const bar = Math.round(H * 0.085 * k);
    ctx.fillStyle = '#05070a';
    ctx.fillRect(0, 0, W, bar); ctx.fillRect(0, H - bar, W, bar);
    // camera-cut fade (decayed in ReplayCameraController.update)
    if (gr.cams.fade > 0){
      ctx.fillStyle = 'rgba(0,0,0,' + clamp(gr.cams.fade * 2.4, 0, 0.8).toFixed(2) + ')';
      ctx.fillRect(0, 0, W, H);
    }
    // REPLAY badge
    ctx.textBaseline = 'middle';
    ctx.font = UITheme.sans('800', 13);
    const bw = ctx.measureText('REPLAY').width + 40;
    const bx = W - bw - 14, by = bar + 10;
    glassPanel(ctx, bx, by, bw, 28, 14);
    const pulse = 0.55 + 0.45 * Math.sin(game.animT * 5);
    ctx.fillStyle = 'rgba(226,89,72,' + pulse.toFixed(2) + ')';
    ctx.beginPath(); ctx.arc(bx + 15, by + 14, 4.5, 0, 7); ctx.fill();
    ctx.fillStyle = UITheme.ink;
    ctx.fillText('REPLAY', bx + 26, by + 14.5);
    // angle label
    if (game.replayCam && game.replayCam.angle){
      ctx.font = UITheme.sans('600', 10.5);
      const aw = ctx.measureText(game.replayCam.angle).width + 18;
      glassPanel(ctx, bx + bw - aw, by + 34, aw, 20, 7);
      ctx.fillStyle = UITheme.dim;
      ctx.fillText(game.replayCam.angle, bx + bw - aw + 9, by + 44);
    }
    // progress along the replay window + skip hint
    const p = gr.playing;
    const span = p.endTick - (p.goalTick - gr.cfg.length * 60);
    const frac = clamp(1 - (p.endTick - game.simTick) / span, 0, 1);
    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    ctx.fillRect(0, H - bar - 2, W, 2);
    ctx.fillStyle = UITheme.accent;
    ctx.fillRect(0, H - bar - 2, W * frac, 2);
    ctx.font = UITheme.sans('600', 10.5);
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    const hint = r.W < 720 ? 'tap to skip' : 'SPACE · skip replay';
    ctx.fillText(hint, W / 2 - ctx.measureText(hint).width / 2, H - bar / 2);
    ctx.textBaseline = 'top';
  },
};

/* ============== PROCEDURAL ON-CHAIN AVATARS & TOKEN METADATA =============== */
// ProceduralAvatarGenerator: a unique pixel face for every player, generated
// deterministically from a numeric seed as compact SVG — suitable for full
// on-chain storage (no files, no IPFS). Same seed -> same face, always.
function shadeHex(hex, k){
  const n = parseInt(hex.slice(1), 16);
  const c = v => Math.max(0, Math.min(255, Math.round(v * k)));
  return '#' + ((c(n >> 16) << 16) | (c((n >> 8) & 255) << 8) | c(n & 255)).toString(16).padStart(6, '0');
}
const ProceduralAvatarGenerator = {
  HAIR_STYLES: ['crew', 'spiky', 'side part', 'curly', 'bald', 'headband'],
  EYES: ['forward', 'left', 'right', 'focused'],
  MOUTHS: ['neutral', 'smile', 'frown', 'open'],
  FACIAL: ['clean', 'stubble', 'mustache', 'beard'],
  ACC: ['none', 'earring', 'scar', 'glasses'],
  FACES: ['oval', 'wide', 'square'],
  traits(seed, over = {}){
    const r = mulberry32(seed | 0);
    const pick = arr => arr[(r() * arr.length) | 0];
    // every roll is consumed unconditionally: cosmetic overrides (matching a
    // player's sprite) must never shift the stream, or the same token id
    // would render differently with and without overrides
    const skinRoll = SKIN[(r() * SKIN.length) | 0];
    const t = {
      face: (r() * 3) | 0,
      skin: over.skin || skinRoll,
      hairStyle: (r() * 6) | 0,
      hair: (h => over.hair || h)(HAIR[(r() * HAIR.length) | 0]),
      brows: (r() * 3) | 0,
      eyes: (r() * 4) | 0,
      nose: (r() * 3) | 0,
      mouth: (r() * 4) | 0,
      facial: (r() * 4) | 0,
      acc: (r() * 4) | 0,
      shirt: (c => over.shirt || c)(pick(['#d8342c', '#57b8e8', '#3aa84e', '#e8a531', '#8a5ac2', '#e8e4da'])),
    };
    t.expression = t.mouth === 1 ? 'smiling' : (t.mouth === 2 ? 'fierce' : (t.eyes === 3 ? 'focused' : 'calm'));
    return t;
  },
  svg(seed, over){
    const t = this.traits(seed, over);
    const skinD = shadeHex(t.skin, 0.72), ink = '#141210';
    let s = '';
    const R = (x, y, w, h, f, o) =>
      { s += '<rect x="' + x + '" y="' + y + '" width="' + w + '" height="' + h + '" fill="' + f + '"' + (o ? ' fill-opacity="' + o + '"' : '') + '/>'; };
    R(0, 0, 16, 16, '#151a21');                       // card background
    R(2, 14, 12, 2, t.shirt);                         // shoulders / shirt
    R(6, 12, 4, 2, skinD);                            // neck
    // head shapes
    if (t.face === 0){ R(4, 3, 8, 9, t.skin); R(5, 12, 6, 1, t.skin); }
    else if (t.face === 1){ R(3, 4, 10, 8, t.skin); R(5, 12, 6, 1, t.skin); }
    else { R(4, 3, 8, 10, t.skin); }
    R(3, 7, 1, 2, t.skin); R(12, 7, 1, 2, t.skin);    // ears
    // hair
    if (t.hairStyle === 0){ R(4, 2, 8, 2, t.hair); R(4, 4, 1, 2, t.hair); R(11, 4, 1, 2, t.hair); }
    else if (t.hairStyle === 1){ R(4, 1, 2, 3, t.hair); R(7, 1, 2, 3, t.hair); R(10, 1, 2, 3, t.hair); R(4, 3, 8, 1, t.hair); }
    else if (t.hairStyle === 2){ R(4, 2, 8, 2, t.hair); R(9, 4, 3, 1, t.hair); }
    else if (t.hairStyle === 3){ R(3, 1, 10, 3, t.hair); R(3, 4, 2, 2, t.hair); R(11, 4, 2, 2, t.hair); }
    else if (t.hairStyle === 5){ R(4, 1, 8, 2, t.hair); R(3, 3, 10, 1, '#e8e4da'); }
    // brows
    if (t.brows === 0){ R(5, 6, 2, 1, t.hair); R(9, 6, 2, 1, t.hair); }
    else if (t.brows === 1){ R(5, 6, 2, 1, t.hair); R(9, 5, 2, 1, t.hair); }
    else { R(5, 5, 3, 1, t.hair); R(9, 5, 3, 1, t.hair); }
    // eyes
    if (t.eyes === 3){ R(5, 7, 2, 1, ink); R(9, 7, 2, 1, ink); }
    else {
      R(5, 7, 2, 1, '#f2f2ea'); R(9, 7, 2, 1, '#f2f2ea');
      const px = t.eyes === 1 ? 0 : 1;
      R(5 + px, 7, 1, 1, ink); R(9 + px, 7, 1, 1, ink);
    }
    // nose
    if (t.nose === 0) R(7, 8, 1, 2, skinD);
    else if (t.nose === 1) R(7, 9, 2, 1, skinD);
    else R(7, 9, 1, 1, skinD);
    // mouth
    if (t.mouth === 0) R(6, 11, 4, 1, ink);
    else if (t.mouth === 1){ R(5, 11, 1, 1, ink); R(6, 12, 4, 1, ink); R(10, 11, 1, 1, ink); }
    else if (t.mouth === 2){ R(5, 12, 1, 1, ink); R(6, 11, 4, 1, ink); R(10, 12, 1, 1, ink); }
    else R(6, 11, 3, 2, '#7a2e2e');
    // facial hair
    if (t.facial === 1) R(4, 10, 8, 3, t.hair, '0.28');
    else if (t.facial === 2) R(5, 10, 6, 1, t.hair);
    else if (t.facial === 3){ R(4, 10, 1, 3, t.hair); R(11, 10, 1, 3, t.hair); R(5, 12, 6, 1, t.hair); R(5, 10, 1, 1, t.hair); R(10, 10, 1, 1, t.hair); }
    // accessory
    if (t.acc === 1) R(12, 9, 1, 1, '#e8c23a');
    else if (t.acc === 2) R(10, 4, 1, 3, shadeHex(t.skin, 1.25));
    else if (t.acc === 3){ R(4, 6, 4, 3, ink, '0.18'); R(9, 6, 4, 3, ink, '0.18'); R(8, 7, 1, 1, ink); }
    return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">' + s + '</svg>';
  },
};
// OnChainSVGEncoder: raw SVG -> base64 data URI (EVM-storable, no externals)
const OnChainSVGEncoder = {
  encode(svg){ return 'data:image/svg+xml;base64,' + btoa(svg); },
  forSeed(seed, over){ return this.encode(ProceduralAvatarGenerator.svg(seed, over)); },
};
// stable numeric token id per player, derived from the match seed
function playerTokenId(game, p){
  return (((game.matchSeed >>> 0) ^ Math.imul(p.team.idx + 1, 0x9E3779B9) ^ Math.imul(p.num, 2654435761)) >>> 0) % 1000000;
}
// PlayerTokenMetadata: ERC-721-style metadata, fully self-contained
const PlayerTokenMetadata = {
  build(game, p){
    const seed = playerTokenId(game, p);
    const over = { skin: p.app.skin, hair: p.app.hair, shirt: p.app.shirt };
    const t = ProceduralAvatarGenerator.traits(seed, over);
    const G = ProceduralAvatarGenerator;
    return {
      name: p.name,
      tokenId: String(seed),
      image: OnChainSVGEncoder.forSeed(seed, over),
      attributes: [
        { trait_type: 'Position', value: p.role },
        { trait_type: 'Preferred Foot', value: p.foot === 1 ? 'Right' : 'Left' },
        { trait_type: 'Rarity', value: p.rarity[0].toUpperCase() + p.rarity.slice(1) },
        { trait_type: 'Age', value: p.age },
        { trait_type: 'Nationality', value: p.nat || 'AR' },
        { trait_type: 'Height', value: (p.heightCm || 180) + 'cm' },
        { trait_type: 'Face', value: G.FACES[t.face] },
        { trait_type: 'Hair', value: G.HAIR_STYLES[t.hairStyle] },
        { trait_type: 'Facial Hair', value: G.FACIAL[t.facial] },
        { trait_type: 'Accessory', value: G.ACC[t.acc] },
        { trait_type: 'Expression', value: t.expression },
      ],
    };
  },
};
// canvas-side avatar cache: the exact on-chain SVG rendered via an Image
const AvatarCache = {
  map: new Map(),
  get(game, p){
    const seed = playerTokenId(game, p);
    const key = p.pid + ':' + seed;
    let e = this.map.get(key);
    if (!e){
      e = { img: new Image(), ready: false };
      e.img.onload = () => { e.ready = true; };
      e.img.src = OnChainSVGEncoder.forSeed(seed, { skin: p.app.skin, hair: p.app.hair, shirt: p.app.shirt });
      this.map.set(key, e);
    }
    return e;
  },
  clear(){ this.map.clear(); },
};

/* ==================== FREE CAMERA & GESTURE INPUT ========================== */
// CameraPanController + CameraFollowController + CameraIdleReturn in one
// place: normally glued to the ball; a drag enters free inspection mode;
// after a quiet spell (configurable) it eases home. Cinematic replay cameras
// always win. Camera state is render-only — determinism is untouched.
class CameraSystem {
  constructor(game){
    this.game = game;
    this.mode = 'follow';
    this.zoom = 1;
    this.free = { x: 0, y: 0 };   // projected screen-space target
    this.cfg = { idleReturn: 5 }; // seconds; 0 disables the auto-return
    this.lastGestureT = -1e9;
    this.panning = false;
  }
  gesture(){ this.lastGestureT = this.game.animT; }
  beginPan(){
    if (this.game.replayCam) return; // broadcast replays own the camera
    if (this.mode !== 'free'){
      this.mode = 'free';
      this.free = { x: this.game.renderer.cam.x, y: this.game.renderer.cam.y };
    }
    this.panning = true;
    this.gesture();
  }
  pan(dx, dy){
    if (this.game.replayCam || this.mode !== 'free') return;
    this.free.x -= dx / this.zoom;
    this.free.y -= dy / this.zoom;
    // sensible bounds: the pitch plus stands, benches and camera crews
    this.free.x = clamp(this.free.x, -780, 1120);
    this.free.y = clamp(this.free.y, -170, 950);
    this.gesture();
  }
  endPan(){ this.panning = false; this.gesture(); }
  setZoom(z){ this.zoom = clamp(z, 0.55, 2.4); this.gesture(); }
  zoomBy(f){ this.setZoom(this.zoom * f); }
  resetView(){ this.zoom = 1; this.returnToBall(); }
  returnToBall(){ this.mode = 'follow'; this.panning = false; }
  frameTarget(){
    const g = this.game, rc = g.replayCam;
    if (rc){
      const s = project(rc.target.x, rc.target.y, 0);
      return { x: s.x, y: s.y, k: rc.lerp || 0.08, zoom: rc.zoom };
    }
    // CameraIdleReturn: drift back to the ball after the idle window
    if (this.mode === 'free' && !this.panning && this.cfg.idleReturn > 0 &&
        g.animT - this.lastGestureT > this.cfg.idleReturn) this.returnToBall();
    if (this.mode === 'free') return { x: this.free.x, y: this.free.y, k: 0.22, zoom: this.zoom };
    // MatchPresentationController: dwell briefly on ceremony subjects
    const pf = g.presentFocus;
    if (pf && g.animT < pf.until && pf.p){
      const s = project(pf.p.pos.x, pf.p.pos.y, 0);
      return { x: s.x, y: s.y, k: 0.09, zoom: this.zoom };
    }
    const b = g.ball, fp = g.followPlayer;
    const bp = fp ? project(lerp(fp.pos.x, b.x, 0.3), lerp(fp.pos.y, b.y, 0.3), 0) : project(b.x, b.y, 0);
    const lead = fp ? bp : project(b.x + b.vx * 0.3, b.y + b.vy * 0.3, 0);
    return { x: lerp(bp.x, lead.x, 0.5), y: lerp(bp.y, lead.y, 0.5), k: 0.06, zoom: this.zoom };
  }
}
// GestureInputManager: one pointer pipeline for mouse and touch. UI zones
// respond on press; a small movement threshold separates player taps from
// camera drags; two fingers pinch-zoom; middle-drag always pans.
class GestureInputManager {
  constructor(game){ this.game = game; this.pts = new Map(); this.pinch = null; }
  down(e){
    const g = this.game;
    if (g.goalReplay && g.goalReplay.playing){ g.goalReplay.skip(); return; }
    const pt = { x0: e.clientX, y0: e.clientY, x: e.clientX, y: e.clientY, kind: 'tap' };
    if (e.button === 1) pt.kind = 'pan';
    else if (g.onPointerZones(e.clientX, e.clientY)) pt.kind = 'ui';
    this.pts.set(e.pointerId, pt);
    if (this.pts.size === 2){
      const [a, b] = [...this.pts.values()];
      a.kind = b.kind = 'pinch';
      this.pinch = { d0: Math.max(12, Math.hypot(a.x - b.x, a.y - b.y)), z0: g.camera.zoom };
      g.camera.gesture();
      return;
    }
    if (this.pts.size > 2) pt.kind = 'ui'; // extra fingers: ignore
    if (pt.kind === 'pan') g.camera.beginPan();
  }
  move(e){
    const g = this.game;
    const pt = this.pts.get(e.pointerId);
    if (!pt) return;
    const dx = e.clientX - pt.x, dy = e.clientY - pt.y;
    pt.x = e.clientX; pt.y = e.clientY;
    if (this.pinch && this.pts.size >= 2){
      const [a, b] = [...this.pts.values()];
      g.camera.setZoom(this.pinch.z0 * Math.hypot(a.x - b.x, a.y - b.y) / this.pinch.d0);
      return;
    }
    if (pt.kind === 'ui' || pt.kind === 'pinch') return;
    if (pt.kind === 'tap' && Math.hypot(pt.x - pt.x0, pt.y - pt.y0) > 7){
      pt.kind = 'pan'; // it's a drag: never fires the player click
      g.camera.beginPan();
    }
    if (pt.kind === 'pan') g.camera.pan(dx, dy);
  }
  up(e){
    const pt = this.pts.get(e.pointerId);
    this.pts.delete(e.pointerId);
    if (this.pts.size < 2) this.pinch = null;
    if (!pt) return;
    if (pt.kind === 'tap') this.game.onPointerWorld(pt.x, pt.y);
    else if (pt.kind === 'pan') this.game.camera.endPan();
  }
  cancel(e){
    const pt = this.pts.get(e.pointerId);
    this.pts.delete(e.pointerId);
    if (this.pts.size < 2) this.pinch = null;
    if (pt && pt.kind === 'pan') this.game.camera.endPan();
  }
}

class Game {
  constructor(){
    this.input = new Input();
    this.animT = 0;
    this.showMap = true; this.statsFor = null;
    this.coachOpen = false; this.coachText = '';
    this.ui = { zones: [] };
    this.panel = null; this.followPlayer = null;
    this.history = []; this.histScroll = 0;
    this.fx = new EventAnimationManager(this);
    this.broadcast = new BroadcastOverlay(this);
    this.takeRequested = false; this.takeShoot = false;
    this.replayMode = false; this.simRate = 1;
    this.presentCfg = { ceremonies: true }; // match presentation, skippable
    this.recorder = new MatchRecorder(this);
    this.scriptRunner = null;
    this.replay = new ReplayController(this);
    this.goalReplay = new GoalReplayManager(this);
    this.scriptReport = null;
    this.nextLoadMode = 'strict';
    // hidden file input for script import
    this.fileInput = document.createElement('input');
    this.fileInput.type = 'file'; this.fileInput.accept = '.json,application/json';
    this.fileInput.style.display = 'none';
    document.body.appendChild(this.fileInput);
    this.fileInput.addEventListener('change', () => {
      const f = this.fileInput.files && this.fileInput.files[0];
      this.fileInput.value = '';
      if (!f) return;
      const rd = new FileReader();
      rd.onload = () => this.loadScript(String(rd.result), { mode: this.nextLoadMode });
      rd.readAsText(f);
    });
    this.reset();
    this.renderer = new Renderer(document.getElementById('game'), this);
    // GestureInputManager: one pipeline for mouse and touch — taps select,
    // drags pan the free camera, two fingers pinch-zoom, wheel zooms
    this.camera = new CameraSystem(this);
    this.gestures = new GestureInputManager(this);
    const cv = this.renderer.canvas;
    cv.addEventListener('pointerdown', e => {
      if (e.button === 2) return; // right button: context menu is suppressed anyway
      e.preventDefault();
      if (cv.setPointerCapture){ try { cv.setPointerCapture(e.pointerId); } catch (err){} }
      this.gestures.down(e);
    });
    cv.addEventListener('pointermove', e => this.gestures.move(e));
    cv.addEventListener('pointerup', e => this.gestures.up(e));
    cv.addEventListener('pointercancel', e => this.gestures.cancel(e));

      if (this.humanMode && team.idx === 0) continue; // the human runs RED's bench
      if (team.subsUsed >= CFG.MAX_SUBS || !team.bench.length) continue;
      if ((team.lastAutoSub || 0) > m.tMatch - 8 * 60) continue;

      for (const p of team.players){
        if (p.isGK) continue;
        if (rs && (p === rs.taker || p === rs.helper)) continue; // never sub the restart taker
        const risk = p.stats.yellow > 0 && p.stats.foulsC >= 2 ? -0.8 : 0;
        const sc = p.stamina * 2 + (matchRating(p) - 6) * 0.35 + risk;

      if (!worst) continue;

      const poor = matchRating(worst) < 5.6 && m.tMatch > 60 * 60;
