<script>
'use strict';
/* ============================================================================
   RETRO KICKOFF II — a self-contained isometric 11v11 soccer simulation.
   Early-90s 16-bit football camera & pacing, modern systems underneath:
     · Real pitch proportions in meters (105x68, 16.5m box, 5.5m goal area,
       9.15m circle, 11m spot, 7.32m goal).
     · Independent 3D ball (gravity, bounce, skid, drag, Magnus spin,
       post/bar/net/body collisions). Dribbling = knock-ahead touches.
     · Pose system: every action (idle/jog/sprint/dribble/shield/pass/shoot/
       cross/header/tackle/slide/fall/GK ready/dive/catch/parry/celebrate)
       has its own procedurally drawn sprite, cached per appearance+facing.
     · Referee with diagonal positioning AI, foul detection (late & from-
       behind tackles, keeper collisions), advantage, free kicks.
     · Utility AI: pass/through-ball/cross/shoot/dribble/shield/clear,
       standing vs sliding tackle choice, duties to prevent swarming.
     · Match events ticker, scoreboard, possession, debug overlay.
   Rendering: optimized Canvas2D — one pre-rendered stadium, lazy sprite
   atlas cache, depth-sorted entity pass, delta-time RAF. AI vs AI default;
   press H to take control of RED.
   ========================================================================== */

/* ------------------------------- CONFIG ---------------------------------- */
const CFG = {
  MATCH_REAL_SECONDS : 180,   // real seconds for the full 90-minute match
  PITCH_L            : 105,   // meters
  PITCH_W            : 68,
  GOAL_W             : 7.32,
  GOAL_H             : 2.44,
  BOX_D              : 16.5,  // penalty area depth
  BOX_W              : 40.32, // penalty area width
  SIX_D              : 5.5,   // goal area depth
  SIX_W              : 18.32,
  SPOT               : 11,    // penalty spot
  CIRCLE             : 9.15,
  GRAV               : 16,    // m/s^2 (slightly arcade-y)
  BALL_BOUNCE        : 0.58,
  BALL_FR_GROUND     : 0.55,  // exponential rolling friction /s
  BALL_FR_SKID       : 0.85,  // extra friction while skidding (fast, low)
  BALL_FR_AIR        : 0.12,
  BALL_SPIN_CURVE    : 0.055, // magnus curve factor
  CONTROL_RADIUS     : 1.4,
  KICK_RANGE         : 1.7,
  PLAYER_BASE_SPEED  : 5.3,   // + pace*3.5
  PLAYER_BASE_ACCEL  : 8,     // + accel*9
  TURN_RATE          : 7.5,   // rad/s
  SCALE              : 9,     // px per meter (CSS px; rendered at devicePixelRatio)
  ISO                : 0.5,   // vertical squash of the iso projection
  Z_PX               : 0.9,   // meters of height -> px factor (x SCALE)
  MAX_SUBS           : 5,     // substitutions allowed per team
};
const TIME_SCALE = (90 * 60) / CFG.MATCH_REAL_SECONDS;
const SIM_STEP = 1 / 60; // fixed sim timestep — identical in live play, headless runs and replays

/* --------------------- PITCH SURFACE & WEATHER TYPES ---------------------- */
// Both feed multipliers into the shared ball/player physics (module ENV).
// PitchThemeManager: every pitch is a theme object — mowing pattern, palette,
// wear/mud/puddle/uneven levels, and its own physics multipliers.
const PITCH_THEMES = {
  classic:  { label:'CLASSIC STRIPES', pattern:'h',     frMul:1.0,  bounceMul:1.0,  speedMul:1.0,  tractionMul:1.0,
              stripeA:'#38a34a', stripeB:'#2f8f3e', apron:'#1e5c2a', wear:0.06 },
  vertical: { label:'VERTICAL CUT',    pattern:'v',     frMul:1.0,  bounceMul:1.0,  speedMul:1.0,  tractionMul:1.0,
              stripeA:'#37a049', stripeB:'#2e8c3d', apron:'#1e5c2a', wear:0.06 },
  checker:  { label:'CHECKERBOARD',    pattern:'check', frMul:0.95, bounceMul:1.02, speedMul:1.0,  tractionMul:1.0,
              stripeA:'#3aa84e', stripeB:'#2f9040', apron:'#1e5c2a', wear:0.04 },
  diagonal: { label:'DIAGONAL CUT',    pattern:'diag',  frMul:1.0,  bounceMul:1.0,  speedMul:1.0,  tractionMul:1.0,
              stripeA:'#38a34a', stripeB:'#2e8a3c', apron:'#1e5c2a', wear:0.06 },
  rings:    { label:'RING MOWN',       pattern:'rings', frMul:1.0,  bounceMul:1.0,  speedMul:1.0,  tractionMul:1.0,
              stripeA:'#36a048', stripeB:'#2d8a3b', apron:'#1e5c2a', wear:0.05 },
  modern:   { label:'PRISTINE TURF',   pattern:'check', frMul:0.88, bounceMul:1.05, speedMul:1.02, tractionMul:1.05,
              stripeA:'#2fae4e', stripeB:'#27953f', apron:'#186328', wear:0 },
  lush:     { label:'LUSH GRASS',      pattern:'h',     frMul:1.28, bounceMul:0.85, speedMul:0.97, tractionMul:1.0,
              stripeA:'#2e9440', stripeB:'#237a33', apron:'#17521f', wear:0.08 },
  oldturf:  { label:'OLD STADIUM TURF',pattern:'h',     frMul:1.1,  bounceMul:0.95, speedMul:0.98, tractionMul:0.97,
              stripeA:'#5f8f47', stripeB:'#557f3f', apron:'#3e5c2e', wear:0.28, uneven:0.2 },
  patchy:   { label:'PATCHY GRASS',    pattern:'h',     frMul:1.05, bounceMul:1.02, speedMul:0.98, tractionMul:0.94,
              stripeA:'#6f9a49', stripeB:'#628c40', apron:'#4a6a32', wear:0.5, uneven:0.35 },
  worn:     { label:'WORN LOCAL PITCH',pattern:'none',  frMul:0.95, bounceMul:1.06, speedMul:0.98, tractionMul:0.92,
              stripeA:'#79a04b', stripeB:'#79a04b', apron:'#4e7233', wear:0.62, uneven:0.45 },
  amateur:  { label:'UNEVEN AMATEUR',  pattern:'none',  frMul:1.05, bounceMul:1.08, speedMul:0.96, tractionMul:0.9,
              stripeA:'#7aa04f', stripeB:'#7aa04f', apron:'#527236', wear:0.55, uneven:0.65 },
  mud:      { label:'MUD BATH',        pattern:'none',  frMul:1.5,  bounceMul:0.62, speedMul:0.92, tractionMul:0.78,
              stripeA:'#6a8a44', stripeB:'#6a8a44', apron:'#4a5f30', wear:0.75, mud:0.85, uneven:0.4 },
  dry:      { label:'SUN-BAKED',       pattern:'v',     frMul:0.68, bounceMul:1.3,  speedMul:1.03, tractionMul:0.95,
              stripeA:'#a3b45a', stripeB:'#93a850', apron:'#6d8038', wear:0.35, uneven:0.25 },
  soaked:   { label:'RAIN-SOAKED',     pattern:'h',     frMul:0.62, bounceMul:0.7,  speedMul:1.0,  tractionMul:0.85,
              stripeA:'#25733a', stripeB:'#1e6130', apron:'#154a22', wear:0.3, mud:0.3, puddles:0.7 },
  winter:   { label:'WINTER WORN',     pattern:'h',     frMul:1.2,  bounceMul:0.85, speedMul:0.96, tractionMul:0.88,
              stripeA:'#7d9a6a', stripeB:'#6f8c5e', apron:'#556848', wear:0.6, mud:0.35, uneven:0.35 },
};
const GRASS_TYPES = PITCH_THEMES; // legacy alias
// WeatherSystem: broad conditions with lighting, particles, wind and physics.
const WEATHER_TYPES = {
  sunny:    { label:'CLEAR DAY', frMul:1, bounceMul:1, accelMul:1, slideMul:1, catchMod:0, curveMul:1 },
  cloudy:   { label:'OVERCAST', frMul:1, bounceMul:1, accelMul:1, slideMul:1, catchMod:0, curveMul:1,
              veil:'rgba(120,130,145,0.10)' },
  sunset:   { label:'SUNSET', frMul:1, bounceMul:1, accelMul:1, slideMul:1, catchMod:0, curveMul:1,
              veil:'rgba(255,140,60,0.10)', shadowA:0.34, shadowDx:5 },
  night:    { label:'NIGHT MATCH', frMul:1, bounceMul:1, accelMul:1, slideMul:1, catchMod:0, curveMul:1,
              veil:'rgba(10,16,40,0.20)', shadowA:0.16, night:true },
  drizzle:  { label:'DRIZZLE', frMul:0.85, bounceMul:0.92, accelMul:0.97, slideMul:1.2, catchMod:-0.05, curveMul:0.95,
              particles:'rain', rainN:70, rainLen:7, veil:'rgba(60,80,105,0.08)', wet:0.2 },
  rainy:    { label:'RAIN', frMul:0.6, bounceMul:0.78, accelMul:0.92, slideMul:1.45, catchMod:-0.12, curveMul:0.9,
              particles:'rain', rainN:170, rainLen:11, veil:'rgba(40,60,90,0.15)', wet:0.4 },
  storm:    { label:'STORM', frMul:0.5, bounceMul:0.7, accelMul:0.88, slideMul:1.6, catchMod:-0.18, curveMul:0.85,
              particles:'rain', rainN:280, rainLen:15, veil:'rgba(25,35,60,0.24)', wind:7, storm:true,
              staminaMul:1.15, wet:0.7 },
  fog:      { label:'FOG', frMul:1, bounceMul:1, accelMul:1, slideMul:1, catchMod:-0.06, curveMul:1,
              veil:'rgba(200,210,220,0.24)', fog:0.5 },
  mist:     { label:'MIST', frMul:0.95, bounceMul:0.96, accelMul:1, slideMul:1.1, catchMod:-0.03, curveMul:1,
              veil:'rgba(190,205,215,0.13)', fog:0.22, wet:0.15 },
  windy:    { label:'STRONG WIND', frMul:1, bounceMul:1, accelMul:1, slideMul:1, catchMod:-0.04, curveMul:1.1,
              wind:8 },
  cold:     { label:'BITTER COLD', frMul:1.1, bounceMul:0.95, accelMul:0.96, slideMul:1, catchMod:-0.04, curveMul:1,
              veil:'rgba(180,200,230,0.09)', staminaMul:1.2 },
  hot:      { label:'HOT AFTERNOON', frMul:0.9, bounceMul:1.1, accelMul:0.97, slideMul:0.95, catchMod:0, curveMul:1,
              veil:'rgba(255,190,90,0.07)', staminaMul:1.35, speedMul:0.97 },
  afterrain:{ label:'AFTER THE RAIN', frMul:0.68, bounceMul:0.8, accelMul:0.95, slideMul:1.35, catchMod:-0.08, curveMul:0.95,
              veil:'rgba(90,110,130,0.07)', wet:0.55 },
  snow:     { label:'SNOW', frMul:1.55, bounceMul:0.6, accelMul:0.85, slideMul:0.8, catchMod:-0.05, curveMul:0.8,
              speedMul:0.93, particles:'snow', veil:'rgba(230,238,250,0.10)', snowy:true, staminaMul:1.15 },
};
/* -------------------- PITCH SURFACE MAP & FIELD WEAR ----------------------- */
// FieldWearGenerator: organic, irregular damage (no perfect ovals). The same
// blob list drives BOTH the visuals and the physics grid, so what you see is
// what the ball feels (SurfacePhysicsModifier).
let SURFACE = null; // module-level so Ball/Player physics can sample cheaply
class PitchSurfaceMap {
  constructor(themeKey, weatherKey, seed){
    const th = PITCH_THEMES[themeKey] || PITCH_THEMES.classic;
    const w = WEATHER_TYPES[weatherKey] || WEATHER_TYPES.sunny;
    this.nx = 24; this.ny = 17;
    this.cells = new Float32Array(this.nx * this.ny * 3); // mud, wet, rough per cell
    this.blobs = [];
    const rng = mulberry32(seed);
    const paint = (x, y, r, mi, wi, ri2) => {
      const x0 = Math.max(0, ((x - r) / CFG.PITCH_L * this.nx) | 0);
      const x1 = Math.min(this.nx - 1, ((x + r) / CFG.PITCH_L * this.nx) | 0);
      const y0 = Math.max(0, ((y - r) / CFG.PITCH_W * this.ny) | 0);
      const y1 = Math.min(this.ny - 1, ((y + r) / CFG.PITCH_W * this.ny) | 0);
      for (let cy = y0; cy <= y1; cy++) for (let cx = x0; cx <= x1; cx++){
        const i = (cy * this.nx + cx) * 3;
        this.cells[i] = Math.min(1, this.cells[i] + mi);
        this.cells[i + 1] = Math.min(1, this.cells[i + 1] + wi);
        this.cells[i + 2] = Math.min(1, this.cells[i + 2] + ri2);
      }
    };
    const add = (kind, x, y, r, col, alpha, sx = 1, sy = 1) => {
      this.blobs.push({ kind, x, y, r, col, alpha, sx, sy, seed: (rng() * 1e9) | 0 });
      const eff = r * Math.max(sx, sy);
      if (kind === 'mud') paint(x, y, eff, 0.65, 0.1, 0.25);
      else if (kind === 'puddle') paint(x, y, eff, 0.1, 0.9, 0);
      else if (kind === 'wear') paint(x, y, eff, 0.18, 0, 0.4);
      // 'tone' blobs are purely visual
    };
    const DIRT = ['#7a6036', '#6b5430', '#8a7040', '#5f4a2c'];
    const wear = th.wear || 0;
    // worn goalmouths + penalty spots (always where boots churn the grass)
    if (wear > 0.08){
      for (const gx of [4, CFG.PITCH_L - 4]){
        const n = 2 + (wear * 4 | 0);
        for (let i = 0; i < n; i++)
          add('wear', gx + (rng() - 0.4) * 6, 34 + (rng() - 0.5) * 9, 2 + rng() * 2.5,
            DIRT[(rng() * DIRT.length) | 0], 0.22 + rng() * 0.2, 1.3, 0.9);
        add('wear', gx === 4 ? 11 : CFG.PITCH_L - 11, 34, 1 + rng(), DIRT[1], 0.3);
      }
      // scuffed centre circle + kickoff spot
      for (let i = 0; i < 2 + wear * 3; i++)
        add('wear', 52.5 + (rng() - 0.5) * 8, 34 + (rng() - 0.5) * 6, 1.2 + rng() * 1.6,
          DIRT[(rng() * DIRT.length) | 0], 0.16 + rng() * 0.14);
    }
    // touchline trampling: long thin scuffs
    if (wear > 0.25){
      for (let i = 0; i < wear * 8; i++)
        add('wear', 10 + rng() * 85, rng() < 0.5 ? 1.5 + rng() * 2 : 66.5 - rng() * 2,
          1.5 + rng() * 2, DIRT[(rng() * DIRT.length) | 0], 0.18 + rng() * 0.12, 2.4, 0.55);
    }
    // random torn patches across the pitch
    for (let i = 0; i < wear * 22; i++)
      add('wear', 5 + rng() * 95, 4 + rng() * 60, 0.8 + rng() * 2.6,
        DIRT[(rng() * DIRT.length) | 0], 0.12 + rng() * 0.18, 0.7 + rng() * 0.8, 0.6 + rng() * 0.6);
    // mud: central corridor + goalmouth bogs
    const mud = th.mud || 0;
    for (let i = 0; i < mud * 12; i++){
      const central = rng() < 0.6;
      add('mud', central ? 25 + rng() * 55 : (rng() < 0.5 ? 6 + rng() * 10 : 89 + rng() * 10),
        central ? 24 + rng() * 20 : 27 + rng() * 14, 2 + rng() * 3.5,
        rng() < 0.5 ? '#5c4a2e' : '#514228', 0.3 + rng() * 0.25, 1 + rng() * 0.6, 0.8);
    }
    // puddles: theme + live weather wetness
    const pud = (th.puddles || 0) + (w.wet || 0) * 0.7;
    for (let i = 0; i < pud * 9; i++)
      add('puddle', 8 + rng() * 89, 5 + rng() * 58, 1 + rng() * 2.2,
        '#3d5468', 0.3 + rng() * 0.2, 1 + rng() * 0.8, 0.55);
    // uneven tone: broad, very subtle light/dark irregularities
    for (let i = 0; i < (th.uneven || 0) * 14; i++)
      add('tone', 10 + rng() * 85, 6 + rng() * 56, 4 + rng() * 7,
        rng() < 0.5 ? 'rgba(0,0,0,1)' : 'rgba(255,255,240,1)', 0.045 + rng() * 0.045, 1 + rng(), 0.8);
  }
  at(x, y){
    const cx = clamp((x / CFG.PITCH_L * this.nx) | 0, 0, this.nx - 1);
    const cy = clamp((y / CFG.PITCH_W * this.ny) | 0, 0, this.ny - 1);
    const i = (cy * this.nx + cx) * 3;
    return { mud: this.cells[i], wet: this.cells[i + 1], rough: this.cells[i + 2] };
  }
}

// live physics environment (set by Game.applyEnv before the first tick)
let ENV = {
  grass: GRASS_TYPES.classic, weather: WEATHER_TYPES.sunny,
  groundFr: CFG.BALL_FR_GROUND, skidFr: CFG.BALL_FR_SKID, bounce: CFG.BALL_BOUNCE,
  speedMul: 1, accelMul: 1, slideMul: 1, catchMod: 0, curveMul: 1,
  traction: 1, staminaMul: 1, wind: { x: 0, y: 0 },
  shadowA: 0.28, shadowDx: 2,
};

/* ---------------------------- STADIUM CONFIG ------------------------------- */
// Everything around the pitch is modular and swappable from here.
// Runtime keys: B cycles the stadium theme, U cycles crowd density.
const STADIUM = {
  theme: 'classic90s',      // 'local' | 'classic90s' | 'modern'
  crowdDensity: 0.85,       // 0..1 baseline seat occupancy
  awaySection: true,        // corner block of travelling away fans
  vipBox: true,             // directors box in the main stand
  adRotateSec: 7,           // seconds between sponsor rotations
  adSlideSec: 0.55,         // LED slide-transition duration
  sidelineDetail: 'full',   // 'off' | 'basic' (officials+benches) | 'full'
  wave: true,               // spontaneous mexican waves
  rivalry: 0.6,             // 0..1: how hostile the chants get
};
// Themes are StadiumBuilder BIASES now: size class, module preferences and a
// palette era. The actual stadium is assembled per match from modules.
const STADIUM_THEMES = {
  local: {
    label:'LOCAL GROUND', size:0, roofChance:0.3, terraceChance:0.8, corners:0.25,
    nearRows:[2,3], mainTiers:[[4,6]], floodlights:true, fence:true,
    treadA:'#4a5058', treadB:'#40464e', wall:'#5a5f66', roofCols:['#3a4038','#463f36'],
  },
  classic90s: {
    label:'CLASSIC 90S', size:1, roofChance:0.75, terraceChance:0.4, corners:0.8,
    nearRows:[3,5], mainTiers:[[6,8],[4,6]], floodlights:true, fence:false,
    treadA:'#464c55', treadB:'#3b414a', wall:'#565c64', roofCols:['#2c3138','#37424e','#4a3540'],
  },
  modern: {
    label:'MODERN ARENA', size:2, roofChance:1, terraceChance:0.1, corners:1,
    nearRows:[4,6], mainTiers:[[7,9],[5,7]], floodlights:false, fence:false,
    treadA:'#353b44', treadB:'#2c323a', wall:'#454c56', roofCols:['#20242a','#232c36'],
  },
};
// Fictional sponsor designs — add a descriptor here and it enters the rotation.
const AD_DESIGNS = [
  { bg:'#f0f0ea', fg:'#21315e', text:'PIXEL FC',     accent:'#d84a3a' },
  { bg:'#c8272d', fg:'#ffffff', text:'RETRO COLA',   accent:'#ffd23a', blink:true },
  { bg:'#123a6e', fg:'#ffffff', text:'ISO AIRWAYS',  accent:'#5ac2e8' },
  { bg:'#0f7a3a', fg:'#f4f4e8', text:'GOAL GUM',     accent:'#ffe24a' },
  { bg:'#1b1b20', fg:'#ffe24a', text:'TURBO BOOTS >> ', accent:'#ffe24a', scroll:true },
  { bg:'#f2e8d8', fg:'#7a3a12', text:'CANVAS BANK',  accent:'#7a3a12' },
  { bg:'#4a2a7a', fg:'#ffffff', text:'90s FM',       accent:'#e884d8', blink:true },
  { bg:'#e8e8e8', fg:'#22262c', text:'MOON TELECOM', accent:'#3a6ad8' },
];
const AD_W = 220, AD_H = 34; // sponsor design canvas size (stretched onto boards)
const adDesignCache = [];
function adDesign(i){
  let cv = adDesignCache[i];
  if (!cv){
    const d = AD_DESIGNS[i % AD_DESIGNS.length];
    cv = document.createElement('canvas'); cv.width = AD_W; cv.height = AD_H;
    const c = cv.getContext('2d');
    c.fillStyle = d.bg; c.fillRect(0, 0, AD_W, AD_H);
    c.fillStyle = d.accent || d.fg; c.fillRect(0, AD_H - 4, AD_W, 4);
    c.fillStyle = d.fg; c.textBaseline = 'middle';
    if (d.scroll){ c.font = 'bold 18px monospace'; c.textAlign = 'left'; c.fillText(d.text, 6, AD_H / 2 - 1); }
    else { c.font = 'bold 20px monospace'; c.textAlign = 'center'; c.fillText(d.text, AD_W / 2, AD_H / 2 - 1); }
    adDesignCache[i] = cv;
  }
  return cv;
}

/* ----------------------------- MATH UTILS -------------------------------- */
const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
const lerp  = (a, b, t) => a + (b - a) * t;
const dist  = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
const len   = v => Math.hypot(v.x, v.y);
const sub   = (a, b) => ({ x: a.x - b.x, y: a.y - b.y });
const add   = (a, b) => ({ x: a.x + b.x, y: a.y + b.y });
const scl   = (v, s) => ({ x: v.x * s, y: v.y * s });
function norm(v){ const l = len(v); return l < 1e-6 ? {x:0,y:0} : {x:v.x/l, y:v.y/l}; }
// FatigueEngine + StaminaModel: a continuous energy economy. Every stride,
// press, duel and acceleration is paid for; endurance (a.stamina) slows the
// drain and speeds recovery in quiet phases. Deterministic — no dice.
function fatigueStep(p, dt, game){
  const sp = len(p.vel), ms = Math.max(1e-3, p.maxSpeed());
  const rel = sp / ms;
  const endur = p.a.stamina;
  let cost = 0;
  if (rel > 0.85) cost += 0.011;        // flat-out sprint
  else if (rel > 0.6) cost += 0.005;    // strong running
  else if (rel > 0.3) cost += 0.0021;   // jogging
  // repeated hard accelerations cost extra
  const ax = (p.vel.x - p._pvx) / Math.max(dt, 1e-4);
  const ay = (p.vel.y - p._pvy) / Math.max(dt, 1e-4);
  if (Math.hypot(ax, ay) > 7 && rel > 0.25) cost += 0.0022;
  p._pvx = p.vel.x; p._pvy = p.vel.y;
  // pressing and tactical intensity are paid for
  if (p.duty === 'press' || p.duty === 'press2')
    cost += 0.0028 * (0.6 + p.team.tactics.pressing * 0.7);
  cost *= ENV.staminaMul * (1.35 - endur * 0.6) * (1 + Math.max(0, p.age - 29) * 0.03);
  // recovery during walks and dead balls; fit players refill faster
  let rec = 0;
  if (rel < 0.22) rec = (0.0012 + endur * 0.002) * (game.match.state === 'PLAYING' ? 1 : 2.4);
  p.stamina = clamp(p.stamina - (cost - rec) * dt * 2.1, 0.18, 1);
  // EnergyUI trend buffer: one sample every ~5 real seconds
  if (p._stamSampleT <= 0){
    p._stamSampleT = 5;
    p.stamHist.push(+p.stamina.toFixed(3));
    if (p.stamHist.length > 13) p.stamHist.shift();
  } else p._stamSampleT -= dt;
}
// one-off exertion: duels, tackles, leaps, strikes — scaled by strength
function exert(p, base){
  p.stamina = Math.max(0.18, p.stamina - base * (1.25 - p.a.strength * 0.5));
}
function gauss(){
  let u = 0, v = 0;
  while (u === 0) u = srand();
  while (v === 0) v = srand();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}
function turnToward(cur, target, maxStep){
  let d = target - cur;
  while (d >  Math.PI) d -= Math.PI * 2;
  while (d < -Math.PI) d += Math.PI * 2;
  return cur + clamp(d, -maxStep, maxStep);
}
// GoalNetPhysics impact state per goal end — read by the deformable net
const NET_FX = [null, null];
function mulberry32(seed){
  return function(){
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
/* ------------------------ DETERMINISTIC RANDOM ----------------------------- */
// DeterministicRandom: every SIMULATION die goes through srand() — one seeded
// stream whose state can be captured and restored, the backbone of match
// recording, strict script replay and broadcast goal replays. Cosmetic code
// (stadium crowd, weather particles, commentary phrasing) keeps Math.random,
// so nothing render-side can ever desync the sim.
const RNG = {
  s: 1,
  seed(v){ this.s = (v | 0) || 1; },
  state(){ return this.s; },
  restore(v){ this.s = v | 0; },
};
function srand(){
  RNG.s |= 0; RNG.s = RNG.s + 0x6D2B79F5 | 0;
  let t = Math.imul(RNG.s ^ RNG.s >>> 15, 1 | RNG.s);
  t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
  return ((t ^ t >>> 14) >>> 0) / 4294967296;
}

/* -------------------------- ISO PROJECTION ------------------------------- */
// World: x along pitch length (0..105), y across width (0..68), z = height.
function project(x, y, z){
  return {
    x: (x - y) * CFG.SCALE,
    y: (x + y) * CFG.SCALE * CFG.ISO - (z || 0) * CFG.SCALE * CFG.Z_PX,
  };
}
const depthOf = (x, y) => x + y;
// facing angle (world) -> screen octant 0=E 1=SE 2=S 3=SW 4=W 5=NW 6=N 7=NE
function screenOct(facing){
  const sdx = Math.cos(facing) - Math.sin(facing);
  const sdy = (Math.cos(facing) + Math.sin(facing)) * 0.5;
  const a = Math.atan2(sdy, sdx);
  return ((Math.round(a / (Math.PI / 4)) % 8) + 8) % 8;
}

/* ------------------------------- INPUT ----------------------------------- */
class Input {
  constructor(){
    this.down = {};
    this.spaceT = 0; this.shiftT = 0;
    this.passReleased = null;
    this.shootReleased = null;
    this.pressedOnce = {};
    this.textHandler = null; // when set, keystrokes go to the coach console
    addEventListener('keydown', e => {
      if (this.textHandler){
        if (e.metaKey || e.ctrlKey || e.altKey) return; // let browser shortcuts through
        e.preventDefault(); this.textHandler(e); return;
      }
      if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
      if (!this.down[e.code]) {
        this.pressedOnce[e.code] = true;
        if (e.code === 'Space') this.spaceT = performance.now();
        if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') this.shiftT = performance.now();
      }
      this.down[e.code] = true;
    });
    addEventListener('keyup', e => {
      if (e.code === 'Space' && this.down[e.code])
        this.passReleased = clamp((performance.now() - this.spaceT) / 700, 0.18, 1);
      if ((e.code === 'ShiftLeft' || e.code === 'ShiftRight') && this.down[e.code])
        this.shootReleased = clamp((performance.now() - this.shiftT) / 700, 0.25, 1);
      this.down[e.code] = false;
    });
  }
  once(code){ if (this.pressedOnce[code]) { this.pressedOnce[code] = false; return true; } return false; }
  moveDir(){
    let sx = 0, sy = 0;
    if (this.down['ArrowLeft']  || this.down['KeyA']) sx -= 1;
    if (this.down['ArrowRight'] || this.down['KeyD']) sx += 1;
    if (this.down['ArrowUp']    || this.down['KeyW']) sy -= 1;
    if (this.down['ArrowDown']  || this.down['KeyS']) sy += 1;
    if (!sx && !sy) return null;
    return norm({ x: sx + sy, y: sy - sx }); // screen arrows -> iso world axes
  }
  chargingPass(){ return this.down['Space'] ? clamp((performance.now() - this.spaceT) / 700, 0.18, 1) : 0; }
  chargingShot(){ return (this.down['ShiftLeft']||this.down['ShiftRight']) ? clamp((performance.now() - this.shiftT) / 700, 0.25, 1) : 0; }
}

/* -------------------------------- BALL ----------------------------------- */
class Ball {
  constructor(){ this.reset(); }
  reset(){
    this.x = CFG.PITCH_L / 2; this.y = CFG.PITCH_W / 2;
    this.z = 0.11; this.vx = 0; this.vy = 0; this.vz = 0;
    this.spin = 0;
    this.controller = null;
    this.holder = null;
    this.intendedReceiver = null;
    this.lastToucher = null; this.lastTouchTeam = null;
    this.isShot = false; this.flightT = 0;
    this.px = this.x; this.py = this.y; this.pz = this.z;
    this.roll = 0;
    this.spinZ = 0; this.inNet = false;
    this.trail = [];
  }
  speed(){ return Math.hypot(this.vx, this.vy); }
  update(dt){
    if (this.holder){
      const k = this.holder;
      this.x = k.pos.x + Math.cos(k.facing) * 0.4;
      this.y = k.pos.y + Math.sin(k.facing) * 0.4;
      this.z = 1.0; this.vx = this.vy = this.vz = 0; this.spin = 0;
      this.px = this.x; this.py = this.y; this.pz = this.z;
      return;
    }
    this.px = this.x; this.py = this.y; this.pz = this.z;
    this.flightT += dt;
    // Magnus: spin curves the flight path sideways
    const sp = this.speed();
    if (sp > 2 && Math.abs(this.spin) > 0.05 && this.z > 0.2){
      const curve = CFG.BALL_SPIN_CURVE * ENV.curveMul;
      const ax = -this.vy / sp * this.spin * sp * curve;
      const ay =  this.vx / sp * this.spin * sp * curve;
      this.vx += ax * dt; this.vy += ay * dt;
    }
    // BallSpinSystem: vertical spin — backspin floats and checks, topspin
    // dips the ball down before gravity finishes the job
    if (Math.abs(this.spinZ || 0) > 0.05 && sp > 3 && this.z > 0.2){
      this.vz += this.spinZ * sp * 0.016 * dt * ENV.curveMul;
      this.spinZ *= 1 - dt * 0.22;
    }
    this.vz -= CFG.GRAV * dt;
    // WindPhysics: aerial balls drift with the match wind
    if (this.z > 0.5){ this.vx += ENV.wind.x * dt * 0.22; this.vy += ENV.wind.y * dt * 0.22; }
    this.x += this.vx * dt; this.y += this.vy * dt; this.z += this.vz * dt;
    const cell = SURFACE ? SURFACE.at(this.x, this.y) : null;
    if (this.z <= 0.11){
      this.z = 0.11;
      if (this.vz < -1.2){
        // SurfacePhysicsModifier: mud deadens, rough ground kicks it sideways
        let rest = ENV.bounce;
        const chk = clamp(this.spinZ || 0, -2.5, 2.5);
        if (chk > 0.1){ this.vx *= 1 - chk * 0.07; this.vy *= 1 - chk * 0.07; } // backspin checks
        else if (chk < -0.1){ this.vx *= 1 + Math.min(0.1, -chk * 0.045); this.vy *= 1 + Math.min(0.1, -chk * 0.045); } // topspin runs on
        this.spinZ = (this.spinZ || 0) * 0.5;
        if (cell){
          rest *= 1 - cell.mud * 0.45;
          if (cell.rough > 0.25){
            this.vx += gauss() * cell.rough * 1.6;
            this.vy += gauss() * cell.rough * 1.6;
            rest *= 1 + gauss() * cell.rough * 0.2;
          }
        }
        this.vz = -this.vz * clamp(rest, 0.1, 0.9);
        this.vx *= 0.85; this.vy *= 0.85; this.spin *= 0.6;
      } else this.vz = 0;
    }
    // friction / drag: surface & weather set how the ball skids and rolls
    const grounded = this.z <= 0.12 && Math.abs(this.vz) < 0.5;
    let k = grounded ? (sp > 11 ? ENV.skidFr : ENV.groundFr) : CFG.BALL_FR_AIR;
    if (grounded && cell){
      k *= 1 + cell.mud * 1.3;                       // mud grabs the ball
      if (cell.wet > 0.6){                           // puddles nearly stop it
        k *= 2.0;
        if (sp > 3 && srand() < dt * 6){ this.vx += gauss() * 0.8; this.vy += gauss() * 0.8; }
      } else if (cell.wet > 0.2 && sp > 8) k *= 0.75; // wet grass zips
    }
    const f = Math.exp(-k * dt);
    this.vx *= f; this.vy *= f;
    if (grounded){
      const s2 = this.speed();
      if (s2 < 3){ const dec = Math.min(s2, 1.6 * dt); if (s2 > 1e-4){ this.vx -= this.vx / s2 * dec; this.vy -= this.vy / s2 * dec; } }
      if (this.speed() < 0.12){ this.vx = 0; this.vy = 0; this.spin = 0; }
      this.roll += this.speed() * dt;
    }
    const s3 = this.speed();
    if (s3 > 55){ this.vx *= 55 / s3; this.vy *= 55 / s3; }
    // ghost trail for fast balls
    this.trail.unshift({ x: this.x, y: this.y, z: this.z });
    if (this.trail.length > 4) this.trail.pop();
    this.collideGoalFrame();
  }
  collideGoalFrame(){
    for (const gx of [0, CFG.PITCH_L]){
      // posts: capsule test against this frame's movement segment (no tunneling)
      for (const py of [34 - CFG.GOAL_W/2, 34 + CFG.GOAL_W/2]){
        if (this.z < CFG.GOAL_H + 0.1){
          const dx = this.x - this.px, dy = this.y - this.py;
          const L2 = dx * dx + dy * dy;
          let t = L2 > 1e-9 ? ((gx - this.px) * dx + (py - this.py) * dy) / L2 : 0;
          t = clamp(t, 0, 1);
          const cx = this.px + dx * t, cy = this.py + dy * t;
          if (Math.hypot(cx - gx, cy - py) < 0.22){
            const nd = Math.hypot(this.x - gx, this.y - py);
            const nx = nd > 1e-4 ? (this.x - gx) / nd : 1;
            const ny = nd > 1e-4 ? (this.y - py) / nd : 0;
            const dot = this.vx * nx + this.vy * ny;
            if (dot < 0){ this.vx -= 1.55 * dot * nx; this.vy -= 1.55 * dot * ny; }
            this.vx *= 0.7; this.vy *= 0.7;
            this.x = gx + nx * 0.24; this.y = py + ny * 0.24;
          }
        }
      }
      // crossbar: interpolate the goal-plane crossing at bar height
      if ((this.px - gx) * (this.x - gx) < 0 || Math.abs(this.x - gx) < 0.2){
        const denom = this.x - this.px;
        const t = Math.abs(denom) > 1e-9 ? clamp((gx - this.px) / denom, 0, 1) : 0;
        const yc = this.py + (this.y - this.py) * t;
        const zc = this.pz + (this.z - this.pz) * t;
        if (Math.abs(yc - 34) < CFG.GOAL_W/2 + 0.2 && Math.abs(zc - CFG.GOAL_H) < 0.22){
          if ((gx === 0 && this.vx < 0) || (gx === CFG.PITCH_L && this.vx > 0)){
            this.vx = -this.vx * 0.55;
            this.x = this.px; // bounce back in front of the bar
          }
          this.vz = -Math.abs(this.vz) * 0.4 - 1;
        }
      }
      const behind = gx === 0 ? -this.x : this.x - CFG.PITCH_L;
      if (behind > 0.4 && Math.abs(this.y - 34) < CFG.GOAL_W/2 + 0.4 && this.z < CFG.GOAL_H + 0.2){
        // GoalNetPhysics: the FIRST mesh contact is physical — the net takes
        // the ball's momentum, rings around the impact point, and throws a
        // damped rebound back into the goalmouth. Slow rollers just settle.
        if (!this.inNet){
          this.inNet = true;
          const spd = Math.hypot(this.vx, this.vy, this.vz);
          const surf = this.z > CFG.GOAL_H - 0.35 ? 'roof'
            : (Math.abs(this.y - 34) > CFG.GOAL_W / 2 - 0.55 ? 'side' : 'back');
          NET_FX[gx === 0 ? 0 : 1] = { at: (typeof game !== 'undefined' ? game.animT : 0),
            y: this.y, z: Math.min(this.z, CFG.GOAL_H - 0.1), power: Math.min(1, spd / 24), surf };
          if (spd > 7){ this.vx *= -0.22; this.vy *= 0.45; this.vz *= 0.35; }
          else { this.vx *= 0.6; this.vy *= 0.6; }
          this.spin = 0; this.spinZ = 0;
        } else { this.vx *= 0.72; this.vy *= 0.72; }
        if (behind > 1.7){ const cap = gx === 0 ? -1.7 : CFG.PITCH_L + 1.7; this.x = cap; this.vx = 0; }
      } else if (behind < 0.2 && this.inNet) this.inNet = false;
    }
  }
}

// Every action has a distinct procedurally drawn pixel figure. Sprites are
// rendered once per (appearance, action, frame, octant) into a lazy cache,

const SPR_W = 40, SPR_H = 46, SPR_AX = 20, SPR_AY = 40; // anchor: bottom-center feet

function getSprite(app, action, frame, oct){
  const key = app.id + '|' + action + '|' + frame + '|' + oct;
  let s = spriteCache.get(key);
  if (!s){
    s = document.createElement('canvas');
    s.width = Math.ceil(SPR_W * SPR_UNIT * SPR_DPR);
    s.height = Math.ceil(SPR_H * SPR_UNIT * SPR_DPR);
    const c = s.getContext('2d');
    c.scale(SPR_UNIT * SPR_DPR, SPR_UNIT * SPR_DPR);
    renderPose(c, app, action, frame, oct);

  }

}

  flagup:    { frames:2, cyclic:true, clock:'time', fn: f => ({
    legL:{dx:-1}, legR:{dx:1}, armL:{m:'down'}, armR:{m:'up',v:2}, headDy: f?0:-1 }) },
  point:     { frames:1, fn: () => ({
    legL:{dx:-1}, legR:{dx:2}, lean:1, armL:{m:'down'}, armR:{m:'out',v:3} }) },
  clap:      { frames:2, cyclic:true, clock:'time', fn: f => ({
    legL:{dx:-1}, legR:{dx:1}, armL:{m:'out',v:f?1:2}, armR:{m:'out',v:f?2:1} }) },
  card_y:    { frames:1, fn: () => ({
    legL:{dx:-1}, legR:{dx:1}, armL:{m:'down'}, armR:{m:'up',v:2}, headDy:-1 }) },
  card_r:    { frames:1, fn: () => ({
    legL:{dx:-1}, legR:{dx:1}, armL:{m:'down'}, armR:{m:'up',v:2}, headDy:-1 }) },
  stretch:   { frames:2, cyclic:true, clock:'time', fn: f => ({
    legL:{dx:-3}, legR:{dx:3}, armL:{m: f ? 'up' : 'out', v:2}, armR:{m: f ? 'out' : 'up', v:2}, headDy: f ? 0 : -1 }) },
  board:     { frames:1, fn: () => ({
    legL:{dx:-1}, legR:{dx:1}, armL:{m:'up',v:1}, armR:{m:'up',v:1}, headDy:-1 }) },
};
function renderPose(c, app, action, frame, oct){
  const aspect = OCT_ASPECT[oct], flip = OCT_FLIP[oct];
  const def = POSES[action] || POSES.idle;
  const cfg = def.fn(Math.min(frame, def.frames - 1), aspect) || {};
  c.save();
  if (flip){ c.translate(SPR_AX * 2, 0); c.scale(-1, 1); }
  const gy = SPR_AY + (cfg.dy || 0);
  if (cfg.rot){
    c.translate(SPR_AX, gy - 4); c.rotate(cfg.rot); c.translate(-SPR_AX, -(gy - 4));
  }
  const lean = cfg.lean || 0;
  const R = (x, y, w, h, col) => { c.fillStyle = col; c.fillRect(Math.round(x), Math.round(y), w, h); };
  // legs: sock-colored, dark boots
  const drawLeg = (bx, l) => {
    const lift = l.lift || 0, dx = l.dx || 0;
    R(SPR_AX + bx + dx, gy - 4, 2, 4 - lift, app.socks);
    R(SPR_AX + bx + dx, gy - 1 - lift, 2, 1, '#1c1410');
  };
  drawLeg(-3, cfg.legL || {});
  drawLeg( 1, cfg.legR || {});
  // shorts + torso (side aspect is narrower)
  const tw = aspect === 'side' ? 4 : 6;
  const tx = SPR_AX - tw / 2 + lean;
  R(tx, gy - 6, tw, 2, app.shorts);
  R(tx, gy - 10, tw, 4, app.shirt);
  if (aspect === 'front' && app.trim) R(SPR_AX - 1 + lean, gy - 10, 1, 4, app.trim);
  // arms
  const shoulderY = gy - 10;
  const drawArm = (side, a) => {
    if (!a) a = { m:'down' };
    const sx = SPR_AX + lean + (side < 0 ? -tw/2 - 1 : tw/2);
    if (a.m === 'down'){ R(sx, shoulderY, 1, 3, app.shirt); R(sx, shoulderY + 3, 1, 1, app.skin); }
    else if (a.m === 'swing'){ const v = a.v || 0; R(sx + v * 0.7, shoulderY + (Math.abs(v) > 1 ? 0 : 1), 1, 3, app.shirt); R(sx + v * 0.7, shoulderY + 3, 1, 1, app.skin); }
    else if (a.m === 'out'){ const w = 2 + (a.v || 1); R(side < 0 ? sx - w + 1 : sx, shoulderY + 1, w, 1, app.shirt); R(side < 0 ? sx - w + 1 : sx + w - 1, shoulderY + 1, 1, 1, app.skin); }
    else if (a.m === 'up'){ const h = 3 + (a.v || 0); R(sx, shoulderY - h, 1, h, app.shirt); R(sx, shoulderY - h - 1, 1, 1, app.skin); }
    else if (a.m === 'hug'){ R(SPR_AX - 2 + lean, shoulderY + 1 + (side < 0 ? 0 : 1), 5, 1, app.skin); }
  };
  drawArm(-1, cfg.armL);
  drawArm( 1, cfg.armR);
  // head + hair (back aspect shows more hair, no face row)
  const hx = SPR_AX - 2 + (cfg.headDx || 0) + lean;
  const hy = gy - 13 + (cfg.headDy || 0);
  R(hx, hy, 4, 3, app.skin);
  if (aspect === 'back') R(hx, hy - 1, 4, 3, app.hair);
  else R(hx, hy - 1, 4, 1, app.hair);
  // referee's card, held high
  if (action === 'card_y' || action === 'card_r'){
    R(SPR_AX + lean + tw / 2 + 1, shoulderY - 10, 3, 4, action === 'card_y' ? '#ffd23a' : '#e83a2a');
  }
  // role props: flags, stills cameras, TV cameras (clothing + posture do the rest)
  if (app.prop === 'flag'){
    if (action === 'flagup'){
      const fx = SPR_AX + lean + tw / 2 + 1;
      R(fx, shoulderY - 9, 1, 6, '#d8d0b8');
      R(fx + 1, shoulderY - 9, 4, 3, '#e8c23a');
      R(fx + 1, shoulderY - 9, 2, 3, '#d84a3a');
    } else {
      R(SPR_AX + lean + tw / 2 + 1, gy - 8, 1, 5, '#d8d0b8');
      R(SPR_AX + lean + tw / 2 + 2, gy - 6, 3, 2, '#d84a3a');
    }
  }
  if (app.prop === 'camera'){
    if (action === 'shoot_cam'){
      R(SPR_AX + lean + 2, gy - 13, 4, 3, '#181b20');
      R(SPR_AX + lean + 6, gy - 12, 2, 1, '#0a0c0f');
    } else {
      R(SPR_AX + lean - 5, gy - 7, 3, 2, '#181b20');
    }
  }
  if (app.prop === 'tvcam'){
    R(SPR_AX + 2, gy - 16, 7, 4, '#22262c');
    R(SPR_AX + 9, gy - 15, 2, 2, '#0d0f12');
    R(SPR_AX + 4, gy - 12, 1, 12, '#33383f');
    R(SPR_AX + 2, gy - 2, 1, 2, '#33383f'); R(SPR_AX + 7, gy - 2, 1, 2, '#33383f');
  }
  c.restore();
}

/* ------------------- PLAYER RARITY & MARKET VALUE -------------------------- */
// Collectible-style economy (internal stat only — no chain logic yet).
const RARITY = {
  common:    { label:'COMMON',    col:'#9aa4ae', mul:1   },
  uncommon:  { label:'UNCOMMON',  col:'#5ac26a', mul:1.6 },
  rare:      { label:'RARE',      col:'#4a9ae8', mul:2.6 },
  epic:      { label:'EPIC',      col:'#a86ae8', mul:5   },
  legendary: { label:'LEGENDARY', col:'#e8b53a', mul:11  },
};
function rollRarity(rng){
  const r = rng();
  return r < 0.015 ? 'legendary' : r < 0.07 ? 'epic' : r < 0.2 ? 'rare' : r < 0.45 ? 'uncommon' : 'common';
}
// PlayerMarketValue: ability curve x position x age x rarity x form/potential,
// tuned to collectible-friendly ETH ranges (0.01 floor, 3.0 legend ceiling).
function baseMarketValue(p){
  const ovr = p.rating() / 99;
  const posMul = { GK: 0.9, DEF: 0.95, MID: 1.05, ATT: 1.15 }[p.line] || 1;
  const ageMul = p.age <= 23 ? 1.15 : p.age <= 28 ? 1.0 : 0.8;
  const core = 0.014 * Math.pow(ovr / 0.52, 5); // steep: stars are worth chasing
  return clamp(core * posMul * ageMul * RARITY[p.rarity].mul * p.form * p.potential, 0.01, 3);
}
// PostMatchValueUpdate: small, believable drift from real match contribution.
// age influences development: youth grows on form, veterans hold value
function ageGrowth(p){ return p.age < 23 ? 1.6 : (p.age < 27 ? 1.15 : (p.age > 31 ? 0.6 : 1)); }
function postMatchValueUpdate(game){
  for (const team of game.teams){
    for (const p of [...team.players, ...team.bench, ...team.offList]){
      const s = p.stats;
      const played = s.distance > 50;
      const perf = played ? (matchRating(p) - 6.15) * 0.02 : -0.002; // unused = tiny decay
      const delta = clamp(perf + s.goals * 0.015 + s.assists * 0.01 + s.saves * 0.004
        - s.red * 0.03 - s.yellow * 0.004, -0.08, 0.12);
      p.valueDelta = delta;
      p.form = clamp(p.form + delta * 0.4, 0.75, 1.3);
      p.value = clamp(p.value * (1 + delta), 0.01, 3);
    }
  }
}

/* ---------------------------- PLAYER STATS --------------------------------- */
// Live per-player match statistics; every real event updates these.
function makeStats(){
  return { goals:0, assists:0, shots:0, shotsOn:0, passAtt:0, passCmp:0,
    tackAtt:0, tackWon:0, interceptions:0, foulsC:0, foulsS:0,
    yellow:0, red:0, saves:0, distance:0, touches:0,
    clears:0, possLost:0, chancesCreated:0 };
}
// Simple contribution-based match rating (6.0 baseline, clamped 3..10).
function matchRating(p){
  const s = p.stats;
  const r = 6
    + s.goals * 1.2 + s.assists * 0.8 + s.shotsOn * 0.12
    + s.passCmp * 0.02 - Math.max(0, s.passAtt - s.passCmp) * 0.03
    + s.tackWon * 0.2 - Math.max(0, s.tackAtt - s.tackWon) * 0.05
    + s.interceptions * 0.12 + s.saves * 0.3
    - s.foulsC * 0.15 - s.yellow * 0.3 - s.red * 1.5;
  return clamp(r, 3, 10);
}

const SKIN = ['#e8b48c','#d19a6b','#c98d5f','#8d5a3b','#6b4226','#f0c8a0'];
const HAIR = ['#1a1512','#3a2a18','#5c4326','#8a6a3a','#c9a55a','#222831'];
// NationalityDatabase: gameplay identity, not decoration — age curves and
// development read it, and every profile/token displays code + emoji flag.
const NATIONS = [
  ['AR','🇦🇷'],['BR','🇧🇷'],['ES','🇪🇸'],['FR','🇫🇷'],['DE','🇩🇪'],['IT','🇮🇹'],['EN','🏴󠁧󠁢󠁥󠁮󠁧󠁿'],['PT','🇵🇹'],
  ['NL','🇳🇱'],['BE','🇧🇪'],['UY','🇺🇾'],['CO','🇨🇴'],['MX','🇲🇽'],['US','🇺🇸'],['JP','🇯🇵'],['KR','🇰🇷'],
  ['NG','🇳🇬'],['SN','🇸🇳'],['GH','🇬🇭'],['CI','🇨🇮'],['MA','🇲🇦'],['HR','🇭🇷'],['PL','🇵🇱'],['SE','🇸🇪'],
];
const SYL1 = ['Bra','Kel','Dor','Var','Mal','Tor','Ren','Sil','Gar','Ost','Fen','Cal','Dun','Hol','Mar','Vin','Lom','Ash','Ber','Cro'];
const SYL2 = ['son','ric','dan','ver','tos','ley','mar','den','ski','vic','ham','ford','ini','ero','ano','berg','sen','wick','ras','oni'];
function makeName(rng){
  const f = 'ABCDEFGHJKLMNPRSTV'[Math.floor(rng() * 18)];
  return f + '. ' + SYL1[Math.floor(rng() * SYL1.length)] + SYL2[Math.floor(rng() * SYL2.length)];
}

class Player {
  constructor(team, slot, idx, rng){
    this.team = team; this.slot = slot; this.role = slot.role;
    this.line = ROLE_LINE[this.role]; this.isGK = this.role === 'GK';
    this.num = idx + 1; this.name = makeName(rng);
    this.pid = (team.idx === 0 ? 'home' : 'away') + '_' + this.num; // stable script/replay id
    this.a = {};
    const t = ROLE_TMPL[this.role];
    for (const k in t) this.a[k] = clamp(t[k] + (rng() - 0.5) * 0.22, 0.1, 0.97);
    this.foot = rng() < 0.75 ? 1 : -1;
    const kit = this.isGK ? team.gkKit : team.kit;
    const skinI = Math.floor(rng() * SKIN.length);
    const hairI = Math.floor(rng() * HAIR.length);
    this.app = {
      // id encodes everything the sprite pixels depend on, so the cache
      // stays correct across match resets
      id: 't' + team.idx + (this.isGK ? 'g' : 'p') + idx + 's' + skinI + 'h' + hairI,
      shirt: kit.shirt, shorts: kit.shorts, socks: kit.socks, trim: kit.trim || null,
      skin: SKIN[skinI],
      hair: HAIR[hairI],
    };
    this.pos = { x: 0, y: 0 }; this.vel = { x: 0, y: 0 };
    this.facing = 0; this.runPhase = 0; this.stamina = 1;
    this._pvx = 0; this._pvy = 0; this._stamSampleT = 0; this.stamHist = [];
    this.target = { x: 0, y: 0 }; this.speedWish = 0.6;
    this.duty = 'position'; this.decision = { type: 'dribble' };
    this.thinkT = srand() * 0.15; this.decideT = 0;
    this.kickCooldown = 0; this.touchCd = 0; this.tackleCd = 0;
    this.slowT = 0; this.blockCd = 0; this.holdT = 0; this.holdCd = 0;
    this.diving = false;
    this.action = 'idle'; this.actionT = 0; this.actionDur = 1;
    this.slideHit = false;
    this.stats = makeStats();
    this.glanceT = 0;
    // collectible identity: age, rarity (lifts ability), potential, form, value
    this.age = 18 + Math.floor(rng() * 17);
    // PlayerIdentity: nationality + physique
    const nat = NATIONS[(rng() * NATIONS.length) | 0];
    this.nat = nat[0]; this.flag = nat[1];
    this.heightCm = Math.round(168 + rng() * 22 + (this.role === 'GK' || this.role === 'CB' ? 6 : 0));
    this.weightKg = Math.round(this.heightCm * 0.42 + rng() * 8);
    // age curve: physical peak ~26, veterans trade legs for brains
    const ageD = this.age - 26;
    this.a.pace = clamp(this.a.pace - Math.max(0, ageD) * 0.012 - Math.max(0, -ageD - 4) * 0.008, 0.1, 0.97);
    this.a.accel = clamp(this.a.accel - Math.max(0, ageD) * 0.01, 0.1, 0.97);
    this.a.composure = clamp(this.a.composure + Math.max(0, ageD) * 0.010 - Math.max(0, -ageD - 3) * 0.012, 0.1, 0.97);
    this.a.positioning = clamp(this.a.positioning + Math.max(0, ageD) * 0.008, 0.1, 0.97);
    this.rarity = rollRarity(rng);
    const lift = { common: 0, uncommon: 0.02, rare: 0.04, epic: 0.06, legendary: 0.09 }[this.rarity];
    if (lift) for (const k in this.a) this.a[k] = clamp(this.a[k] + lift, 0.1, 0.99);
    this.potential = clamp(1.18 - (this.age - 18) * 0.018 + rng() * 0.14, 0.8, 1.3);
    this.form = 0.9 + rng() * 0.2;
    this.value = baseMarketValue(this);
    this.valueDelta = 0;
  }
  setAction(name, dur){ this.action = name; this.actionT = dur; this.actionDur = dur; }
  maxSpeed(){
    const stam = 0.72 + 0.28 * this.stamina;
    return (CFG.PLAYER_BASE_SPEED + this.a.pace * 3.5) * stam * ENV.speedMul * (this.slowT > 0 ? 0.45 : 1);
  }
  rating(){
    const a = this.a;
    return Math.round(((a.pace+a.passing+a.shooting+a.tackling+a.dribbling+a.vision+a.positioning+a.composure)/8) * 99);
  }
  update(dt, game){
    this.kickCooldown = Math.max(0, this.kickCooldown - dt);
    this.touchCd = Math.max(0, this.touchCd - dt);
    this.tackleCd = Math.max(0, this.tackleCd - dt);
    this.slowT = Math.max(0, this.slowT - dt);
    this.blockCd = Math.max(0, this.blockCd - dt);
    this.holdCd = Math.max(0, this.holdCd - dt);
    this.actionT = Math.max(0, this.actionT - dt);
    this.callT = Math.max(0, (this.callT || 0) - dt);
    this.wallJumpT = Math.max(0, (this.wallJumpT || 0) - dt);
    const busy = this.actionT > 0 && (this.action === 'slide' || this.action === 'fall');
    if (busy){
      // committed to the ground: no steering, just decelerate
      // (a wet pitch lets slides travel much farther)
      const k = this.action === 'slide' ? 1.3 / ENV.slideMul : 4.5;
      const f = Math.exp(-k * dt);
      this.vel.x *= f; this.vel.y *= f;
    } else {
      const ms = this.maxSpeed();
      const toT = sub(this.target, this.pos);
      const d = len(toT);
      let want = { x: 0, y: 0 };
      if (d > 0.05){
        const spd = Math.min(ms * this.speedWish, d * 3.2);
        want = scl(toT, spd / d);
      }
      const scell = SURFACE ? SURFACE.at(this.pos.x, this.pos.y) : null;
      const grip = ENV.traction * (scell ? 1 - scell.mud * 0.3 - scell.wet * 0.15 : 1);
      const acc = (CFG.PLAYER_BASE_ACCEL + this.a.accel * 9) * ENV.accelMul * grip * (this.slowT > 0 ? 0.4 : 1)
      * (0.72 + 0.28 * this.stamina); // heavy legs accelerate late
      const dv = sub(want, this.vel);
      const dl = len(dv);
      if (dl > 1e-5){
        const step = Math.min(dl, acc * dt);
        this.vel = add(this.vel, scl(dv, step / dl));
      }
      const sp = len(this.vel);
      if (sp > 0.4) this.facing = turnToward(this.facing, Math.atan2(this.vel.y, this.vel.x), CFG.TURN_RATE * dt);
      // brief glance toward the dugout after a coach instruction
      if (this.glanceT > 0){
        this.glanceT -= dt;
        if (sp < 2.5) this.facing = turnToward(this.facing, Math.atan2(-2 - this.pos.y, 52.5 - this.pos.x), 6 * dt);
      }
    }
    this.pos.x = clamp(this.pos.x + this.vel.x * dt, -3, CFG.PITCH_L + 3);
    this.pos.y = clamp(this.pos.y + this.vel.y * dt, -3, CFG.PITCH_W + 3);
    const sp = len(this.vel);
    fatigueStep(this, dt, game);
    this.runPhase += sp * dt;
    this.stats.distance += sp * dt;
    if (this.actionT <= 0) this.deriveAction(game);
  }
  deriveAction(game){
    const ball = game.ball;
    if (ball.holder === this){ this.action = 'gk_catch'; return; }
    const sp = len(this.vel);
    if (ball.controller === this){
      if (sp > 1){ this.action = 'dribble'; return; }
      this.action = this.decision && this.decision.type === 'shield' ? 'shield' : 'idle';
      return;
    }
    if (this.isGK){
      const gx = this.team.ownGoalX();
      if (sp < 1.2 && Math.abs(ball.x - gx) < 32 && Math.abs(this.pos.x - gx) < 8){ this.action = 'gk_ready'; return; }
    }
    this.action = sp < 0.6 ? 'idle' : (sp < 4.8 ? 'jog' : 'sprint');
  }
}

/* ------------------------------- REFEREE ---------------------------------- */
// Follows a classic diagonal, keeps ~10-14m from the ball, avoids the ball
// path, sprints to fouls and signals with a raised arm.
class Referee {
  constructor(){
    this.pos = { x: 52.5, y: 22 }; this.vel = { x: 0, y: 0 };
    this.facing = 0; this.runPhase = 0;
    this.action = 'idle'; this.actionT = 0; this.actionDur = 1;
    this.target = { x: 52.5, y: 22 };
    this.app = { id:'ref', shirt:'#2a2a30', shorts:'#2a2a30', socks:'#2a2a30', trim:null, skin:SKIN[1], hair:'#1a1512' };
  }
  setAction(name, dur){ this.action = name; this.actionT = dur; this.actionDur = dur; }
  think(game){
    if (this.signalT > 0) return; // heading to the foul spot
    const b = game.ball;
    // nearest point on the (0,68)->(105,0) diagonal, pulled 30% toward the ball
    const t = clamp((b.x / CFG.PITCH_L + 1 - b.y / CFG.PITCH_W) / 2, 0.08, 0.92);
    let tx = lerp(t * CFG.PITCH_L, b.x, 0.3);
    let ty = lerp(CFG.PITCH_W - t * CFG.PITCH_W, b.y, 0.3);
    // never crowd the ball
    const d = dist(this.pos, b);
    if (d < 7){
      const away = norm(sub(this.pos, b));
      tx = this.pos.x + away.x * 6; ty = this.pos.y + away.y * 6;
    }
    // sidestep fast incoming ball
    if (b.speed() > 10){
      const toRef = sub(this.pos, b);
      const bd = norm({ x: b.vx, y: b.vy });
      const along = toRef.x * bd.x + toRef.y * bd.y;
      if (along > 0 && along < 14){
        const perp = Math.abs(toRef.x * -bd.y + toRef.y * bd.x);
        if (perp < 2.5){ tx = this.pos.x - bd.y * 4; ty = this.pos.y + bd.x * 4; }
      }
    }
    this.target = { x: clamp(tx, 2, CFG.PITCH_L - 2), y: clamp(ty, 2, CFG.PITCH_W - 2) };
  }
  signal(spot){
    this.setAction('whistle', 1.4);
    this.signalT = 1.4;
    this.target = { x: clamp(spot.x, 2, 103), y: clamp(spot.y + 4, 2, 66) };
  }
  showCard(kind){
    this.setAction(kind === 'y' ? 'card_y' : 'card_r', 1.8);
    this.signalT = Math.max(this.signalT || 0, 1.8);
  }
  update(dt, game){
    this.actionT = Math.max(0, this.actionT - dt);
    this.signalT = Math.max(0, (this.signalT || 0) - dt);
    const ms = 7.6;
    const toT = sub(this.target, this.pos);
    const d = len(toT);
    let want = { x: 0, y: 0 };
    if (d > 0.4) want = scl(toT, Math.min(ms, d * 2.5) / d);
    const dv = sub(want, this.vel);
    const dl = len(dv);
    if (dl > 1e-5){ const step = Math.min(dl, 10 * dt); this.vel = add(this.vel, scl(dv, step / dl)); }
    this.pos.x = clamp(this.pos.x + this.vel.x * dt, 0, CFG.PITCH_L);
    this.pos.y = clamp(this.pos.y + this.vel.y * dt, 0, CFG.PITCH_W);
    const sp = len(this.vel);
    if (sp > 0.4) this.facing = turnToward(this.facing, Math.atan2(this.vel.y, this.vel.x), 8 * dt);
    this.runPhase += sp * dt;
    if (this.actionT <= 0) this.action = sp < 0.6 ? 'idle' : (sp < 4.5 ? 'jog' : 'sprint');
  }
}

/* ------------------------ STADIUM & SIDELINE WORLD ------------------------- */
// Modular environment assets. Nothing in here influences the simulation:
//   StandModule   — one modular grandstand piece; StadiumBuilder assembles them
//   CrowdSection  — a block of fans, animated via pre-rendered frame swapping
//   AdBoard       — one perimeter panel; groups rotate fictional sponsors
//   SidelineActor — linesmen, photographers, TV crews, bench staff, stewards
//   Stadium       — owns everything, reacts to match events, draws in 2 passes
const CROWD_PALETTE = ['#c9c2b8','#a83a3a','#3a5aa8','#d8c25a','#7a4a8a','#4a8a5a','#b8735a','#d8d8e0','#5ac2c9','#8a8a92','#d87a3a','#e8e0d0'];

// A block of individually generated fans. Eight pre-rendered animation frames
// per section keep the per-frame cost at one drawImage while every fan stays
// an individual: own build, clothes, hair, accessories and enthusiasm.
const CROWD_FRAME_KINDS = ['sit0','sit1','stand0','stand1','jump0','jump1','wave0','wave1','clap0','clap1','scarf0','scarf1'];
class CrowdSection {
  constructor(fans, info){
    this.fans = fans;
    this.affinity = info.affinity;
    this.vip = info.affinity === 'vip';
    this.lod = info.lod || 'hi';
    this.mood = 'idle'; this.moodT = 0;
    this.phase = Math.random() * 7;
    this.seed = (Math.random() * 1e9) | 0;
    let nx = 1e9, ny = 1e9, mx = -1e9, my = -1e9;
    for (const f of fans){
      const s = project(f.x, f.y, f.z);
      nx = Math.min(nx, s.x); ny = Math.min(ny, s.y);
      mx = Math.max(mx, s.x); my = Math.max(my, s.y);
    }
    this.bx = Math.floor(nx) - 10; this.by = Math.floor(ny) - 22;
    this.w = Math.ceil(mx - nx) + 20; this.h = Math.ceil(my - ny) + 28;
    this.frames = {};
  }
  setMood(m, dur){ this.mood = m; this.moodT = this.vip ? (dur || 0) * 0.6 : (dur || 0); }
  update(dt, baseline){
    if (this.moodT > 0){
      this.moodT -= dt;
      if (this.moodT <= 0) this.mood = baseline;
    } else this.mood = baseline;
  }
  frameKind(t, waveHit){
    const ph = this.phase;
    const seq = (hz, a, b2) => ((t * hz + ph) | 0) % 2 ? b2 : a;
    if (waveHit) return this.vip ? seq(2, 'stand0', 'stand1') : seq(6, 'jump0', 'jump1');
    let k;
    switch (this.mood){
      case 'celebrate':
        k = this.ultras ? (((ph | 0) % 2) ? seq(4.5, 'jump0', 'jump1') : seq(4, 'scarf0', 'scarf1'))
          : (((ph | 0) % 3 === 0) ? seq(4, 'wave0', 'wave1') : seq(4.5, 'jump0', 'jump1'));
        break;
      case 'excited':    k = this.ultras ? seq(3.4, 'jump0', 'jump1') : seq(3, 'stand1', 'jump0'); break;
      case 'cheer':      k = ((ph | 0) % 2) ? seq(3, 'clap0', 'clap1') : seq(2.8, 'wave0', 'wave1'); break;
      case 'applaud':    k = seq(3.4, 'clap0', 'clap1'); break;
      case 'chant':      k = seq(2.2, 'scarf0', 'scarf1'); break;
      case 'tense':      k = seq(1.7, 'sit1', 'stand0'); break;
      case 'boo':        k = seq(4.2, 'stand0', 'stand1'); break;
      case 'frustrated': k = ((t * 0.7 + ph) | 0) % 4 === 0 ? 'stand0' : 'sit0'; break;
      case 'gutted':     k = 'sit0'; break;
      default:           k = seq(0.8, 'sit0', 'sit1');
    }
    if (this.vip && (k[0] === 'j' || k[0] === 'w' || k[0] === 's' && k[1] === 'c')) k = seq(2, 'stand0', 'stand1');
    return k;
  }
  frame(kind){
    let cv = this.frames[kind];
    if (cv) return cv;
    cv = document.createElement('canvas');
    cv.width = Math.max(2, this.w); cv.height = Math.max(2, this.h);
    const c = cv.getContext('2d');
    let hsh = 0;
    for (let i = 0; i < kind.length; i++) hsh = hsh * 31 + kind.charCodeAt(i);
    const rng = mulberry32(this.seed + hsh);
    const mode = kind.slice(0, -1), alt = kind.endsWith('1');
    const hi = this.lod === 'hi';
    for (const f of this.fans){
      const s = project(f.x, f.y, f.z);
      const px = Math.round(s.x) - this.bx;
      let base = Math.round(s.y) - this.by;
      const r = rng(), r2 = rng();
      const join = f.zeal > (f.joinR !== undefined ? f.joinR : r) * 0.85; // stable per fan: no strobing
      const seated = mode === 'sit' || (!join && mode !== 'stand');
      let legH = 0, bodyH;
      if (seated){
        if (alt && r < 0.3) base -= 1;                       // sway
        bodyH = f.h > 8 ? 4 : 3;
      } else {
        legH = 3;
        bodyH = f.h - 6;
        if (mode === 'jump') base -= alt ? 2 + ((f.zeal * 3) | 0) : 1 + ((f.zeal * 2) | 0);
        else if (alt && r2 < 0.4) base -= 1;                 // agitated hop
      }
      const w = f.w;
      const x0 = px - (w >> 1);
      if (legH){ c.fillStyle = f.pants; c.fillRect(x0, base - legH, 2, legH); c.fillRect(x0 + w - 2, base - legH, 2, legH); }
      const ty = base - legH - bodyH;
      c.fillStyle = f.jacket && hi ? f.jacket : f.shirt;
      c.fillRect(x0, ty, w, bodyH);
      if (f.jacket && hi){ c.fillStyle = f.shirt; c.fillRect(px, ty + 1, 1, Math.max(1, bodyH - 1)); }
      if (f.scarf && hi && mode !== 'wave'){ c.fillStyle = f.scarf; c.fillRect(x0 - 1, ty, w + 2, 1); }
      // arms tell the story: up for jumps, waving scarves, out for boos
      c.fillStyle = f.skin;
      if (!seated && mode === 'jump'){
        c.fillRect(x0 - 1, ty - 3, 1, 3); c.fillRect(x0 + w, ty - 3, 1, 3);
      } else if (!seated && mode === 'wave'){
        const wx = alt ? -2 : 2;
        c.fillRect(x0 - 1, ty - 2, 1, 2);
        c.fillRect(px + wx, ty - 4, 1, 3);
        if (f.scarf && hi){ c.fillStyle = f.scarf; c.fillRect(px + wx - 2, ty - 5, 5, 1); c.fillStyle = f.skin; }
      } else if (!seated && mode === 'clap'){
        // hands together above the head on the on-beat
        if (alt){ c.fillRect(px, ty - 4, 2, 2); }
        else { c.fillRect(x0 - 1, ty - 3, 1, 2); c.fillRect(x0 + w, ty - 3, 1, 2); }
      } else if (!seated && mode === 'scarf'){
        // both arms up holding the scarf line overhead — the ultras look
        c.fillRect(x0 - 1, ty - 3 - (alt ? 1 : 0), 1, 3); c.fillRect(x0 + w, ty - 3 - (alt ? 1 : 0), 1, 3);
        c.fillStyle = f.scarf || f.shirt;
        c.fillRect(x0 - 1, ty - 4 - (alt ? 1 : 0), w + 2, 1);
        c.fillStyle = f.skin;
      } else if (!seated && mode === 'stand' && alt){
        c.fillRect(x0 - 1, ty, 1, 2); c.fillRect(x0 + w, ty - 1, 1, 2); // complaining
      }
      // head, hair, hats
      const hy = ty - 3;
      c.fillStyle = f.skin; c.fillRect(px - 1, hy, 3, 3);
      if (hi && f.hairStyle === 2){ c.fillStyle = f.capCol; c.fillRect(px - 1, hy - 1, 3, 1); c.fillRect(px + 1, hy, 2, 1); }
      else if (hi && f.hairStyle === 3){ c.fillStyle = f.capCol; c.fillRect(px - 1, hy - 1, 3, 2); }
      else if (hi && f.hairStyle === 1){ c.fillStyle = f.hair; c.fillRect(px, hy - 2, 1, 2); c.fillRect(px - 1, hy - 1, 3, 1); }
      else { c.fillStyle = f.hair; c.fillRect(px - 1, hy - 1, 3, 1); }
      // flags come out when there is something to wave about
      if (f.flag && hi && !seated && (mode === 'jump' || mode === 'wave' || (mode === 'stand' && alt))){
        const fxp = px + (alt ? 3 : 4);
        c.fillStyle = '#c8c2b2'; c.fillRect(fxp, hy - 7, 1, 7);
        c.fillStyle = f.flag; c.fillRect(alt ? fxp - 4 : fxp + 1, hy - 7, 4, 3);
      }
    }
    this.frames[kind] = cv;
    return cv;
  }
  draw(ctx, ox, oy, t, waveHit){
    ctx.drawImage(this.frame(this.frameKind(t, waveHit)), this.bx + ox, this.by + oy);
  }
}

// StandModule: one interchangeable grandstand piece on the shared iso grid.
// Modules snap along an edge (or a 45° corner chamfer) and carry their own
// tiers, seating style, roof type, seat colours and section character —
// tabletop stadium pieces the StadiumBuilder assembles into whole grounds.
const CORNER_GEOM = {
  NW: { b: { x: 0,           y: 0           }, dir: { x:  0.707, y: -0.707 }, n: { x: -0.707, y: -0.707 } },
  NE: { b: { x: CFG.PITCH_L, y: 0           }, dir: { x:  0.707, y:  0.707 }, n: { x:  0.707, y: -0.707 } },
  SE: { b: { x: CFG.PITCH_L, y: CFG.PITCH_W }, dir: { x: -0.707, y:  0.707 }, n: { x:  0.707, y:  0.707 } },
  SW: { b: { x: 0,           y: CFG.PITCH_W }, dir: { x: -0.707, y: -0.707 }, n: { x: -0.707, y:  0.707 } },
};
class StandModule {
  constructor(stadium, def){
    this.stadium = stadium;
    this.edge = def.edge; this.u0 = def.u0; this.u1 = def.u1; this.near = !!def.near;
    this.kind = def.kind || 'straight';
    this.tiers = def.tiers.slice();
    this.style = def.style || 'seats';           // 'seats' | 'terrace'
    this.roof = def.roof || null;                // null | 'flat' | 'pitched'
    this.roofCol = def.roofCol;
    this.seatCol = def.seatCol || null;          // coloured seat rows
    this.vip = !!def.vip; this.press = !!def.press;
    this.ultras = !!def.ultras; this.away = !!def.away;
    this.tunnel = !!def.tunnel; this.entrance = !!def.entrance;
    // terraces are shallow standing steps; seated tiers climb faster —
    // and everything sits closer/taller than before, embracing the pitch
    this.rowDepth = this.style === 'terrace' ? 1.05 : 1.0;
    this.rise = this.style === 'terrace' ? 0.52 : 0.66;
    this.d0 = def.d0 !== undefined ? def.d0 : (this.edge === 'N' ? 8.6 : 7.6);
  }
  world(u, d, z){
    switch (this.edge){
      case 'N': return { x: u, y: -d, z };
      case 'W': return { x: -d, y: u, z };
      case 'S': return { x: u, y: CFG.PITCH_W + d, z };
      case 'E': return { x: CFG.PITCH_L + d, y: u, z };
      default: {
        const g = CORNER_GEOM[this.edge];
        return { x: g.b.x + g.dir.x * u + g.n.x * d, y: g.b.y + g.dir.y * u + g.n.y * d, z };
      }
    }
  }
  rowGeom(row){
    let r = row, d = this.d0, z = 0.8;
    for (const t of this.tiers){
      if (r < t) return { d: d + r * this.rowDepth, z: z + r * this.rise };
      d += t * this.rowDepth + 1.6; z += t * this.rise + 1.6; r -= t;
    }
    return { d, z };
  }
  totalRows(){ return this.tiers.reduce((a, b) => a + b, 0); }
  topGeom(){ return this.rowGeom(this.totalRows() - 1); }
  // CrowdGenerator: every seat gets an individual, procedurally built fan
  buildSections(rng){
    const secs = [];
    const chunk = 13;
    let tierStart = 0;
    this.tiers.forEach((rows, ti) => {
      for (let u = this.u0; u < this.u1 - 2; u += chunk){
        const u1 = Math.min(u + chunk, this.u1);
        const info = this.stadium.sectionInfo(this, ti, u, u1);
        if (info.skip) continue;
        // LOD: pitch-side rows get full detail, distant upper tiers simplify
        info.lod = (this.near || ti === 0) && this.edge.length === 1 ? 'hi' : 'lo';
        const fans = [];
        // back rows first so nearer fans overlap them
        for (let r = rows - 1; r >= 0; r--){
          const g = this.rowGeom(tierStart + r);
          const um2 = (this.u0 + this.u1) / 2;
          for (let su = u + 0.5; su < u1 - 0.3; su += 1.02){
            if (this.entrance && su > um2 - 2.8 && su < um2 + 2.8 && (tierStart + r) < 4) continue;
            if (rng() > info.density) continue;
            const w = this.world(su + (rng() - 0.5) * 0.3, g.d, g.z);
            const teamCol = info.shirt && rng() < (info.loyal || 0.6) ? info.shirt : null;
            fans.push({ ...w,
              shirt: teamCol || CROWD_PALETTE[(rng() * CROWD_PALETTE.length) | 0],
              jacket: rng() < 0.22 ? ['#3a3f48','#5a4632','#2e4632','#4a3550'][(rng() * 4) | 0] : null,
              pants: ['#2a2e36','#3a4048','#4a4038','#32405a'][(rng() * 4) | 0],
              skin: SKIN[(rng() * SKIN.length) | 0],
              hair: HAIR[(rng() * HAIR.length) | 0],
              hairStyle: rng() < 0.14 ? 2 : (rng() < 0.1 ? 3 : (rng() < 0.25 ? 1 : 0)), // cap/beanie/spiky/flat
              capCol: info.shirt && rng() < 0.5 ? info.shirt : '#3a4a5a',
              scarf: info.shirt && rng() < (this.ultras || this.away ? 0.55 : 0.3) ? info.shirt : null,
              flag: info.shirt && rng() < (this.ultras || this.away ? 0.14 : 0.05) ? info.shirt : null,
              h: 9 + ((rng() * 3) | 0),
              w: 4 + (rng() < 0.3 ? 1 : 0),
              zeal: (this.ultras || this.away ? 0.5 : 0.25) + rng() * 0.5,
              joinR: rng() });
          }
        }
        if (fans.length){
          const sec = new CrowdSection(fans, info);
          sec.ultras = this.ultras || this.away;
          const mid = this.world((u + u1) / 2, this.rowGeom(tierStart)[
            'd'], 0);
          sec.cx = mid.x; sec.cy = mid.y; // attack-end momentum bias anchor
          secs.push(sec);
        }
      }
      tierStart += rows;
    });
    return secs;
  }
}

/* --------------------------- STADIUM BUILDER ------------------------------- */
// StadiumBuilder: assembles complete grounds from StandModule pieces — from
// tiny neighbourhood terraces to two-tier arenas — deterministically from the
// match seed, so a strict replay always plays in the same stadium.
const StadiumBuilder = {
  MODULE_KINDS: ['straight','covered','terrace','double','vip','press','goalTerrace','corner','entrance'],
  assemble(stadium, rng){
    const th = stadium.themeDef;
    const game = stadium.game;
    const mods = [];
    const pick = arr => arr[(rng() * arr.length) | 0];
    const span = r => r[0] + ((rng() * (r[1] - r[0] + 1)) | 0);
    const seatPals = [null, null, '#33507e', '#7e3333', '#33684a', '#6b5a2a', '#4a3d66'];
    const bigGround = th.size >= 1;
    const homeCol = game.teams[0].kit.shirt, awayCol = game.teams[1].kit.shirt;
    const mkTiers = tall => tall && bigGround && rng() < 0.75
      ? [span(th.mainTiers[0]), span(th.mainTiers[Math.min(1, th.mainTiers.length - 1)])]
      : [span(th.mainTiers[0])];
    // ONE style profile per stadium: every side is built from the same kind
    // of stand — same seating style, seat colour, roof family and silhouette —
    // like a matched tabletop kit. Functional modules (VIP, tunnel, away
    // block, ultras kop, entrances, corners) inherit it.
    const profile = {
      style: rng() < th.terraceChance ? 'terrace' : 'seats',
      seatCol: pick(seatPals),
      roof: rng() < th.roofChance ? (rng() < 0.35 ? 'pitched' : 'flat') : null,
      roofCol: pick(th.roofCols),
      tiers: mkTiers(true),
      cornerRows: 4 + ((rng() * 3) | 0),
    };
    if (profile.style === 'terrace') profile.seatCol = null; // terraces are bare steps
    const base = { style: profile.style, seatCol: profile.seatCol, roofCol: profile.roofCol };
    // ---- N: the main stand — tunnel + dugouts + VIP/press in the middle ----
    {
      const mainKind = bigGround && rng() < 0.75 ? (rng() < 0.5 ? 'vip' : 'press') : 'covered';
      const segs = [
        { u0: -6, u1: 34, kind: 'straight' },
        { u0: 34, u1: 71, kind: mainKind, main: true },
        { u0: 71, u1: 111, kind: 'straight' },
      ];
      for (const s of segs){
        const m = new StandModule(stadium, {
          ...base, edge: 'N', u0: s.u0, u1: s.u1, kind: s.kind,
          tiers: profile.tiers.slice(),
          roof: profile.roof,
          vip: s.main && s.kind === 'vip', press: s.main && s.kind === 'press',
          tunnel: !!s.main,
        });
        if (s.main) stadium.mainStand = m;
        mods.push(m);
      }
    }
    // ---- S: the near TV side — same stand, kept low so the pitch reads ----
    {
      const nearTiers = [span(th.nearRows)];
      const split = bigGround && rng() < 0.4;
      const segs = split ? [{ u0: -6, u1: 52 }, { u0: 52, u1: 111 }] : [{ u0: -6, u1: 111 }];
      for (const s of segs)
        mods.push(new StandModule(stadium, {
          ...base, edge: 'S', u0: s.u0, u1: s.u1, kind: 'straight', near: true,
          tiers: nearTiers.slice(), roof: null, d0: 8.0,
        }));
    }
    // ---- E: the home end — the same stand serving as the ultras kop.
    // Near-facing ends stay open: a roof here would hide its own crowd
    // from the fixed iso viewpoint (and open ends sing louder).
    mods.push(new StandModule(stadium, {
      ...base, edge: 'E', u0: -4, u1: 72, kind: 'goalTerrace',
      tiers: profile.tiers.slice(), roof: null, ultras: true,
    }));
    // ---- W: away end — travelling section + wing with an entrance gap ----
    {
      const hasEntrance = rng() < 0.65;
      mods.push(new StandModule(stadium, {
        ...base, edge: 'W', u0: -4, u1: STADIUM.awaySection ? 26 : 44, kind: 'straight',
        tiers: profile.tiers.slice(), roof: profile.roof,
        away: !!STADIUM.awaySection,
      }));
      // modules butt-joint exactly: the entrance is a vomitory INSIDE the
      // module, never a hole between two stands
      mods.push(new StandModule(stadium, {
        ...base, edge: 'W', u0: STADIUM.awaySection ? 26 : 44, u1: 72,
        kind: hasEntrance ? 'entrance' : 'straight',
        tiers: profile.tiers.slice(), roof: profile.roof,
        entrance: hasEntrance,
      }));
    }
    // ---- corners: matching wedges close the bowl on bigger grounds ----
    if (rng() < th.corners){
      for (const c of ['NW', 'NE'])
        mods.push(new StandModule(stadium, {
          ...base, edge: c, u0: -6.5, u1: 6.5, kind: 'corner',
          tiers: [profile.cornerRows], roof: null, d0: 10.2,
        }));
      if (th.size === 2 && rng() < 0.8)
        for (const c of ['SE', 'SW'])
          mods.push(new StandModule(stadium, {
            ...base, edge: c, u0: -5.5, u1: 5.5, kind: 'corner', near: true,
            tiers: [Math.max(3, profile.cornerRows - 1)], roof: null, d0: 10.6,
          }));
    }
    return mods;
  },
};

class AdBoard {
  constructor(a, b, hM){
    const A = project(a.x, a.y, 0), T = project(a.x, a.y, hM), B = project(b.x, b.y, 0);
    this.top = { x: T.x, y: T.y };
    this.along = { x: B.x - A.x, y: B.y - A.y };
    this.hPx = A.y - T.y;
    this.group = 0;
  }
  draw(ctx, ox, oy, gr, t){
    ctx.save();
    ctx.translate(this.top.x + ox, this.top.y + oy);
    ctx.transform(this.along.x / AD_W, this.along.y / AD_W, 0, this.hPx / AD_H, 0, 0);
    ctx.beginPath(); ctx.rect(0, 0, AD_W, AD_H); ctx.clip();
    const one = (idx, yOff) => {
      const d = AD_DESIGNS[idx % AD_DESIGNS.length];
      if (d.scroll){
        const off = (t * 40) % AD_W;
        ctx.drawImage(adDesign(idx), -off, yOff); ctx.drawImage(adDesign(idx), AD_W - off, yOff);
      } else {
        ctx.drawImage(adDesign(idx), 0, yOff);
        if (d.blink && ((t * 1.7) | 0) % 2 === 0){
          ctx.fillStyle = d.accent; ctx.fillRect(4, 4, 7, 7); ctx.fillRect(AD_W - 11, 4, 7, 7);
        }
      }
    };
    if (gr.trans >= 0){
      const e = gr.trans * gr.trans * (3 - 2 * gr.trans);
      one(gr.cur, -AD_H * e);
      one(gr.next, AD_H * (1 - e));
    } else one(gr.cur, 0);
    ctx.restore();
  }
}

let actorSeq = 0; // guarantees unique sprite-cache identity per actor
function actorApp(id, shirt, shorts, socks, skin, prop){
  const uid = id + '_' + (actorSeq++);
  return { id: uid, shirt, shorts, socks, trim: null,
    skin: skin || SKIN[1], hair: HAIR[(id.length * 3) % HAIR.length], prop: prop || null };
}
class SidelineActor {
  constructor(app, x, y, z){
    this.app = app;
    this.pos = { x, y }; this.home = { x, y };
    this.zBase = z || 0;

    const step = Math.min(d, speed * dt);
    this.pos.x += dx / d * step; this.pos.y += dy / d * step;

  }

    this.actionT = Math.max(0, this.actionT - dt);
    this.think(dt, game);
  }

// Assistant referee: tracks the offside line on his half, flags dead balls.
class SidelineOfficial extends SidelineActor {
  constructor(side){
    super(actorApp('lino' + side, '#e8c23a', '#1a1a1a', '#1a1a1a', SKIN[2], 'flag'),
      side === 0 ? 78 : 26, side === 0 ? -1.5 : CFG.PITCH_W + 1.5);
    this.side = side; // 0: far touchline covering x>52.5, 1: near covering x<52.5
  }
  think(dt, game){
    const b = game.ball, m = game.match;
    const gx = this.side === 0 ? CFG.PITCH_L : 0;
    const rs = m.restart;
    if (rs && rs.spot && this.actionT <= 0){
      const myY = this.side === 0 ? 0.5 : CFG.PITCH_W - 0.5;
      const mine = (m.state === 'THROWIN' && Math.abs(rs.spot.y - myY) < 3 && (this.side === 0 ? rs.spot.x > 50 : rs.spot.x < 55)) ||
        ((m.state === 'CORNER' || m.state === 'GOALKICK') && Math.abs(rs.spot.x - gx) < 30);
      if (mine) this.setAction('flagup', 1.1);
    }
    const defTeam = game.teams.find(t => t.ownGoalX() === gx);
    let d1 = 1e9, d2 = 1e9;
    for (const o of defTeam.players){
      const d = Math.abs(o.pos.x - gx);
      if (d < d1){ d2 = d1; d1 = d; } else if (d < d2) d2 = d;
    }
    const lineX = gx === CFG.PITCH_L ? CFG.PITCH_L - d2 : d2;
    const track = gx === CFG.PITCH_L
      ? clamp(Math.max(lineX, Math.min(b.x, CFG.PITCH_L)), 54, 104.5)
      : clamp(Math.min(lineX, Math.max(b.x, 0)), 0.5, 51);
    const moved = this.moveToward(track, this.home.y, 7, dt);
    if (this.actionT <= 0) this.action = moved ? (Math.abs(track - this.pos.x) > 6 ? 'sprint' : 'jog') : 'idle';
  }
}
class Photographer extends SidelineActor {
  constructor(x, y, gx){
    super(actorApp('photo' + Math.round(x * 7 + y), '#2e343c', '#2e343c', '#3c424a',

class BenchStaff extends SidelineActor {
  constructor(team, role, x, y){
    super(role === 'coach'
      ? actorApp('coach' + team.idx, '#2a2e36', '#2a2e36', '#1a1a1a', SKIN[(team.idx * 2 + 1) % SKIN.length], null)
      : actorApp('sub' + team.idx + Math.round(x * 3), team.kit.shirt, '#3a3f46', team.kit.socks, SKIN[Math.abs(x | 0) % SKIN.length], null),
      x, y);
    this.team = team; this.role = role;
    this.action = role === 'sub' ? 'sit' : 'idle';
    this.paceDir = 1;
  }
  think(dt, game){
    const ev = this.evt(game);
    const fresh = game.stadium.t - ev.t;
    if (ev.type === 'goal' && fresh < 3){
      this.action = ev.team === this.team ? 'celebrate' : (this.role === 'coach' ? 'shield' : 'sit');
      return;
    }
    if (ev.type === 'foul' && fresh < 1.6 && ev.team !== this.team && this.role === 'coach'){
      this.action = 'point'; return;
    }
    if (this.role === 'coach'){
      const tx = this.home.x + this.paceDir * 2.6;
      const moved = this.moveToward(tx, this.home.y, 1.3, dt);
      if (!moved) this.paceDir *= -1;
      this.action = moved ? 'jog' : 'idle';
    } else {
      const stir = (ev.type === 'shot' || ev.type === 'save' || ev.type === 'miss') && fresh < 1.5;
      this.action = stir ? 'clap' : 'sit';
    }
  }
}
// SecurityGuard: hi-vis, back to the pitch, watching the crowd — braces and

// MomentumReactionSystem: one number the whole stadium feels. Positive
// momentum favours the home side; heat spikes on events and cools off.
class MomentumReactionSystem {
  constructor(){ this.momentum = 0; this.heat = 0; this.intensity = 0; }
  kick(type, team){
    let sign = team ? (team.idx === 0 ? 1 : -1) : 0;
    if (type === 'foul' || type === 'card') sign = -sign; // the VICTIM's side gains
    const imp = { goal: 1.6, shot: 0.7, save: 0.6, miss: 0.55, corner: 0.4, foul: 0.35, card: 0.6 }[type] || 0.3;
    this.heat = Math.min(1.6, this.heat + imp);
    if (sign) this.momentum = clamp(this.momentum + sign * imp * 0.35, -1, 1);
  }
  update(dt, game){
    const b = game.ball, pt = game.possessionTeam();
    let target = 0;
    if (pt){
      const adv = (b.x - CFG.PITCH_L / 2) * pt.attackDir / (CFG.PITCH_L / 2);
      target = (pt.idx === 0 ? 1 : -1) * clamp(0.25 + adv, -0.3, 1);
    }
    this.momentum = lerp(this.momentum, target, Math.min(1, dt * 0.35));
    this.heat = Math.max(0, this.heat - dt * 0.35);
    const live = game.match.state === 'PLAYING' ? 1 : 0.4;
    this.intensity = clamp((Math.abs(this.momentum) * 0.55 + this.heat * 0.6) * live, 0, 1);
  }
}
// CrowdManager: owns every CrowdSection, translates momentum + match events
// into section moods, runs the mexican wave and the camera-flash sparkle.
class CrowdManager {
  constructor(stadium, rng){
    this.stadium = stadium;
    this.sections = [];
    for (const st of stadium.standDefs) this.sections.push(...st.buildSections(rng));
    for (const s of this.sections){
      const f = s.fans[0];
      s.ring = Math.atan2(f.y - 34, f.x - 52.5) / (Math.PI * 2) + 0.5;
    }
    this.wave = { active: false, pos: 0, cd: 25 + Math.random() * 25 };
    this.flashT = 0;
    this.warm = 0;
    this.confetti = [];
    // supporter culture props anchored to the character modules
    this.flags = []; this.drummers = []; this.capos = [];
    for (const st of stadium.standDefs){
      if (!st.ultras && !st.away) continue;
      const team = stadium.game.teams[st.away ? 1 : 0];
      const n = st.ultras ? 3 : 2;
      for (let i = 0; i < n; i++){
        const u = lerp(st.u0 + 6, st.u1 - 6, (i + 0.5) / n);
        const back = st.rowGeom(Math.max(0, st.totalRows() - 2));
        const w = st.world(u, back.d, back.z);
        this.flags.push({ x: w.x, y: w.y, z: w.z, h: 6 + (i % 2), ph: Math.random() * 7,
          col: i % 2 ? '#e8e4da' : team.kit.shirt, col2: team.kit.shorts || '#22262c' });
      }
      const g0 = st.rowGeom(0);
      const fw = st.world((st.u0 + st.u1) / 2, g0.d - 0.9, g0.z);
      if (st.ultras){
        this.drummers.push({ x: fw.x, y: fw.y, z: fw.z, ph: Math.random() * 7, col: team.kit.shirt });
        const cw = st.world((st.u0 + st.u1) / 2 + 4, g0.d - 0.9, g0.z);
        this.capos.push({ x: cw.x, y: cw.y, z: cw.z, ph: Math.random() * 7, col: team.kit.shirt });
      } else {
        this.drummers.push({ x: fw.x, y: fw.y, z: fw.z, ph: Math.random() * 7, col: team.kit.shirt });
      }
    }
  }
  sideOf(sec){
    const teams = this.stadium.game.teams;
    return sec.affinity === 'home' || sec.affinity === 'vip' ? teams[0]
      : sec.affinity === 'away' ? teams[1] : null;
  }
  react(type, team){
    const each = fn => { for (const s of this.sections) fn(s, this.sideOf(s)); };
    switch (type){
      case 'goal':
        this.flashT = 2.5;
        if (this.wave.active){ this.wave.active = false; this.wave.cd = 40 + Math.random() * 30; }
        each((s, side) => {
          if (!side) s.setMood('celebrate', 2.2 + Math.random());
          else s.setMood(side === team ? 'celebrate' : 'gutted', 4.2);
          // confetti + streamers rain from the celebrating sections
          if ((!side || side === team) && this.confetti.length < 260 && Math.random() < 0.5){
            for (let i = 0; i < 26; i++){
              this.confetti.push({
                x: s.bx + Math.random() * s.w, y: s.by + Math.random() * s.h * 0.5,
                vx: (Math.random() - 0.5) * 22, vy: -28 - Math.random() * 26,
                col: [team ? team.kit.shirt : '#ffd257', '#e8e4da', '#ffd257', '#5ac2e8'][(Math.random() * 4) | 0],
                life: 2.1 + Math.random() * 0.9,

      case 'save':
        this.flashT = Math.max(this.flashT, 0.5);

        break;
      case 'miss':

      case 'card': // the carded side boos the referee, everyone else loves it
        each((s, side) => {

  // momentum -> resting mood: the stands ARE the match-state indicator.
  // Sections close to the ball feel it more — an attack toward one end sets

  baseline(sec, mrs){

    if (sec.cx !== undefined){

    for (let i = 0; i < 2 && this.warm < this.sections.length; i++, this.warm++){
      const s = this.sections[this.warm];
      for (const k of CROWD_FRAME_KINDS){
        if (s.vip && (k[0] === 'j' || k[0] === 'w' || k.startsWith('sc'))) continue; // decorum
        s.frame(k);
      }
    }

  waveHit(s){ return this.wave.active && Math.abs(s.ring - this.wave.pos) < 0.045; }
  draw(ctx, ox, oy, t){
    for (const s of this.sections) s.draw(ctx, ox, oy, t, this.waveHit(s));
    this.drawProps(ctx, ox, oy, t);
    if (this.flashT > 0){
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      for (let i = 0; i < 12; i++){

  }
  // Flag + Drum + capo props: the supporter ends breathe with the match
  drawProps(ctx, ox, oy, t){
    const en = 0.35 + this.stadium.mrs.intensity * 0.9;
    for (const f of this.flags){
      const s = project(f.x, f.y, f.z);
      const bx2 = s.x + ox, by2 = s.y + oy;
      ctx.strokeStyle = '#c8c2b2'; ctx.lineWidth = 1.5;

      const w2 = Math.sin(t * (2 + en * 2.4) + f.ph + 1.2) * 4 * en;

      ctx.beginPath();
